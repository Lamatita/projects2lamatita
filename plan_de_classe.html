<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generateur de Plans de Classe</title>
<style>
:root {
    --fond:       #f7f3ff;
    --principal:  #6c63ff;
    --sec:        #ffb703;
    --princ-dark: #4a42cc;
    --surface:    #ffffff;
    --surf-alt:   #ede8ff;
    --texte:      #2a2040;
    --doux:       #6b5f8a;
    --ombre:      rgba(108,99,255,.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family:"Segoe UI",sans-serif;
    background:var(--fond);
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

/* ── Barre du haut ── */
.top-bar {
    width:100%; padding:6px 16px;
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0; z-index:10;
}
.back-link {
    background:transparent; border:2px solid var(--principal); color:var(--principal);
    font-weight:700; font-size:.9em; padding:5px 14px; border-radius:8px;
    cursor:pointer; transition:background .2s,color .2s; text-decoration:none;
}
.back-link:hover { background:var(--principal); color:#fff; }
.page-title { color:var(--principal); font-size:1.3em; font-weight:700; }

/* ── Barre de boutons ── */
.btn-bar {
    display:flex; gap:5px; padding:4px 16px;
    flex-shrink:0; flex-wrap:wrap; align-items:center;
}
.btn {
    padding:6px 12px; border:none; border-radius:7px;
    font-family:"Segoe UI",sans-serif; font-weight:700; font-size:.78em;
    color:#fff; cursor:pointer; transition:filter .15s,transform .1s; white-space:nowrap;
}
.btn:hover  { filter:brightness(1.13); }
.btn:active { transform:scale(.96); }
.btn-alpha  { background:#3b82f6; }
.btn-spe    { background:#845ec2; }
.btn-rand   { background:#10b981; }
.btn-clear  { background:#ef4444; }
.btn-save   { background:#22c55e; }
.btn-mode   { background:#1d4ed8; }
.btn-pdf    { background:#f97316; }

/* ── Info strip ── */
.info-strip {
    padding:2px 16px 4px; display:flex; align-items:center; gap:14px; flex-shrink:0;
}
.info-strip span { font-size:.78em; color:var(--doux); font-weight:600; }
.badge {
    background:var(--surf-alt); color:var(--principal);
    border-radius:5px; padding:2px 8px; font-size:.78em; font-weight:700;
}

/* ── Zone principale ── */
.main {
    flex:1; display:flex; overflow:hidden; padding:4px 10px 8px; gap:10px;
}
.canvas-area {
    flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden;
}
#planCanvas {
    border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,.18);
    cursor:crosshair; max-width:100%; max-height:100%; display:block;
}

/* ── Panneau droite ── */
.side-panel {
    width:260px; flex-shrink:0; display:flex; flex-direction:column;
    gap:8px; overflow-y:auto; scrollbar-width:thin;
    scrollbar-color:var(--principal) transparent;
}
.panel-box {
    background:var(--surface); border-radius:10px; padding:11px;
    box-shadow:0 2px 12px var(--ombre); border:1.5px solid var(--surf-alt);
}
.panel-box h3 {
    color:var(--principal); font-size:.74em; font-weight:700;
    text-transform:uppercase; letter-spacing:.07em; margin-bottom:8px;
}

/* Liste eleves */
.student-list {
    max-height:200px; overflow-y:auto; scrollbar-width:thin;
    scrollbar-color:var(--principal) transparent;
}
.student-row {
    display:flex; align-items:center; padding:4px 7px; border-radius:5px;
    font-size:.77em; cursor:pointer; transition:background .12s; gap:5px;
    border-bottom:1px solid var(--surf-alt);
}
.student-row:hover { background:var(--surf-alt); }
.student-row.sel   { background:var(--principal); color:#fff; }
.s-name { font-weight:700; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.s-info { font-size:.9em; opacity:.7; white-space:nowrap; }

/* Formulaire */
.form-field { display:flex; flex-direction:column; gap:2px; margin-bottom:6px; }
.form-field label { font-size:.73em; color:var(--doux); font-weight:600; }
.form-field input {
    padding:4px 7px; border:1.5px solid #d4cef5; border-radius:6px;
    font-size:.82em; color:var(--texte); background:var(--fond); outline:none;
}
.form-field input:focus { border-color:var(--principal); }
.btn-row { display:flex; gap:5px; margin-top:4px; }
.btn-sm {
    flex:1; padding:5px; border:none; border-radius:6px;
    font-weight:700; font-size:.76em; color:#fff; cursor:pointer; transition:filter .13s;
}
.btn-sm:hover { filter:brightness(1.1); }
.btn-sm.green  { background:#22c55e; }
.btn-sm.red    { background:#ef4444; }

/* Drop zone */
.drop-zone {
    border:2px dashed var(--principal); border-radius:8px; padding:10px;
    text-align:center; color:var(--doux); font-size:.78em; cursor:pointer;
    transition:background .2s;
}
.drop-zone.over { background:var(--surf-alt); }
.drop-zone input[type=file] { display:none; }

/* Legende */
.legend-item { display:flex; align-items:center; gap:7px; font-size:.78em; color:var(--doux); margin-bottom:4px; }
.legend-dot  { width:13px; height:13px; border-radius:3px; flex-shrink:0; }

/* Confettis */
.falling { position:fixed; top:-10%; animation:fall linear infinite; pointer-events:none; z-index:0; }
.confetti { width:10px; height:10px; opacity:.65; }
.c1{background:#6c63ff;}.c2{background:#ffb703;}.c3{background:#ff6f91;}.c4{background:#00c9a7;}.c5{background:#845ec2;}
@keyframes fall { 0%{transform:translateY(0) rotate(0deg);} 100%{transform:translateY(120vh) rotate(var(--rotation));} }

/* Tooltip */
#tip {
    position:fixed; background:rgba(42,32,64,.94); color:#fff; font-size:.77em;
    padding:5px 10px; border-radius:7px; pointer-events:none; display:none;
    z-index:999; border:1px solid var(--principal); white-space:nowrap; max-width:240px;
}

/* Toast */
#toast {
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:rgba(42,32,64,.95); color:#fff; font-size:.83em;
    padding:7px 18px; border-radius:9px; border:1px solid var(--principal);
    z-index:9999; pointer-events:none; display:none; white-space:nowrap;
}
</style>
</head>
<body>

<!-- Confettis -->
<div class="falling confetti c1" style="left:4%;  animation-duration:5.1s; --rotation:720deg;"></div>
<div class="falling confetti c2" style="left:16%; animation-duration:6.4s; --rotation:540deg;"></div>
<div class="falling confetti c3" style="left:31%; animation-duration:4.7s; --rotation:-720deg;"></div>
<div class="falling confetti c4" style="left:48%; animation-duration:5.9s; --rotation:360deg;"></div>
<div class="falling confetti c5" style="left:63%; animation-duration:6.2s; --rotation:900deg;"></div>
<div class="falling confetti c1" style="left:77%; animation-duration:5.5s; --rotation:720deg;"></div>
<div class="falling confetti c2" style="left:91%; animation-duration:6.8s; --rotation:-900deg;"></div>

<div id="tip"></div>
<div id="toast"></div>

<!-- Barre haut -->
<div class="top-bar">
    <button class="back-link" onclick="history.back()">← Retour en arriere</button>
    <h1 class="page-title">Generateur de Plans de Classe</h1>
    <div style="width:160px;"></div>
</div>

<!-- Boutons -->
<div class="btn-bar">
    <button class="btn btn-alpha" onclick="genAlpha()">Alphabetique</button>
    <button class="btn btn-spe"   onclick="genSpe()">Par Spe</button>
    <button class="btn btn-rand"  onclick="genRand()">Aleatoire</button>
    <button class="btn btn-clear" onclick="clearLayout()">Effacer</button>
    <button class="btn btn-save"  onclick="saveLayout()">Sauvegarder</button>
    <button class="btn btn-mode"  id="btnMode" onclick="toggleMode()">Mode : Selection</button>
    <button class="btn btn-pdf"   onclick="exportPDF()">Export PDF</button>
</div>

<!-- Infos -->
<div class="info-strip">
    <span>Mode : <span class="badge" id="modeLabel">Selection des tables</span></span>
    <span>Eleves : <span class="badge" id="nbEleves">0</span></span>
    <span>Tables : <span class="badge" id="nbTables">0</span></span>
    <span id="genInfo" style="color:#10b981;font-weight:700;font-size:.78em;"></span>
</div>

<!-- Contenu -->
<div class="main">

    <div class="canvas-area">
        <canvas id="planCanvas"></canvas>
    </div>

    <div class="side-panel">

        <!-- Gestion eleves -->
        <div class="panel-box">
            <h3>Gerer les eleves</h3>
            <div class="student-list" id="studentList"></div>
            <div class="btn-row" style="margin-top:6px;">
                <button class="btn-sm green" onclick="showAddForm()">+ Ajouter</button>
                <button class="btn-sm red"   onclick="deleteSelected()">Supprimer</button>
            </div>
            <div id="addForm" style="display:none;margin-top:9px;">
                <div class="form-field"><label>Nom</label>    <input id="fNom"    type="text" placeholder="Dupont"></div>
                <div class="form-field"><label>Prenom</label> <input id="fPrenom" type="text" placeholder="Marie"></div>
                <div class="form-field"><label>Classe</label> <input id="fClasse" type="text" placeholder="3e B"></div>
                <div class="form-field"><label>Spe 1</label>  <input id="fSpe1"   type="text" placeholder="Maths"></div>
                <div class="form-field"><label>Spe 2</label>  <input id="fSpe2"   type="text" placeholder="SES"></div>
                <div class="btn-row">
                    <button class="btn-sm green" onclick="addStudent()">Enregistrer</button>
                    <button class="btn-sm red"   onclick="cancelAdd()">Annuler</button>
                </div>
            </div>
        </div>

        <!-- Import CSV -->
        <div class="panel-box">
            <h3>Importer un CSV</h3>
            <div class="drop-zone" id="dropZone"
                 ondragover="event.preventDefault();this.classList.add('over')"
                 ondragleave="this.classList.remove('over')"
                 ondrop="handleDrop(event)"
                 onclick="document.getElementById('csvInput').click()">
                Glissez un fichier CSV ici<br>ou cliquez pour parcourir
                <input type="file" id="csvInput" accept=".csv" onchange="handleFile(this.files[0])">
            </div>
            <div id="filesLoaded" style="font-size:.73em;color:var(--doux);margin-top:5px;"></div>
        </div>

        <!-- Legende -->
        <div class="panel-box">
            <h3>Legende</h3>
            <div class="legend-item"><div class="legend-dot" style="background:#6c63ff;"></div>Table selectionnee (vide)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#50ffa0;"></div>Eleve place</div>
            <div class="legend-item"><div class="legend-dot" style="background:#c4bfee;"></div>Table vide (vue plan)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#e5e7eb;"></div>Case non selectionnee</div>
        </div>

    </div>
</div>

<script>
(function () {
'use strict';

// ── Constantes (reprises du Python : GRID_SIZE=20, CELL_SIZE=40, MARGIN=5) ─────
const GRID_SIZE = 20;
const CELL_SIZE = 34;
const MARGIN    = 4;
const W = GRID_SIZE * (CELL_SIZE + MARGIN);
const H = GRID_SIZE * (CELL_SIZE + MARGIN);

// ── Etat global ───────────────────────────────────────────────────────────────
let students       = [];
let grid           = mkGrid(false);
let seatingPlan    = mkGrid(null);
let mode           = 'SELECT_LAYOUT';
let generationMode = null;
let selectedIdx    = -1;
let loadedFiles    = [];

function mkGrid(val) {
    return Array.from({length:GRID_SIZE}, ()=>new Array(GRID_SIZE).fill(val));
}

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('planCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = W;
canvas.height = H;

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, dur=2200) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toast._t);
    toast._t = setTimeout(()=>{ el.style.display='none'; }, dur);
}

// ── Info bar ──────────────────────────────────────────────────────────────────
function updateInfoBar() {
    document.getElementById('nbEleves').textContent  = students.length;
    document.getElementById('nbTables').textContent  = getSeats().length;
    document.getElementById('modeLabel').textContent =
        mode === 'SELECT_LAYOUT' ? 'Selection des tables'
                                 : `Plan (${generationMode || 'aucun'})`;
    document.getElementById('btnMode').textContent =
        mode === 'SELECT_LAYOUT' ? 'Mode : Selection' : 'Mode : Vue plan';
    document.getElementById('genInfo').textContent =
        generationMode ? `Generation : ${generationMode}` : '';
}

// ── Seats ─────────────────────────────────────────────────────────────────────
function getSeats() {
    const s=[];
    for(let r=0;r<GRID_SIZE;r++)
        for(let c=0;c<GRID_SIZE;c++)
            if(grid[r][c]) s.push([r,c]);
    return s;
}

function clearSeatingPlan() { seatingPlan = mkGrid(null); }

// ── Dessin ────────────────────────────────────────────────────────────────────
function draw() {
    ctx.clearRect(0,0,W,H);

    // Fond
    ctx.fillStyle = '#f0ecff';
    ctx.fillRect(0,0,W,H);

    // Legere grille de fond
    ctx.strokeStyle = 'rgba(108,99,255,.08)';
    ctx.lineWidth = 0.5;
    for(let i=0;i<=GRID_SIZE;i++){
        const x=i*(CELL_SIZE+MARGIN), y=i*(CELL_SIZE+MARGIN);
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }

    for(let r=0;r<GRID_SIZE;r++) {
        for(let c=0;c<GRID_SIZE;c++) {
            const x = c*(CELL_SIZE+MARGIN);
            const y = r*(CELL_SIZE+MARGIN);
            const active = grid[r][c];

            let fill, stroke, lw;

            if(mode==='SELECT_LAYOUT') {
                // Comme Python : BLUE si actif, LIGHT_GRAY sinon
                fill   = active ? '#6c63ff' : '#e5e7eb';
                stroke = active ? '#4a42cc' : '#d1d5db';
                lw     = active ? 1.5 : 0.7;
            } else {
                // VIEW_PLAN : GREEN si eleve place, LIGHT_GRAY si vide actif, transparent sinon
                if(!active) {
                    fill='#f5f3ff'; stroke='rgba(0,0,0,0)'; lw=0;
                } else {
                    const s = seatingPlan[r][c];
                    fill   = s ? '#d1fae5' : '#c4bfee';
                    stroke = s ? '#34d399' : '#9893d8';
                    lw = 1.5;
                }
            }

            if(active) {
                ctx.shadowColor='rgba(0,0,0,.2)'; ctx.shadowBlur=4; ctx.shadowOffsetY=2;
            }

            ctx.fillStyle=fill; ctx.strokeStyle=stroke; ctx.lineWidth=lw;
            ctx.beginPath();
            ctx.roundRect(x, y, CELL_SIZE, CELL_SIZE, 4);
            ctx.fill();
            if(lw) ctx.stroke();

            ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;

            // Texte en VIEW_PLAN
            if(mode==='VIEW_PLAN' && active) {
                const s = seatingPlan[r][c];
                if(s) {
                    ctx.textAlign='center'; ctx.textBaseline='middle';
                    // Prenom + Nom sur deux lignes (comme Python : first_line/second_line)
                    ctx.fillStyle='#064e3b';
                    ctx.font=`bold 7px "Segoe UI",sans-serif`;
                    ctx.fillText(trunc(s.prenom,9), x+CELL_SIZE/2, y+CELL_SIZE/2-5);
                    ctx.fillText(trunc(s.nom,9),    x+CELL_SIZE/2, y+CELL_SIZE/2+4);
                    // Specialites (comme Python : spe1/spe2 en font 6)
                    if(s.spe1||s.spe2) {
                        ctx.fillStyle='rgba(4,80,50,.5)';
                        ctx.font='5.5px "Segoe UI",sans-serif';
                        ctx.fillText(trunc(`${s.spe1||''}/${s.spe2||''}`,11), x+CELL_SIZE/2, y+CELL_SIZE-4);
                    }
                }
            }
        }
    }
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function trunc(s,n){ return s.length>n ? s.slice(0,n-1)+'.' : s; }

// ── Interactions canvas ───────────────────────────────────────────────────────
canvas.addEventListener('click', e=>{
    if(mode!=='SELECT_LAYOUT') return;
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(W/rect.width);
    const my=(e.clientY-rect.top) *(H/rect.height);
    const col=Math.floor(mx/(CELL_SIZE+MARGIN));
    const row=Math.floor(my/(CELL_SIZE+MARGIN));
    if(row>=0&&row<GRID_SIZE&&col>=0&&col<GRID_SIZE) {
        grid[row][col] = !grid[row][col];
        clearSeatingPlan();
        draw(); updateInfoBar();
    }
});

// Tooltip au survol (VIEW_PLAN uniquement)
canvas.addEventListener('mousemove', e=>{
    const tip=document.getElementById('tip');
    if(mode!=='VIEW_PLAN'){ tip.style.display='none'; return; }
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(W/rect.width);
    const my=(e.clientY-rect.top) *(H/rect.height);
    const col=Math.floor(mx/(CELL_SIZE+MARGIN));
    const row=Math.floor(my/(CELL_SIZE+MARGIN));
    if(row>=0&&row<GRID_SIZE&&col>=0&&col<GRID_SIZE&&grid[row][col]) {
        const s=seatingPlan[row][col];
        if(s){
            tip.style.display='block';
            tip.style.left=(e.clientX+14)+'px';
            tip.style.top =(e.clientY-8)+'px';
            tip.textContent=`${s.prenom} ${s.nom} — ${s.classe}${s.spe1||s.spe2?' | '+[s.spe1,s.spe2].filter(Boolean).join('/'):''}`;
        } else tip.style.display='none';
    } else tip.style.display='none';
});
canvas.addEventListener('mouseleave',()=>{ document.getElementById('tip').style.display='none'; });

// ── Generations ───────────────────────────────────────────────────────────────

// generate_alphabetic : tri par nom.upper()
function genAlpha() {
    clearSeatingPlan();
    const seats=getSeats();
    if(!seats.length){ toast('Selectionnez d\'abord des tables (mode Selection)'); return; }
    if(seats.length<students.length)
        toast(`Attention : ${seats.length} places pour ${students.length} eleves`);
    const sorted=[...students].sort((a,b)=>a.nom.toUpperCase().localeCompare(b.nom.toUpperCase()));
    sorted.forEach((s,i)=>{ if(i<seats.length){ const[r,c]=seats[i]; seatingPlan[r][c]=s; } });
    generationMode='alphabetique'; mode='VIEW_PLAN';
    draw(); updateInfoBar();
    toast('Plan alphabetique genere');
}

// generate_by_specialty : groupes spe1-spe2 tries, puis tri nom dans chaque groupe
function genSpe() {
    clearSeatingPlan();
    const seats=getSeats();
    if(!seats.length){ toast('Selectionnez d\'abord des tables (mode Selection)'); return; }
    const groups={};
    students.forEach(s=>{
        const key=`${s.spe1||''}-${s.spe2||''}`;
        if(!groups[key]) groups[key]=[];
        groups[key].push(s);
    });
    let idx=0;
    Object.keys(groups).sort().forEach(key=>{
        const grp=groups[key].sort((a,b)=>a.nom.toUpperCase().localeCompare(b.nom.toUpperCase()));
        grp.forEach(s=>{ if(idx<seats.length){ const[r,c]=seats[idx++]; seatingPlan[r][c]=s; } });
    });
    generationMode='par specialites'; mode='VIEW_PLAN';
    draw(); updateInfoBar();
    toast(`Plan par specialites genere (${Object.keys(groups).length} groupes)`);
}

// generate_random : Fisher-Yates (equivalent de random.shuffle Python)
function genRand() {
    clearSeatingPlan();
    const seats=getSeats();
    if(!seats.length){ toast('Selectionnez d\'abord des tables (mode Selection)'); return; }
    const shuffled=[...students];
    for(let i=shuffled.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
    }
    shuffled.forEach((s,i)=>{ if(i<seats.length){ const[r,c]=seats[i]; seatingPlan[r][c]=s; } });
    generationMode='aleatoire'; mode='VIEW_PLAN';
    draw(); updateInfoBar();
    toast('Plan aleatoire genere');
}

function clearLayout() {
    grid=mkGrid(false); clearSeatingPlan(); generationMode=null;
    draw(); updateInfoBar();
    toast('Disposition effacee');
}

function toggleMode() {
    mode = mode==='SELECT_LAYOUT' ? 'VIEW_PLAN' : 'SELECT_LAYOUT';
    draw(); updateInfoBar();
}

// ── Sauvegarde localStorage (equivalent layout_config.json) ───────────────────
function saveLayout() {
    try {
        localStorage.setItem('layout_config', JSON.stringify({
            grid,
            generationMode,
            seatingPlan: seatingPlan.map(row=>row.map(s=>s?{nom:s.nom,prenom:s.prenom,classe:s.classe,spe1:s.spe1,spe2:s.spe2}:null))
        }));
        toast('Configuration sauvegardee');
    } catch(e){ toast('Erreur de sauvegarde'); }
}

function loadLayout() {
    try {
        const raw=localStorage.getItem('layout_config');
        if(!raw) return;
        const data=JSON.parse(raw);
        if(data.grid) grid=data.grid;
        if(data.generationMode) generationMode=data.generationMode;
        if(data.seatingPlan) {
            clearSeatingPlan();
            data.seatingPlan.forEach((row,r)=>row.forEach((sd,c)=>{
                if(sd){ const f=students.find(s=>s.nom===sd.nom&&s.prenom===sd.prenom&&s.classe===sd.classe); if(f) seatingPlan[r][c]=f; }
            }));
        }
        if(generationMode) mode='VIEW_PLAN';
    } catch(e){}
}

// ── Eleves ────────────────────────────────────────────────────────────────────
function saveStudents() { try{ localStorage.setItem('students',JSON.stringify(students)); }catch(e){} }
function loadStudents()  { try{ const r=localStorage.getItem('students'); if(r) students=JSON.parse(r); }catch(e){} }

function studentExists(s) {
    return students.some(x=>x.nom.toLowerCase()===s.nom.toLowerCase()
        &&x.prenom.toLowerCase()===s.prenom.toLowerCase()&&x.classe===s.classe);
}

function renderStudentList() {
    const list=document.getElementById('studentList');
    list.innerHTML='';
    if(!students.length){
        list.innerHTML='<div style="font-size:.76em;color:var(--doux);padding:6px;">Aucun eleve — importez un CSV ou ajoutez manuellement.</div>';
        return;
    }
    students.forEach((s,i)=>{
        const row=document.createElement('div');
        row.className='student-row'+(i===selectedIdx?' sel':'');
        row.innerHTML=`<span class="s-name">${s.prenom} ${s.nom}</span><span class="s-info">${s.classe}</span>`;
        row.onclick=()=>{ selectedIdx=i===selectedIdx?-1:i; renderStudentList(); };
        list.appendChild(row);
    });
}

function showAddForm()  { document.getElementById('addForm').style.display='block'; document.getElementById('fNom').focus(); }
function cancelAdd()    { document.getElementById('addForm').style.display='none'; clearFields(); }
function clearFields()  { ['fNom','fPrenom','fClasse','fSpe1','fSpe2'].forEach(id=>{ document.getElementById(id).value=''; }); }

function addStudent() {
    const nom=document.getElementById('fNom').value.trim();
    const prenom=document.getElementById('fPrenom').value.trim();
    const classe=document.getElementById('fClasse').value.trim();
    const spe1=document.getElementById('fSpe1').value.trim();
    const spe2=document.getElementById('fSpe2').value.trim();
    if(!nom||!prenom||!classe){ toast('Nom, Prenom et Classe sont obligatoires'); return; }
    const s={nom,prenom,classe,spe1,spe2};
    if(studentExists(s)){ toast('Cet eleve existe deja'); return; }
    students.push(s);
    saveStudents(); clearFields();
    document.getElementById('addForm').style.display='none';
    renderStudentList(); updateInfoBar();
    toast(`Eleve ajoute : ${prenom} ${nom}`);
}

function deleteSelected() {
    if(selectedIdx<0||selectedIdx>=students.length){ toast('Selectionnez un eleve'); return; }
    const s=students.splice(selectedIdx,1)[0];
    selectedIdx=-1; clearSeatingPlan(); saveStudents();
    renderStudentList(); draw(); updateInfoBar();
    toast(`Eleve supprime : ${s.prenom} ${s.nom}`);
}

// ── Import CSV (detect_csv_columns du Python) ─────────────────────────────────
function detectColumns(headers) {
    const h={};
    headers.forEach(col=>{ h[col.toLowerCase().trim()]=col; });
    const keys={
        nom:   ['noms','nom','lastname','name'],
        prenom:['prenoms','prenom','firstname','first_name'],
        classe:['classe','class','grade'],
        spe1:  ['spe 1','spe1','specialite 1','speciality 1','specialty 1'],
        spe2:  ['spe 2','spe2','specialite 2','speciality 2','specialty 2'],
    };
    const mapping={};
    Object.entries(keys).forEach(([key,names])=>{
        for(const n of names){ if(h[n]){ mapping[key]=h[n]; break; } }
    });
    return mapping;
}

function parseCSV(text, filename) {
    const lines=text.trim().split(/\r?\n/);
    if(lines.length<2){ toast('CSV vide ou invalide'); return; }
    const sep=lines[0].includes(';')?';':',';
    const headers=lines[0].split(sep).map(s=>s.trim().replace(/^"|"$/g,''));
    const mapping=detectColumns(headers);
    if(!mapping.nom||!mapping.prenom||!mapping.classe){
        toast('Colonnes NOM, PRENOM, CLASSE introuvables dans ce CSV'); return;
    }
    let added=0;
    for(let i=1;i<lines.length;i++){
        if(!lines[i].trim()) continue;
        const vals=lines[i].split(sep).map(s=>s.trim().replace(/^"|"$/g,''));
        const get=col=>col?(vals[headers.indexOf(col)]||''):'';
        const s={nom:get(mapping.nom),prenom:get(mapping.prenom),classe:get(mapping.classe),spe1:get(mapping.spe1),spe2:get(mapping.spe2)};
        if(s.nom&&s.prenom&&!studentExists(s)){ students.push(s); added++; }
    }
    loadedFiles.push(filename);
    saveStudents(); renderStudentList(); updateInfoBar();
    document.getElementById('filesLoaded').textContent=
        `${loadedFiles.length} fichier(s) — ${students.length} eleves au total`;
    document.getElementById('dropZone').classList.remove('over');
    toast(`${added} eleves importes depuis ${filename}`);
}

function handleFile(file) {
    if(!file) return;
    const r=new FileReader();
    r.onload=e=>parseCSV(e.target.result,file.name);
    r.readAsText(file,'utf-8');
}
function handleDrop(e) {
    e.preventDefault();
    document.getElementById('dropZone').classList.remove('over');
    const f=e.dataTransfer.files[0];
    if(f&&f.name.toLowerCase().endsWith('.csv')) handleFile(f);
    else toast('Veuillez deposer un fichier .csv');
}

// ── Export PDF (equivalent export_to_pdf du Python) ───────────────────────────
function exportPDF() {
    const hasStudents=seatingPlan.some(row=>row.some(s=>s!==null));
    if(!hasStudents){ toast('Generez d\'abord un plan de classe'); return; }
    const seats=getSeats();
    if(!seats.length){ toast('Aucune table definie'); return; }
    const rows=seats.map(s=>s[0]), cols=seats.map(s=>s[1]);
    const minR=Math.min(...rows),maxR=Math.max(...rows);
    const minC=Math.min(...cols),maxC=Math.max(...cols);
    const cellW=85, cellH=52;
    let tableHTML='';
    for(let r=minR;r<=maxR;r++){
        tableHTML+='<tr>';
        for(let c=minC;c<=maxC;c++){
            if(grid[r][c]){
                const s=seatingPlan[r][c];
                if(s){
                    const name=`${s.prenom} ${s.nom}`;
                    const disp=name.length>22?name.slice(0,20)+'..':name;
                    const spe=s.spe1||s.spe2?`${s.spe1||''}/${s.spe2||''}`:'';
                    tableHTML+=`<td class="placed"><span class="n">${disp}</span>${spe?`<span class="s">${spe}</span>`:''}`;
                } else {
                    tableHTML+=`<td class="empty">`;
                }
            } else {
                tableHTML+=`<td class="none">`;
            }
            tableHTML+='</td>';
        }
        tableHTML+='</tr>';
    }
    const modeLabel=generationMode||'personnalise';
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Plan de Classe</title>
<style>
body{font-family:'Segoe UI',sans-serif;margin:18px;}
h1{font-size:15px;margin-bottom:3px;}p{font-size:10.5px;color:#666;margin-bottom:12px;}
table{border-collapse:collapse;}
td{width:${cellW}px;height:${cellH}px;border:1px solid #ccc;text-align:center;vertical-align:middle;padding:2px;font-size:9px;}
td.placed{background:#d1fae5;border:1.5px solid #6ee7b7;}
td.placed .n{display:block;font-weight:bold;font-size:8.5px;}
td.placed .s{display:block;color:#555;font-size:7px;margin-top:1px;}
td.empty{background:#ede8ff;}td.none{background:transparent;border:none;}
@media print{@page{size:landscape;margin:10mm;}}
</style></head><body>
<h1>Plan de Classe — ${modeLabel}</h1>
<p>Total eleves : ${students.length} &nbsp;|&nbsp; Tables : ${seats.length}</p>
<table>${tableHTML}</table></body></html>`;
    const win=window.open('','_blank');
    if(!win){ toast('Autorisez les popups pour exporter'); return; }
    win.document.write(html); win.document.close();
    win.onload=()=>{ win.focus(); win.print(); };
    toast('Fenetre d\'impression ouverte');
}
