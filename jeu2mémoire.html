<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu de Mémoire</title>
<style>
:root {
    --fond:       #f7f3ff;
    --principal:  #6c63ff;
    --secondaire: #ffb703;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, var(--fond), #e6e1ff);
    height: 100vh;
    overflow: hidden;
}
.top-bar {
    width: 100%;
    padding: 8px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    position: relative;
}
.back-link {
    color: #6c63ff;
    background: #ffffff;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    height: 42px;
    padding: 0 18px 0 12px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    box-shadow: 0 4px 16px rgba(108,99,255,0.2);
    transition: all 0.2s ease;
    white-space: nowrap;
}
.back-link:hover {
    background: #6c63ff;
    color: #fff;
    box-shadow: 0 6px 20px rgba(108,99,255,0.4);
    transform: translateY(-1px);
}
.page-title {
    color: var(--principal);
    font-size: 1.4em;
    font-weight: 700;
}
.game-wrapper {
    width: 100%;
    height: calc(100vh - 45px);
    display: flex;
    justify-content: center;
    align-items: center;
}
#gameCanvas {
    border-radius: 12px;
    cursor: default;
    max-width: 100%;
    max-height: 100%;
    position: relative;
    z-index: 2;
    box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
.falling {
    position: fixed;
    top: -10%;
    animation: fall linear infinite;
    pointer-events: none;
    z-index: 0;
}
.confetti { width: 12px; height: 12px; opacity: .8; }
.lama     { font-size: 2rem; }
.c1 { background: var(--principal); }
.c2 { background: var(--secondaire); }
.c3 { background: #ff6f91; }
.c4 { background: #00c9a7; }
.c5 { background: #845ec2; }
@keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(120vh) rotate(var(--rotation)); }
}
</style>
</head>
<body>

<div class="falling confetti c1" style="left:5%;  animation-duration:5s;   --rotation:720deg;"></div>

    const a = (i * 45 - 90) * Math.PI / 180;

// geometrie de la roue (modes speciaux)
const W_RMIN = 92, W_RMAX = 340, W_NN = 8, W_NA = 8;
const TEINTES_ROUE = [
    ['#6e1616','#dc3232','#ff6464'],
    ['#7a420a','#eb8214','#ffaa3c'],
    ['#736a0a','#e6d214','#ffe84a'],

    ['#19286a','#3250d2','#6478ff'],
    ['#411964','#8232c8','#b464ff'],
    ['#691940','#d23282','#ff64b4'],
];

function roueBande(a) {
    const p = (W_RMAX - W_RMIN) / W_NA;
    return [W_RMIN + a*p, W_RMIN + (a+1)*p];
}
function roueAngles(n) {
    const g = (Math.PI*2) / W_NN;
    const s = n*g - Math.PI/2 - g/2;
    return [s, s+g];
}
function roueCentro(n, a) {
    const [ri, ro] = roueBande(a);
    const rm = (ri+ro)/2;
    const [s, e] = roueAngles(n);
    const am = (s+e)/2;
    return [CX + rm*Math.cos(am), CY + rm*Math.sin(am)];
}
function roueHit(px, py, n, a) {
    const dx=px-CX, dy=py-CY;
    const dist=Math.hypot(dx,dy);
    const [ri,ro]=roueBande(a);
    if (dist<ri || dist>ro) return false;
    const ang = (Math.atan2(dy,dx)*180/Math.PI + 90 + 360) % 360;
    const g = 360/W_NN;
    const cd = (n*g+360)%360;
    const dif = ((ang-cd+180)%360+360)%360 - 180;
    return Math.abs(dif) <= g/2;
}

    jouerNoteOctave(idx, 3, dur);

function jouerNoteOctave(noteIdx, octave, dur=0.42) {
    if (actx.state === 'suspended') actx.resume();
    const f    = FREQS[noteIdx] * Math.pow(2, octave - 3);
    const ref  = 440;
    const gain = Math.min(0.48 * Math.pow(ref / f, 0.55), 0.92);

    const osc1 = actx.createOscillator();
    const osc2 = actx.createOscillator();
    const osc3 = actx.createOscillator();
    const env  = actx.createGain();

    osc1.frequency.value = f;
    osc2.frequency.value = f * 2;
    osc3.frequency.value = f * 3;
    osc2.type = osc3.type = 'sine';

    const mix = actx.createGain();
    const m2  = actx.createGain();
    const m3  = actx.createGain();
    m2.gain.value = 0.28;
    m3.gain.value = 0.10;

    osc1.connect(mix); osc2.connect(m2); osc3.connect(m3);
    m2.connect(mix); m3.connect(mix);
    mix.connect(env); env.connect(actx.destination);

    const now = actx.currentTime;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(gain, now + 0.012);
    env.gain.setValueAtTime(gain, now + dur - 0.16);
    env.gain.linearRampToValueAtTime(0, now + dur);

    [osc1, osc2, osc3].forEach(o => { o.start(now); o.stop(now + dur); });
}

// modes speciaux : 0=classique 1=boheme 2=eventually 3=magnifico
const modos = {
    1: { seq: boheme,         nom: 'Bohemian Rhapsody (Queen)' },
    2: { seq: eventualmente,  nom: 'Eventually (Tame Impala)'  },
    3: { seq: magnifico,      nom: 'The Magnificent Seven (The Clash)' },
};
let modoActual  = 0;
let posSeq      = 0;
let partidas    = 0;
let proxModo    = 0;

function tirarModo() {
    // 70% classique, 10% chaque special
    const r = Math.random();
    if (r < 0.70) return 0;
    if (r < 0.80) return 1;
    if (r < 0.90) return 2;
    return 3;
}

// helpers dessin
function roundRect(x, y, w, h, r, fill, stroke, sw) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y,   x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x,   y+h, r);
    ctx.arcTo(x,   y+h, x,   y,   r);
    ctx.arcTo(x,   y,   x+w, y,   r);
    ctx.closePath();
    if (fill)   { ctx.fillStyle   = fill;          ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw||1; ctx.stroke(); }
}

function txt(s, x, y, sz, col, bold, align) {
    ctx.fillStyle    = col;
    ctx.font         = (bold?'bold ':'')+sz+'px "Courier New", monospace';
    ctx.textAlign    = align || 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s, x, y);
}

function lueur(x, y, r, col, alpha) {
    const g = ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0, col.replace(')', `,${alpha})`).replace('rgb','rgba'));
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();
}

// dessin entete
function dessinerEntete() {
    roundRect(0, 0, W, HEADER_H, 0, C.entete, null);
    ctx.strokeStyle = C.bordure; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, HEADER_H); ctx.lineTo(W, HEADER_H); ctx.stroke();

    const m = modos[modoActual];
    if (m) {
        txt('Niveau : '+niveau, W/2, HEADER_H/2 - 12, 16, C.or, true);
        txt(m.nom+'  --  '+posSeq+'/'+m.seq.length+' notes', W/2, HEADER_H/2 + 14, 12, '#8890b0', false);
    } else {
        txt('Niveau : '+niveau, W/2, HEADER_H/2, 16, C.or, true);
    }
}

// dessin cercle central
function dessinerCentre() {
    const p = 0.5 + 0.5*Math.sin(pulso);
    const r = CTR_R + p*4;

    // halo doux
    const g = ctx.createRadialGradient(CX,CY,r*0.3,CX,CY,r*1.8);
    g.addColorStop(0, `rgba(108,99,255,${0.12+0.06*p})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(CX,CY,r*1.8,0,Math.PI*2);
    ctx.fillStyle = g; ctx.fill();

    roundRect(CX-r, CY-r, r*2, r*2, r, C.entete, C.panelBord, 2);

    // reflet
    ctx.save();
    ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2); ctx.clip();
    const hl = ctx.createLinearGradient(CX-r,CY-r,CX+r,CY);
    hl.addColorStop(0,'rgba(255,255,255,0.07)');
    hl.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = hl; ctx.fillRect(CX-r,CY-r,r*2,r*2);
    ctx.restore();

    let lignes;
    if      (etat===MENU)   lignes = ['Cliquez pour','commencer'];
    else if (etat===ORDI)   lignes = ['Memorisez !'];
    else if (etat===JOUEUR) lignes = ['A votre','tour !'];
    else if (etat===GAGNE)  lignes = ['Bravo !'];
    else                    lignes = ['Rate...'];

    const col = etat===GAGNE ? C.victoire : etat===PERDU ? C.defaite : C.texte;
    const dy  = lignes.length === 1 ? 0 : -14;
    lignes.forEach((l,i) => txt(l, CX, CY+dy+i*28, 17, col, true));
}

// dessin boutons notes
function dessinerBoutons() {
    for (let i = 0; i < 8; i++) {
        const p   = POSITIONS[i];
        const t   = TEINTES[i];
        const lit = (i === aceso);
        const err = (i === erreur);

        if (lit) {
            lueur(p.x, p.y, BTN_R*2.2, t.lit, 0.45);
        }

        // ombre
        ctx.beginPath(); ctx.arc(p.x+2, p.y+3, BTN_R, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();

        // corps
        const fill = err ? '#ff3c3c' : lit ? t.lit : t.dark;
        ctx.beginPath(); ctx.arc(p.x, p.y, BTN_R, 0, Math.PI*2);
        ctx.fillStyle = fill; ctx.fill();

        // anneau couleur
        ctx.beginPath(); ctx.arc(p.x, p.y, BTN_R, 0, Math.PI*2);
        ctx.strokeStyle = err ? '#ff8080' : lit ? '#ffffff' : t.base;
        ctx.lineWidth = 3; ctx.stroke();

        // survol
        if (i === surBouton && etat === JOUEUR && !lit) {
            ctx.beginPath(); ctx.arc(p.x, p.y, BTN_R, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.fill();
        }

        // reflet
        ctx.save();
        ctx.beginPath(); ctx.arc(p.x, p.y, BTN_R, 0, Math.PI*2); ctx.clip();
        const rf = ctx.createLinearGradient(p.x-BTN_R, p.y-BTN_R, p.x+BTN_R, p.y);
        rf.addColorStop(0, lit ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.10)');
        rf.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = rf; ctx.fillRect(p.x-BTN_R, p.y-BTN_R, BTN_R*2, BTN_R*2);
        ctx.restore();

        // label note
        txt(NOTES[i], p.x, p.y, 14, lit ? '#fff' : 'rgba(220,220,238,0.8)', true);
    }

    // connecteurs vers le centre
    for (let i=0; i<8; i++) {
        const p = POSITIONS[i];
        ctx.beginPath(); ctx.moveTo(CX,CY); ctx.lineTo(p.x,p.y);
        ctx.strokeStyle = 'rgba(60,60,110,0.5)'; ctx.lineWidth = 1; ctx.stroke();
    }
}

// footer
function dessinerFooter() {
    txt('Se joue avec du son', W/2, H-16, 13, 'rgba(136,144,176,0.7)', false);
}

// roue en secteurs (modes speciaux)
function dessinerRoue() {
    const litCell  = Array.isArray(aceso)  ? aceso  : null;
    const errCell  = Array.isArray(erreur) ? erreur : null;

    for (let n=0; n<W_NN; n++) {
        const [s, e] = roueAngles(n);
        const t = TEINTES_ROUE[n];

        for (let a=0; a<W_NA; a++) {
            const [ri, ro] = roueBande(a);
            const isLit = litCell && litCell[0]===n && litCell[1]===a;
            const isErr = errCell && errCell[0]===n && errCell[1]===a;
            const steps = 18;

            // polygone de la cellule
            ctx.beginPath();
            for (let k=0; k<=steps; k++) {
                const ang = s + (e-s)*k/steps;
                k===0 ? ctx.moveTo(CX+ro*Math.cos(ang), CY+ro*Math.sin(ang))
                      : ctx.lineTo(CX+ro*Math.cos(ang), CY+ro*Math.sin(ang));
            }
            for (let k=0; k<=steps; k++) {
                const ang = e - (e-s)*k/steps;
                ctx.lineTo(CX+ri*Math.cos(ang), CY+ri*Math.sin(ang));
            }
            ctx.closePath();

            if (isErr) {
                ctx.fillStyle = '#ff3c3c';
                ctx.strokeStyle = '#ff8080';
            } else if (isLit) {
                ctx.fillStyle = t[2];
                ctx.strokeStyle = '#ffffff';
                // halo lumineux
                const [cx_c, cy_c] = roueCentro(n, a);
                const g = ctx.createRadialGradient(cx_c, cy_c, 0, cx_c, cy_c, (ro-ri)*0.9);
                g.addColorStop(0, t[2]+'cc');
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.save(); ctx.clip();
                ctx.fillStyle = g; ctx.fill();
                ctx.restore();
                ctx.beginPath();
                for (let k=0; k<=steps; k++) {
                    const ang = s + (e-s)*k/steps;
                    k===0 ? ctx.moveTo(CX+ro*Math.cos(ang), CY+ro*Math.sin(ang))
                          : ctx.lineTo(CX+ro*Math.cos(ang), CY+ro*Math.sin(ang));
                }
                for (let k=0; k<=steps; k++) {
                    const ang = e - (e-s)*k/steps;
                    ctx.lineTo(CX+ri*Math.cos(ang), CY+ri*Math.sin(ang));
                }
                ctx.closePath();
                ctx.fillStyle = t[2];
                ctx.strokeStyle = '#ffffff';
            } else {
                const fade = 0.32 + 0.68*(a/(W_NA-1));
                ctx.fillStyle   = hexShade(t[0], fade * 0.72 / 0.32);
                ctx.strokeStyle = hexShade(t[0], fade * 0.50 / 0.32);
            }
            ctx.lineWidth = 1;
            ctx.fill();
            ctx.stroke();

            // numero octave au centre
            const [cx_c, cy_c] = roueCentro(n, a);
            ctx.fillStyle = isLit ? '#ffffff' : 'rgba(155,155,180,0.8)';
            ctx.font = '10px "Courier New"';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(String(a+1), cx_c, cy_c);
        }
    }

    // separateurs radiaux
    for (let n=0; n<W_NN; n++) {
        const [s] = roueAngles(n);
        ctx.beginPath();
        ctx.moveTo(CX+W_RMIN*Math.cos(s), CY+W_RMIN*Math.sin(s));
        ctx.lineTo(CX+W_RMAX*Math.cos(s), CY+W_RMAX*Math.sin(s));
        ctx.strokeStyle='rgba(50,50,75,0.8)'; ctx.lineWidth=1; ctx.stroke();
    }
    // cercles anneau
    for (let a=0; a<=W_NA; a++) {
        const r = a<W_NA ? roueBande(a)[0] : W_RMAX;
        ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2);
        ctx.strokeStyle='rgba(45,45,70,0.8)'; ctx.lineWidth=1; ctx.stroke();
    }
    // labels note a l'exterieur
    for (let n=0; n<W_NN; n++) {
        const [s,e] = roueAngles(n);
        const am=(s+e)/2;
        const lr=W_RMAX+20;
        ctx.fillStyle = TEINTES_ROUE[n][1];
        ctx.font = 'bold 13px "Courier New"';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(NOTES[n], CX+lr*Math.cos(am), CY+lr*Math.sin(am));
    }
}

function hexShade(hex, f) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    const clamp = v => Math.max(0,Math.min(255,Math.round(v*f)));
    return `rgb(${clamp(r)},${clamp(g)},${clamp(b)})`;
}

// boucle dessin
function draw(ts) {
    pulso = ts * 0.0024;

    ctx.fillStyle = C.fond;
    ctx.fillRect(0, 0, W, H);

    // cercles deco fond (mode classique seulement)
    if (!modoActual) {
        for (const r of [310,280,240,190,140,95]) {
            ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2);
            ctx.strokeStyle = 'rgba(40,40,70,0.6)'; ctx.lineWidth = 1; ctx.stroke();
        }
    }

    dessinerEntete();

    if (modoActual) {
        dessinerRoue();
    } else {
        dessinerBoutons();
    }

    dessinerCentre();
    dessinerFooter();

    if (etat===PERDU) dessinerOverlay();

    requestAnimationFrame(draw);
}

// overlay game over
function dessinerOverlay() {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, HEADER_H, W, H-HEADER_H);

    const pw=400, ph=200;
    const px=W/2-pw/2, py=H/2-ph/2;
    roundRect(px,py,pw,ph,14,C.panelBg,C.defaite,2);
    txt('Perdu !', W/2, py+54, 28, C.defaite, true);
    txt('Niveau atteint : '+niveau, W/2, py+102, 17, '#fff', false);
    txt('Cliquez pour rejouer', W/2, py+148, 13, C.sous, false);
}

// logique
const configs = [
    { delaiOrdi:800, delaiNotes:700 },
    { delaiOrdi:650, delaiNotes:580 },
    { delaiOrdi:480, delaiNotes:420 },
];
let niveauIdx = 1;

function reinit() {
    sequence   = [];
    idxJoueur  = 0;
    niveau     = 0;
    aceso      = -1;
    erreur     = -1;
    modoActual = proxModo;
    posSeq     = 0;
    partidas++;
    proxModo   = tirarModo();
    etat       = MENU;
}

function nouvellePartie() {
    sequence   = [];
    idxJoueur  = 0;
    niveau     = 0;
    aceso      = -1;
    erreur     = -1;
    modoActual = proxModo;
    posSeq     = 0;
    partidas++;
    proxModo   = tirarModo();
    prochainNiveau();
}

function prochainNiveau() {
    const m = modos[modoActual];
    if (m) {
        sequence.push(m.seq[posSeq % m.seq.length]);
        posSeq++;
    } else {
        sequence.push(Math.floor(Math.random()*8));
    }
    niveau++;
    idxJoueur = 0;
    pasOrdi   = 0;
    delai     = configs[niveauIdx].delaiOrdi;
    durAceso  = configs[niveauIdx].delaiNotes;
    tPas      = performance.now() + 600;
    etat      = ORDI;
}

function allumer(btn) {
    aceso  = btn;
    tAceso = performance.now() + durAceso;
    if (Array.isArray(btn)) {
        jouerNoteOctave(btn[0], btn[1], durAceso/1000);
    } else {
        jouerNote(btn, durAceso/1000);
    }
}

// tick logique (appele dans la boucle via rAF)
let dernierTick = 0;
function tick(ts) {
    if (ts - dernierTick < 16) { requestAnimationFrame(tick); return; }
    dernierTick = ts;

    if (aceso !== -1 && performance.now() > tAceso)   aceso  = -1;
    if (erreur !== -1 && performance.now() > tErreur) erreur = -1;

    if (etat === ORDI && aceso === -1) {
        if (pasOrdi < sequence.length) {
            if (performance.now() >= tPas) {
                allumer(sequence[pasOrdi]);
                pasOrdi++;
                tPas = performance.now() + delai;
            }
        } else {
            if (performance.now() >= tPas) etat = JOUEUR;
        }
    }

    requestAnimationFrame(tick);
}

function seqEqual(a, b) {
    if (Array.isArray(a) && Array.isArray(b)) return a[0]===b[0] && a[1]===b[1];
    return a === b;
}

// souris
function posCanvas(e) {
    const r  = canvas.getBoundingClientRect();
    const sx = W / r.width, sy = H / r.height;
    return { x:(e.clientX-r.left)*sx, y:(e.clientY-r.top)*sy };
}

canvas.addEventListener('mousemove', function(e) {
    const {x,y} = posCanvas(e);
    sourisX = x; sourisY = y;
    surBouton = -1;
    surCentre = false;
    const dx = x-CX, dy = y-CY;
    if (dx*dx+dy*dy <= CTR_R*CTR_R) { surCentre = true; return; }
    if (!modoActual) {
        for (let i=0; i<8; i++) {
            const p = POSITIONS[i];
            const ddx=x-p.x, ddy=y-p.y;
            if (ddx*ddx+ddy*ddy <= BTN_R*BTN_R) { surBouton=i; break; }
        }
    }
});

canvas.addEventListener('mouseleave', function() {
    sourisX=-1; sourisY=-1; surBouton=-1; surCentre=false;
});

canvas.addEventListener('mousedown', function(e) {
    const {x,y} = posCanvas(e);

    // centre
    const dx=x-CX, dy=y-CY;
    if (dx*dx+dy*dy<=CTR_R*CTR_R) {
        if (etat===MENU || etat===PERDU) nouvellePartie();
        return;
    }

    if (etat===JOUEUR) {
        if (modoActual) {
            // roue : chercher la cellule cliquee
            let clique = null;
            outer: for (let n=0; n<W_NN; n++) {
                for (let a=0; a<W_NA; a++) {
                    if (roueHit(x, y, n, a)) { clique=[n,a]; break outer; }
                }
            }
            if (clique) {
                allumer(clique);
                if (seqEqual(clique, sequence[idxJoueur])) {
                    idxJoueur++;
                    if (idxJoueur===sequence.length) {
                        etat=GAGNE;
                        setTimeout(()=>{ etat===GAGNE && prochainNiveau(); }, 900);
                    }
                } else {
                    erreur=clique; tErreur=performance.now()+700;
                    etat=PERDU;
                }
            }
        } else {
            // boutons classiques
            for (let i=0; i<8; i++) {
                const p=POSITIONS[i];
                const ddx=x-p.x, ddy=y-p.y;
                if (ddx*ddx+ddy*ddy<=BTN_R*BTN_R) {
                    allumer(i);
                    if (seqEqual(i, sequence[idxJoueur])) {
                        idxJoueur++;
                        if (idxJoueur===sequence.length) {
                            etat=GAGNE;
                            setTimeout(()=>{ etat===GAGNE && prochainNiveau(); }, 900);
                        }
                    } else {
                        erreur=i; tErreur=performance.now()+700;
                        etat=PERDU;
                    }
                    break;
                }
            }
        }
    }
});

reinit();
requestAnimationFrame(draw);
requestAnimationFrame(tick);

})();
</script>
