<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pays du Monde - Quiz</title>
<style>
:root {
    --fond: #f7f3ff;
    --principal: #6c63ff;
    --secondaire: #ffb703;
    --texte: #333;
    --blanc: #ffffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, var(--fond), #e6e1ff);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
.top-bar {
    width: 100%; padding: 8px 20px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 100; position: relative; flex-shrink: 0;
}
.back-link {
    color: var(--principal); text-decoration: none;
    font-weight: 600; font-size: 1.1em; transition: opacity .2s; min-width: 160px;
}
.back-link:hover { opacity: .7; }
.page-title { color: var(--principal); font-size: 1.4em; font-weight: 700; }
.spacer { min-width: 160px; }

.main-layout {
    display: flex; flex: 1; overflow: hidden;
    gap: 10px; padding: 0 10px 10px 10px;
    position: relative; z-index: 2;
}

/* Panneau gauche */
.left-panel {
    display: flex; flex-direction: column; gap: 8px;
    width: 240px; flex-shrink: 0;
}
.card {
    background: var(--blanc); border-radius: 14px;
    box-shadow: 0 4px 16px rgba(108,99,255,0.13); padding: 12px 14px;
}
.timer-card { text-align: center; }
.lbl { font-size: 0.72em; color: #999; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.timer-display { font-size: 2.6em; font-weight: 700; color: var(--principal); line-height: 1.1; font-variant-numeric: tabular-nums; }
.timer-display.warn { color: #ef4444; }
.score-card { text-align: center; }
.score-val { font-size: 2em; font-weight: 700; color: var(--secondaire); }
.score-sub { font-size: 0.82em; color: #aaa; }
.input-card label { display: block; font-size: 0.72em; color: #999; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
#inp {
    width: 100%; padding: 9px 11px;
    border: 2px solid #e0d9ff; border-radius: 9px;
    font-family: "Segoe UI", sans-serif; font-size: 1em; color: var(--texte);
    outline: none; transition: border-color .2s, background .2s;
}
#inp:focus { border-color: var(--principal); }
#inp:disabled { background: #f5f5f5; color: #aaa; }
#inp.ok { animation: flashok 0.35s ease; }
@keyframes flashok {
    0%,100% { border-color: #e0d9ff; background: white; }
    40% { border-color: #22c55e; background: #f0fff4; }
}
.btn {
    width: 100%; padding: 10px; border: none; border-radius: 9px;
    font-family: "Segoe UI", sans-serif; font-size: 0.95em; font-weight: 700;
    cursor: pointer; transition: opacity .2s, transform .1s;
}
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--principal); color: white; }
.btn-danger  { background: #f87171; color: white; }
.found-card { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
.found-card h3 { font-size: 0.72em; color: #999; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
#found-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #e0d9ff transparent; }
#found-list::-webkit-scrollbar { width: 3px; }
#found-list::-webkit-scrollbar-thumb { background: #e0d9ff; border-radius: 2px; }
.fi { font-size: 0.82em; padding: 2px 0; color: #16a34a; font-weight: 600; animation: popin 0.2s ease; }
@keyframes popin { 0% { transform: scale(0.8); opacity: 0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }

/* Zone carte */
.map-wrap {
    flex: 1; background: linear-gradient(160deg, #dfe9ff, #cdd8f6); border-radius: 14px;
    box-shadow: 0 4px 16px rgba(108,99,255,0.13);
    overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
}

/* SVG superposé sur l'image */
.map-container {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
}
#world-map {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 2;
}
/* Carte 100% vectorielle : pays clairs avec frontières nettes */
#world-map path {
    fill: #ffffff;
    stroke: #8f83e8;
    stroke-width: 0.6;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
    transition: fill 0.35s ease;
    cursor: default;
    shape-rendering: geometricPrecision;
}
#world-map path:hover {
    fill: #e6e1ff;
}
/* Pays trouvé : vert */
#world-map path.found {
    fill: #22c55e;
    stroke: #15803d;
}
#world-map path.found:hover {
    fill: #16a34a;
}
/* Pays manqué : rouge */
#world-map path.missed {
    fill: #ef4444;
    stroke: #b91c1c;
}

/* Tooltip */
#tt {
    position: absolute;
    background: rgba(30,20,60,0.88);
    color: white; padding: 4px 11px; border-radius: 7px;
    font-size: 0.82em; font-weight: 600;
    pointer-events: none; opacity: 0; transition: opacity 0.12s;
    z-index: 10; white-space: nowrap;
}

/* Overlays */
.overlay {
    position: absolute; inset: 0;
    background: rgba(247,243,255,0.96);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
}
.ov-card {
    background: white; border-radius: 18px;
    box-shadow: 0 12px 40px rgba(108,99,255,0.18);
    padding: 32px 42px; text-align: center; max-width: 440px;
}
.ov-card h2 { color: var(--principal); font-size: 1.8em; margin-bottom: 8px; }
.ov-card p  { color: #666; font-size: 0.95em; line-height: 1.6; margin-bottom: 18px; }
.big { font-size: 3.5em; font-weight: 700; color: var(--secondaire); line-height: 1; margin: 8px 0; }
.sub { color: #aaa; font-size: 0.85em; margin-bottom: 20px; }
.ov-btns { display: flex; gap: 8px; justify-content: center; }
.ov-btns .btn { width: auto; padding: 10px 24px; }

/* Confettis */
.falling { position: fixed; top: -10%; animation: fall linear infinite; pointer-events: none; z-index: 0; }
.confetti { width: 12px; height: 12px; opacity: .8; }
.lama { font-size: 2rem; }
.c1 { background: var(--principal); } .c2 { background: var(--secondaire); }
.c3 { background: #ff6f91; } .c4 { background: #00c9a7; } .c5 { background: #845ec2; }
@keyframes fall { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(120vh) rotate(var(--rotation)); } }
</style>
</head>

    p.addEventListener("mousemove", e => {
        const r = mapWrap.getBoundingClientRect();
        tt.style.left = (e.clientX - r.left + 14) + "px";
        tt.style.top  = (e.clientY - r.top  - 34) + "px";
    });
    p.addEventListener("mouseleave", () => { tt.style.opacity = "0"; });
});

// ── État ──────────────────────────────────────────────────────────────────────
let found = new Set(), timeLeft = 900, timerInt = null, running = false;

function startGame() {
    found.clear(); timeLeft = 900; running = true;
    document.getElementById("score").textContent = "0";
    document.getElementById("found-list").innerHTML = "";
    document.getElementById("timer").textContent = "15:00";
    document.getElementById("timer").className = "timer-display";
    document.getElementById("ovStart").style.display = "none";
    document.getElementById("ovEnd").style.display   = "none";
    const inp = document.getElementById("inp");
    inp.disabled = false; inp.value = ""; inp.focus();
    document.getElementById("btnStart").style.display   = "none";
    document.getElementById("btnGiveUp").style.display  = "";
    document.querySelectorAll("#world-map path").forEach(p => p.classList.remove("found","missed"));
    clearInterval(timerInt);
    timerInt = setInterval(() => {
        timeLeft--;
        const m = String(Math.floor(timeLeft/60)).padStart(2,"0");
        const s = String(timeLeft%60).padStart(2,"0");
        document.getElementById("timer").textContent = m+":"+s;
        if (timeLeft <= 60)  document.getElementById("timer").className = "timer-display warn";
        if (timeLeft <= 0)   endGame(false);
    }, 1000);
}

function endGame(won) {
    running = false; clearInterval(timerInt);
    const inp = document.getElementById("inp");
    inp.disabled = true;
    document.getElementById("btnGiveUp").style.display = "none";
    document.getElementById("btnStart").style.display  = "";
    const pct = Math.round(found.size / COUNTRIES.length * 100);
    document.getElementById("endScore").textContent = found.size;
    document.getElementById("endSub").textContent = `pays trouvés sur ${COUNTRIES.length} (${pct}%)`;
    document.getElementById("endTitle").textContent = won ? "🎉 Félicitations !" : "⏰ Temps écoulé !";
    const msgs = [
        "C'est un début… courage !",
        "Pas mal, on progresse !",
        "Très bon score !",
        "Excellent, presque parfait !",
        "Tu connais le monde par cœur ! 🦙"
    ];
    document.getElementById("endMsg").textContent = won
        ? "Incroyable, tu les as tous trouvés ! 🌍🦙"
        : msgs[Math.min(4, Math.floor(found.size / 40))];
    document.getElementById("ovEnd").style.display = "flex";
}

function showMissed() {
    document.querySelectorAll("#world-map path").forEach(p => {
        if (!p.classList.contains("found") && p.dataset.id) p.classList.add("missed");
    });
    document.getElementById("ovEnd").style.display = "none";
}

// ── Saisie ────────────────────────────────────────────────────────────────────
document.getElementById("inp").addEventListener("input", function() {
    if (!running) return;
    const id = nameMap[norm(this.value)];
    if (id && !found.has(id)) {
        found.add(id);
        document.querySelectorAll(`[data-id="${id}"]`).forEach(p => p.classList.add("found"));
        const item = document.createElement("div");
        item.className = "fi";
        item.textContent = "✓ " + (DISPLAY[id] || id);
        document.getElementById("found-list").insertBefore(item, document.getElementById("found-list").firstChild);
        document.getElementById("score").textContent = found.size;
        this.classList.remove("ok"); void this.offsetWidth; this.classList.add("ok");
        this.value = "";
        if (found.size === COUNTRIES.length) endGame(true);
    }
});

document.getElementById("btnStart").addEventListener("click", startGame);
document.getElementById("btnGiveUp").addEventListener("click", () => endGame(false));
</script>
