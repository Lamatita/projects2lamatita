<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papatte - Patoune - Griffes</title>
<style>
:root {
    --fond: #fffbe6;
    --principal: #d4840a;
    --secondaire: #f5c842;
    --texte: #5a3a00;
    --blanc: #ffffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Comic Sans MS", "Segoe UI", sans-serif;
    background: #fff8d7;
    height: 100vh;
    overflow: hidden;
}
.top-bar {
    width: 100%;
    padding: 8px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    position: relative;
}
.page-title {
    color: var(--principal);
    font-size: 1.4em;
    font-weight: 700;
    margin: 0;
}
.game-wrapper {
    width: 100%;
    height: calc(100vh - 45px);
    display: flex;
    justify-content: center;
    align-items: center;
}
#gameCanvas {
    border-radius: 12px;
    cursor: default;
    max-width: 100%;
    max-height: 100%;
    position: relative;
    z-index: 10;
}
.falling {
    position: fixed;
    top: -10%;
    animation: fall linear infinite;
    pointer-events: none;
    z-index: 5;
    font-size: 2rem;
}
.top-bar {
    position: relative;
    z-index: 20;
}
@keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(120vh) rotate(var(--rotation)); }
}
</style>
</head>

        img.src = 'data:image/png;base64,' + b64;

// ── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 900, H = 660;
canvas.width  = W;
canvas.height = H;

// Canvas de fond (derrière les emojis)
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx    = bgCanvas.getContext('2d');
bgCanvas.width  = W;
bgCanvas.height = H;
bgCtx.fillStyle = '#fff8d7';
bgCtx.fillRect(0, 0, W, H);

// ── Palette ──────────────────────────────────────────────────────────────────
const BG           = '#fff8d7';
const TITLE_COL    = '#cd7d19';
const CARD_BG      = '#fffceb';
const CARD_BORDER  = '#e1af50';
const CARD_HOV     = '#ffeea0';
const CARD_SEL     = '#ffd75f';
const GRAY         = '#a59169';
const WIN_COL      = '#4bb969';
const LOSE_COL     = '#d24641';
const DRAW_COL     = '#b99123';
const TEXT_DARK    = '#502812';
const BTN_NORMAL   = '#f0b237';
const BTN_HOV      = '#ffc84b';

// ── Données jeu ──────────────────────────────────────────────────────────────
const CHOICES  = ['Papatte', 'Patoune', 'Griffes'];
const LABELS   = ['PAPATTE', 'PATOUNE', 'GRIFFES'];
const PLURIELS = {Papatte:'Papattes', Patoune:'Patounes', Griffes:'Griffes'};
const WINS     = new Set(['Papatte,Griffes', 'Patoune,Papatte', 'Griffes,Patoune']);
const RULES    = [
    'Papatte tape Griffes',
    'Patoune couvre Papatte',
    'Griffes griffent Patoune',
];

function getWinner(p, c) {
    if (p === c) return 'draw';
    return WINS.has(p+','+c) ? 'player' : 'computer';
}

// ── Layout ───────────────────────────────────────────────────────────────────
const CARD_W = 200, CARD_H = 280;
const CARD_Y = 230;
const GAP    = 40;
const CARD_XS = [W/2 - CARD_W - GAP, W/2, W/2 + CARD_W + GAP];

// ── Particules ───────────────────────────────────────────────────────────────
class Particle {
    constructor(x, y, color) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 6 + 3;
        this.x = x; this.y = y;
        this.vx = Math.cos(a)*s; this.vy = Math.sin(a)*s - 3;
        this.color = color;
        this.life = this.maxLife = 35 + Math.random()*35 | 0;
        this.size = 4 + Math.random()*6 | 0;
    }
    update() { this.x+=this.vx; this.vy+=0.2; this.y+=this.vy; this.life--; }
    draw() {
        const alpha = this.life / this.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

let particles = [];
function spawn(x, y, col, n=60) {
    for (let i=0; i<n; i++) particles.push(new Particle(x, y, col));
}

// ── Etat ─────────────────────────────────────────────────────────────────────
let scoreP=0, scoreC=0, total=0;
let playerChoice=null, computerChoice=null, result=null;
let phase='choose'; // 'choose' | 'reveal'
let revealTimer=0;
let hovered=null;
let imgs=[], imgsSmall=[];

function handleChoice(idx) {
    playerChoice   = CHOICES[idx];
    computerChoice = CHOICES[Math.random()*3|0];
    result = getWinner(playerChoice, computerChoice);
    if (result==='player')        { scoreP++; spawn(W/2,H/2,'#4bb969'); }
    else if (result==='computer') { scoreC++; spawn(W/2,H/2,'#d24641'); }
    else                          { spawn(W/2,H/2,'#b99123'); }
    total++; phase='reveal'; revealTimer=0;
}

function resetGame() {
    playerChoice=computerChoice=result=null;
    phase='choose'; revealTimer=0;
}

// ── Dessin utilitaires ────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r, fill, stroke, sw=2) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w,y, x+w,y+h, r);
    ctx.arcTo(x+w,y+h, x,y+h, r);
    ctx.arcTo(x,y+h, x,y, r);
    ctx.arcTo(x,y, x+w,y, r);
    ctx.closePath();
    if (fill)   { ctx.fillStyle=fill;     ctx.fill(); }
    if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=sw; ctx.stroke(); }
}

function drawCard(idx, cx, cy, hov, sel) {
    const x = cx - CARD_W/2, y = cy, r = 20;
    // ombre
    ctx.shadowColor = 'rgba(180,140,60,0.35)';
    ctx.shadowBlur  = 14;
    ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 7;
    const bg = sel ? '#ffd75f' : (hov ? '#ffee90' : CARD_BG);
    roundRect(x, y, CARD_W, CARD_H, r, bg, null);
    ctx.shadowColor = 'transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
    const bw = (hov||sel) ? 4 : 2;
    const bc = (hov||sel) ? TITLE_COL : CARD_BORDER;
    roundRect(x, y, CARD_W, CARD_H, r, null, bc, bw);
    // image
    const img = imgs[idx];
    if (img) {
        const ih = CARD_H - 60, iw = ih * img.naturalWidth / img.naturalHeight;
        ctx.drawImage(img, x + (CARD_W-iw)/2, y+14, iw, ih);
    }
    // label
    ctx.fillStyle = (hov||sel) ? TITLE_COL : GRAY;
    ctx.font = 'bold 20px "Comic Sans MS", cursive';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(LABELS[idx], cx, y + CARD_H - 24);
}

function drawResultCard(idx, cx, cy, whoTxt, whoCol) {
    const img = imgsSmall[idx];
    const ih = 150, iw = img ? ih * img.naturalWidth / img.naturalHeight : 90;
    const w = iw + 40, h = ih + 60;
    const x = cx - w/2, r = 16;
    ctx.shadowColor = 'rgba(180,140,60,0.3)'; ctx.shadowBlur=10;
    ctx.shadowOffsetX=2; ctx.shadowOffsetY=5;
    roundRect(x, cy, w, h, r, CARD_BG, null);
    ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
    roundRect(x, cy, w, h, r, null, TITLE_COL, 3);
    if (img) ctx.drawImage(img, x+20, cy+10, iw, ih);
    ctx.fillStyle = TITLE_COL;
    ctx.font = 'bold 17px "Comic Sans MS", cursive';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(LABELS[idx], cx, cy+h-22);
    ctx.fillStyle = whoCol;
    ctx.font = 'bold 15px "Comic Sans MS", cursive';
    ctx.fillText(whoTxt, cx, cy-18);
}

// ── Fond décoratif ────────────────────────────────────────────────────────────
function drawBg() {
    ctx.clearRect(0, 0, W, H);
}

// ── Boucle ───────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
    const dt = Math.min((ts - lastTime)/1000, 0.05);
    lastTime = ts;
    if (phase==='reveal') revealTimer += dt * 60;
    particles = particles.filter(p => p.life>0);
    particles.forEach(p => p.update());

    // ── Rendu ────────────────────────────────────────────────────────────────
    drawBg();
    particles.forEach(p => p.draw());

    // Titre
    ctx.fillStyle = TITLE_COL;
    ctx.font = 'bold 42px "Comic Sans MS", cursive';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Papatte  -  Patoune  -  Griffes', W/2, 50);
    ctx.strokeStyle = CARD_BORDER; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(W/2-270,80); ctx.lineTo(W/2+270,80); ctx.stroke();

    // Scores
    ctx.font = 'bold 24px "Comic Sans MS", cursive';
    ctx.textAlign='left'; ctx.fillStyle=WIN_COL;
    ctx.fillText('Toi : '+scoreP, 55, 105);
    ctx.textAlign='right'; ctx.fillStyle=LOSE_COL;
    ctx.fillText('Ordi : '+scoreC, W-55, 105);
    ctx.fillStyle=GRAY; ctx.font='14px "Comic Sans MS", cursive';
    ctx.textAlign='center';
    ctx.fillText('Manches : '+total, W/2, 107);

    if (phase==='choose') {
        ctx.fillStyle=GRAY; ctx.font='15px "Comic Sans MS", cursive';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('Clique sur une patte pour jouer  (ou touches 1 - 2 - 3)', W/2, 175);

        CARD_XS.forEach((cx,i) => drawCard(i, cx, CARD_Y, hovered===i, false));

        // Règles
        RULES.forEach((r,k) => {
            ctx.fillStyle=GRAY; ctx.font='13px "Comic Sans MS", cursive';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(r, W/2, 572 + k*22);
        });

    } else { // reveal
        const pi = CHOICES.indexOf(playerChoice);
        const ci = CHOICES.indexOf(computerChoice);
        const RESULT_CARD_Y = 200;

        // Phrase résultat en HAUT
        if (revealTimer > 25) {
            let rtxt, rcol;
            if      (result==='player')   { rtxt=`Tu gagnes avec les ${PLURIELS[playerChoice]} !`; rcol=WIN_COL; }
            else if (result==='computer') { rtxt=`L'ordi gagne avec les ${PLURIELS[computerChoice]}...`; rcol=LOSE_COL; }
            else                          { rtxt='Egalite ! Deux pattes identiques'; rcol=DRAW_COL; }
            const alpha = Math.min((revealTimer-25)/25, 1);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = rcol;
            ctx.font = 'bold 34px "Comic Sans MS", cursive';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(rtxt, W/2, 152);
            ctx.globalAlpha = 1;
        }

        // Cartes en dessous
        drawResultCard(pi, 210, RESULT_CARD_Y, 'TOI',  WIN_COL);
        drawResultCard(ci, W-210, RESULT_CARD_Y, 'ORDI', LOSE_COL);

        // VS
        ctx.fillStyle=TITLE_COL; ctx.font='bold 34px "Comic Sans MS", cursive';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('VS', W/2, RESULT_CARD_Y + (150+60)/2);

        // Bouton rejouer
        if (revealTimer > 80) {
            const bx=W/2-110, by=565, bw=220, bh=48;
            const bhov = mouseX>=bx && mouseX<=bx+bw && mouseY>=by && mouseY<=by+bh;
            roundRect(bx, by, bw, bh, 13, bhov ? BTN_HOV : BTN_NORMAL, TITLE_COL, 3);
            ctx.fillStyle=TEXT_DARK; ctx.font='bold 22px "Comic Sans MS", cursive';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('Rejouer', bx+bw/2, by+bh/2);
            ctx.fillStyle=GRAY; ctx.font='13px "Comic Sans MS", cursive';
            ctx.fillText('ou Entree / Espace', W/2, by+bh+18);
        }
    }

    requestAnimationFrame(loop);
}

// ── Souris ───────────────────────────────────────────────────────────────────
let mouseX=0, mouseY=0;

function getPos(e) {
    const r = canvas.getBoundingClientRect();
    return {
        x: (e.clientX - r.left) * W / r.width,
        y: (e.clientY - r.top)  * H / r.height
    };
}

canvas.addEventListener('mousemove', e => {
    const p = getPos(e);
    mouseX = p.x; mouseY = p.y;
    hovered = null;
    if (phase==='choose') {
        CARD_XS.forEach((cx,i) => {
            if (p.x >= cx-CARD_W/2 && p.x <= cx+CARD_W/2 && p.y >= CARD_Y && p.y <= CARD_Y+CARD_H)
                hovered = i;
        });
    }
});

canvas.addEventListener('click', e => {
    const p = getPos(e);
    if (phase==='choose') {
        CARD_XS.forEach((cx,i) => {
            if (p.x >= cx-CARD_W/2 && p.x <= cx+CARD_W/2 && p.y >= CARD_Y && p.y <= CARD_Y+CARD_H)
                handleChoice(i);
        });
    } else if (phase==='reveal' && revealTimer > 80) {
        const bx=W/2-110, by=565, bw=220, bh=48;
        if (p.x>=bx && p.x<=bx+bw && p.y>=by && p.y<=by+bh) resetGame();
    }
});

document.addEventListener('keydown', e => {
    if (phase==='choose') {
        if (e.key==='1') handleChoice(0);
        if (e.key==='2') handleChoice(1);
        if (e.key==='3') handleChoice(2);
    } else if (phase==='reveal' && revealTimer>80) {
        if (e.key==='Enter' || e.key===' ') resetGame();
    }
});

// ── Chargement images puis démarrage ─────────────────────────────────────────
Promise.all([b64toImg(PIERRE_B64), b64toImg(PATOUNE_B64), b64toImg(GRIFFE_B64)]).then(loaded => {
    imgs = loaded;
    // Versions réduites : on réutilise les mêmes objets Image, on redimensionne via canvas drawImage
    imgsSmall = loaded;
    requestAnimationFrame(loop);
});

})();
</script>
