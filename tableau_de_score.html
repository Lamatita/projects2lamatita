<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau des Scores - Lamatita</title>

<style>
:root {
    --fond: #f7f3ff;
    --principal: #6c63ff;
    --secondaire: #ffb703;
    --texte: #333;
    --blanc: #ffffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
    
body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, var(--fond), #e6e1ff);
    min-height: 100vh;
    overflow-x: hidden;
}

.top-bar {
    width: 100%;
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    position: relative;
}

.back-link {
    color: var(--principal);
    text-decoration: none;
    font-weight: 600;
    font-size: 1.1em;
    transition: opacity 0.2s;
}

.back-link:hover { opacity: 0.7; }

.page-title {
    color: var(--principal);
    font-size: 1.8em;
    font-weight: 700;
    margin: 0;
}

.container {
    max-width: 850px;
    margin: 0 auto;
    padding: 20px 30px 60px;
    position: relative;
    z-index: 2;
}

.game-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.game-tab {
    padding: 10px 20px;
    border: 2px solid var(--secondaire);
    border-radius: 12px;
    background: transparent;
    color: var(--secondaire);
    font-weight: 600;
    font-family: "Segoe UI", sans-serif;
    font-size: 0.9em;
    cursor: pointer;
    transition: all 0.2s;
}

.game-tab.active {
    background: var(--secondaire);
    color: white;
}

.game-tab:not(.active):hover {
    background: rgba(255,183,3,0.1);
}

.view-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.view-tab {
    padding: 10px 20px;
    border: 2px solid var(--principal);
    border-radius: 12px;
    background: transparent;
    color: var(--principal);
    font-weight: 600;
    font-family: "Segoe UI", sans-serif;
    font-size: 0.9em;
    cursor: pointer;
    transition: all 0.2s;
}

.view-tab.active {
    background: var(--principal);
    color: white;
}

.view-tab:not(.active):hover {
    background: rgba(108,99,255,0.1);
}

.score-card {
    background: var(--blanc);
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
    padding: 30px;
    margin-bottom: 30px;
}

.score-card h2 {
    color: var(--principal);
    font-size: 1.4em;
    margin-bottom: 20px;
    text-align: center;
}

.stats-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.stat-box {
    background: var(--fond);
    border-radius: 12px;
    padding: 15px 25px;
    text-align: center;
    min-width: 120px;
}

.stat-box .stat-value {
    font-size: 2em;
    font-weight: 700;
    color: var(--principal);
}

.stat-box .stat-label {
    font-size: 0.85em;
    color: #888;
    margin-top: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead th {
    background: var(--principal);
    color: var(--blanc);
    padding: 12px 15px;
    text-align: left;
    font-weight: 600;
    font-size: 0.95em;
}

thead th:first-child { border-radius: 10px 0 0 0; }
thead th:last-child { border-radius: 0 10px 0 0; }

tbody tr {
    border-bottom: 1px solid #f0ecff;
    transition: background 0.2s;
}

tbody tr:hover {
    background: #f7f3ff;
}

tbody td {
    padding: 12px 15px;
    color: var(--texte);
    font-size: 0.95em;
}

.rank-cell {
    font-weight: 700;
    text-align: center;
    width: 50px;
}

.rank-1 { color: #FFD700; font-size: 1.3em; }
.rank-2 { color: #C0C0C0; font-size: 1.2em; }
.rank-3 { color: #CD7F32; font-size: 1.1em; }

.badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.8em;
    font-weight: 600;
}

.badge-chrono {
    background: #e8f5e9;
    color: #2e7d32;
}

.badge-flemme {
    background: #fff3e0;
    color: #e65100;
}

.badge-hint {
    background: #fff8e1;
    color: #f57f17;
}

.badge-difficulty {
    background: #e3f2fd;
    color: #1565c0;
}

.konami-time {
    background: linear-gradient(135deg, #f3e5f5, #ede7f6);
    padding: 4px 8px;
    border-radius: 8px;
    font-weight: 700;
}

.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #888;
}

.empty-state .emoji {
    font-size: 4em;
    margin-bottom: 15px;
}

.empty-state p {
    font-size: 1.1em;
    margin-bottom: 20px;
}

.btn-play {
    display: inline-block;
    background: var(--principal);
    color: var(--blanc);
    padding: 12px 30px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1.1em;
    transition: all 0.3s ease;
    border: none;
    cursor: pointer;
}

.btn-play:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(108, 99, 255, 0.3);
}

.actions-row {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.group-label {
    font-size: 0.8em;
    color: #888;
    font-weight: 400;
}

.falling {
    position: fixed;
    top: -10%;
    animation: fall linear infinite;
    pointer-events: none;
    z-index: 0;
}

.confetti { width: 12px; height: 12px; opacity: 0.8; }
.lama { font-size: 2rem; }
.c1 { background: var(--principal); }
.c2 { background: var(--secondaire); }
.c3 { background: #ff6f91; }
.c4 { background: #00c9a7; }
.c5 { background: #845ec2; }

@keyframes fall {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(120vh) rotate(var(--rotation)); }
}
</style>
</head>

<body>

<div class="falling confetti c1" style="left:5%; animation-duration:5s; --rotation:720deg;"></div>
<div class="falling lama" style="left:12%; animation-duration:7s; --rotation:-1080deg;">🦙</div>
<div class="falling confetti c2" style="left:18%; animation-duration:6s; --rotation:540deg;"></div>
<div class="falling lama" style="left:25%; animation-duration:8s; --rotation:900deg;">🦙</div>
<div class="falling confetti c3" style="left:32%; animation-duration:4.5s; --rotation:-720deg;"></div>
<div class="falling lama" style="left:38%; animation-duration:6.5s; --rotation:1260deg;">🦙</div>
<div class="falling confetti c4" style="left:45%; animation-duration:5.8s; --rotation:360deg;"></div>
<div class="falling lama" style="left:52%; animation-duration:7.2s; --rotation:-1440deg;">🦙</div>
<div class="falling confetti c5" style="left:60%; animation-duration:6.1s; --rotation:900deg;"></div>
<div class="falling lama" style="left:67%; animation-duration:8.5s; --rotation:-1080deg;">🦙</div>
<div class="falling confetti c1" style="left:74%; animation-duration:5.3s; --rotation:720deg;"></div>
<div class="falling lama" style="left:82%; animation-duration:7.9s; --rotation:1620deg;">🦙</div>
<div class="falling confetti c2" style="left:90%; animation-duration:6.7s; --rotation:-900deg;"></div>

<div class="top-bar">
    <a href="index.html" class="back-link" data-testid="link-back">← Retour à l'accueil</a>
    <h1 class="page-title" data-testid="text-page-title">Tableau des Scores</h1>
    <div style="width: 160px;"></div>
</div>

<div class="container">
    <div class="game-tabs" id="game-tabs" data-testid="game-tabs"></div>
    <div class="view-tabs" id="view-tabs" data-testid="view-tabs"></div>

    <div class="score-card">
        <h2 id="view-title" data-testid="text-view-title">Classement Général</h2>
        <div class="stats-row" id="stats-row" data-testid="stats-row"></div>
        <div id="scores-content" data-testid="scores-content"></div>
        <div class="actions-row" id="actions-row"></div>
    </div>
</div>

<script>
(function() {
    var currentView = 'general';
    var currentGame = 'solitaire';
    var currentUser = '';
    var userGroups = [];

    var GAMES = {
        solitaire: { label: '🃏 Solitaire', link: 'solitaire.html', emoji: '🃏' },
        snake:     { label: '🐍 Snake',     link: 'snake.html',     emoji: '🐍' },
        ppg:       { label: '🐾 Papatte Patoune Griffes', link: 'papatte_patoune_griffes.html', emoji: '🐾' },
        morpion:   { label: '❌⭕ Morpion', link: 'morpion.html', emoji: '❌' }
    };

    function formatTime(seconds) {
        var mins = Math.floor(seconds / 60);
        var secs = seconds % 60;
        return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
    }

    function formatDate(isoStr) {
        var d = new Date(isoStr);
        var day = String(d.getDate()).padStart(2, '0');
        var month = String(d.getMonth() + 1).padStart(2, '0');
        var year = d.getFullYear();
        var hours = String(d.getHours()).padStart(2, '0');
        var minutes = String(d.getMinutes()).padStart(2, '0');
        return day + '/' + month + '/' + year + ' ' + hours + ':' + minutes;
    }

    function getRankIcon(rank) {
        if (rank === 1) return '\uD83E\uDD47';
        if (rank === 2) return '\uD83E\uDD48';
        if (rank === 3) return '\uD83E\uDD49';
        return rank;
    }

    function renderGameTabs() {
        var el = document.getElementById('game-tabs');
        var html = '';
        var keys = Object.keys(GAMES);
        for (var i = 0; i < keys.length; i++) {
            var g = keys[i];
            var isActive = currentGame === g;
            html += '<button class="game-tab' + (isActive ? ' active' : '') + '" data-testid="game-tab-' + g + '" onclick="switchGame(\'' + g + '\')">' + GAMES[g].label + '</button>';
        }
        el.innerHTML = html;
    }

    function renderTabs() {
        var tabsEl = document.getElementById('view-tabs');
        var html = '<button class="view-tab' + (currentView === 'general' ? ' active' : '') + '" data-testid="tab-general" onclick="switchView(\'general\')">\uD83C\uDF0D G\u00e9n\u00e9ral</button>';

        if (currentUser) {
            html += '<button class="view-tab' + (currentView === 'personal' ? ' active' : '') + '" data-testid="tab-personal" onclick="switchView(\'personal\')">\uD83D\uDC64 Mes Scores</button>';

            for (var i = 0; i < userGroups.length; i++) {
                var g = userGroups[i];
                var isActive = currentView === 'group_' + g.id;
                html += '<button class="view-tab' + (isActive ? ' active' : '') + '" data-testid="tab-group-' + g.id + '" onclick="switchView(\'group_' + g.id + '\')">\uD83D\uDC65 ' + g.name + '</button>';
            }
        }

        tabsEl.innerHTML = html;
    }

    function renderSolitaireTable(scores, showGroup) {
        var statsRow = document.getElementById('stats-row');
        var content = document.getElementById('scores-content');
        var actionsRow = document.getElementById('actions-row');

        if (scores.length === 0) {
            statsRow.innerHTML = '';
            content.innerHTML = '<div class="empty-state">' +
                '<div class="emoji">\uD83E\uDD99</div>' +
                '<p>Aucun temps enregistr\u00e9 pour le moment !</p>' +
                '<a href="solitaire.html" class="btn-play" data-testid="link-play-solitaire">\uD83C\uDCCF Jouer au Solitaire</a>' +
                '</div>';
            actionsRow.innerHTML = '';
            return;
        }

        var bestTime = scores[0].time;
        var totalEntries = scores.length;
        var avgTime = Math.round(scores.reduce(function(sum, s) { return sum + s.time; }, 0) / totalEntries);

        statsRow.innerHTML =
            '<div class="stat-box"><div class="stat-value" data-testid="text-total">' + totalEntries + '</div><div class="stat-label">' + (currentView === 'personal' ? 'Parties gagn\u00e9es' : 'Joueurs') + '</div></div>' +
            '<div class="stat-box"><div class="stat-value" data-testid="text-best-time">' + formatTime(bestTime) + '</div><div class="stat-label">Meilleur temps</div></div>' +
            '<div class="stat-box"><div class="stat-value" data-testid="text-avg-time">' + formatTime(avgTime) + '</div><div class="stat-label">Temps moyen</div></div>';

        var html = '<table data-testid="table-scores"><thead><tr>' +
            '<th>#</th><th>Joueur</th><th>Temps</th><th>Mode</th><th>Date</th>' +
            '</tr></thead><tbody>';

        for (var i = 0; i < scores.length; i++) {
            var s = scores[i];
            var rankClass = '';
            if (i === 0) rankClass = ' rank-1';
            else if (i === 1) rankClass = ' rank-2';
            else if (i === 2) rankClass = ' rank-3';

            var playerDisplay = s.player;
            if (showGroup && s.groupName) {
                playerDisplay += ' <span class="group-label">(' + s.groupName + ')</span>';
            }

            var timeDisplay = formatTime(s.time);
            if (s.konami) {
                timeDisplay = '<span class="konami-time">\uD83E\uDD99 ' + timeDisplay + ' \uD83E\uDD99</span>';
            }

            var modeBadge = '<span class="badge ' + (s.timerMode === 'CHRONO' ? 'badge-chrono' : 'badge-flemme') + '">' +
                (s.timerMode === 'CHRONO' ? '\u23F1 Chrono' : '\uD83D\uDE34 Flemme') + '</span>';
            if (s.hintMode) {
                modeBadge += ' <span class="badge badge-hint">\uD83D\uDCA1 Indices</span>';
            }

            html += '<tr data-testid="row-score-' + i + '">' +
                '<td class="rank-cell' + rankClass + '">' + getRankIcon(i + 1) + '</td>' +
                '<td>' + playerDisplay + '</td>' +
                '<td><strong>' + timeDisplay + '</strong></td>' +
                '<td>' + modeBadge + '</td>' +
                '<td>' + formatDate(s.date) + '</td>' +
                '</tr>';
        }

        html += '</tbody></table>';
        content.innerHTML = html;

        actionsRow.innerHTML =
            '<a href="solitaire.html" class="btn-play" data-testid="link-play-again">\uD83C\uDCCF Jouer</a>';
    }

    function renderSnakeTable(scores, showGroup) {
        var statsRow = document.getElementById('stats-row');
        var content = document.getElementById('scores-content');
        var actionsRow = document.getElementById('actions-row');

        if (scores.length === 0) {
            statsRow.innerHTML = '';
            content.innerHTML = '<div class="empty-state">' +
                '<div class="emoji">\uD83D\uDC0D</div>' +
                '<p>Aucun score enregistr\u00e9 pour le moment !</p>' +
                '<a href="snake.html" class="btn-play" data-testid="link-play-snake">\uD83D\uDC0D Jouer au Snake</a>' +
                '</div>';
            actionsRow.innerHTML = '';
            return;
        }

        var bestScore = scores[0].score;
        var totalEntries = scores.length;
        var avgScore = Math.round(scores.reduce(function(sum, s) { return sum + (s.score || 0); }, 0) / totalEntries);

        statsRow.innerHTML =
            '<div class="stat-box"><div class="stat-value" data-testid="text-total">' + totalEntries + '</div><div class="stat-label">' + (currentView === 'personal' ? 'Parties' : 'Joueurs') + '</div></div>' +
            '<div class="stat-box"><div class="stat-value" data-testid="text-best-score">' + bestScore + '</div><div class="stat-label">Meilleur score</div></div>' +
            '<div class="stat-box"><div class="stat-value" data-testid="text-avg-score">' + avgScore + '</div><div class="stat-label">Score moyen</div></div>';

        var html = '<table data-testid="table-scores"><thead><tr>' +
            '<th>#</th><th>Joueur</th><th>Score</th><th>Difficult\u00e9</th><th>Date</th>' +
            '</tr></thead><tbody>';

        for (var i = 0; i < scores.length; i++) {
            var s = scores[i];
            var rankClass = '';
            if (i === 0) rankClass = ' rank-1';
            else if (i === 1) rankClass = ' rank-2';
            else if (i === 2) rankClass = ' rank-3';

            var playerDisplay = s.player;
            if (showGroup && s.groupName) {
                playerDisplay += ' <span class="group-label">(' + s.groupName + ')</span>';
            }

            var diffBadge = s.difficulty ? '<span class="badge badge-difficulty">' + s.difficulty + '</span>' : '-';

            html += '<tr data-testid="row-score-' + i + '">' +
                '<td class="rank-cell' + rankClass + '">' + getRankIcon(i + 1) + '</td>' +
                '<td>' + playerDisplay + '</td>' +
                '<td><strong>' + (s.score || 0) + '</strong></td>' +
                '<td>' + diffBadge + '</td>' +
                '<td>' + formatDate(s.date) + '</td>' +
                '</tr>';
        }

        html += '</tbody></table>';
        content.innerHTML = html;

        actionsRow.innerHTML =
            '<a href="snake.html" class="btn-play" data-testid="link-play-again">\uD83D\uDC0D Jouer</a>';
    }

    function renderPPGTable(scores, showGroup) {
        var statsRow = document.getElementById('stats-row');
        var content = document.getElementById('scores-content');
        var actionsRow = document.getElementById('actions-row');

        if (scores.length === 0) {
            statsRow.innerHTML = '';
            content.innerHTML = '<div class="empty-state">' +
                '<div class="emoji">\uD83D\uDC3E</div>' +
                '<p>Aucun score enregistr\u00e9 pour le moment !</p>' +
                '<a href="papatte_patoune_griffes.html" class="btn-play" data-testid="link-play-ppg">\uD83D\uDC3E Jouer \u00e0 PPG</a>' +
                '</div>';
            actionsRow.innerHTML = '';
            return;
        }

        var bestScore = scores[0].score;
        var totalEntries = scores.length;

        statsRow.innerHTML =
            '<div class="stat-box"><div class="stat-value" data-testid="text-total">' + totalEntries + '</div><div class="stat-label">' + (currentView === 'personal' ? 'Parties' : 'Joueurs') + '</div></div>' +
            '<div class="stat-box"><div class="stat-value" data-testid="text-best-score">' + bestScore + '</div><div class="stat-label">Plus de victoires</div></div>';

        var html = '<table data-testid="table-scores"><thead><tr>' +
            '<th>#</th><th>Joueur</th><th>Victoires</th><th>Manches</th><th>Date</th>' +
            '</tr></thead><tbody>';

        for (var i = 0; i < scores.length; i++) {
            var s = scores[i];
            var rankClass = '';
            if (i === 0) rankClass = ' rank-1';
            else if (i === 1) rankClass = ' rank-2';
            else if (i === 2) rankClass = ' rank-3';

            var playerDisplay = s.player;
            if (showGroup && s.groupName) {
                playerDisplay += ' <span class="group-label">(' + s.groupName + ')</span>';
            }

            html += '<tr data-testid="row-score-' + i + '">' +
                '<td class="rank-cell' + rankClass + '">' + getRankIcon(i + 1) + '</td>' +
                '<td>' + playerDisplay + '</td>' +
                '<td><strong>' + (s.score || 0) + '</strong></td>' +
                '<td>' + (s.rounds || 0) + '</td>' +
                '<td>' + formatDate(s.date) + '</td>' +
                '</tr>';
        }

        html += '</tbody></table>';
        content.innerHTML = html;

        actionsRow.innerHTML =
            '<a href="papatte_patoune_griffes.html" class="btn-play" data-testid="link-play-again">\uD83D\uDC3E Jouer</a>';
    }

    function renderMorpionTable(matches) {
        var statsRow = document.getElementById('stats-row');
        var content = document.getElementById('scores-content');
        var actionsRow = document.getElementById('actions-row');

        if (matches.length === 0) {
            statsRow.innerHTML = '';
            content.innerHTML = '<div class="empty-state">' +
                '<div class="emoji">\u274C\u2B55</div>' +
                '<p>Aucune partie de morpion enregistr\u00e9e !</p>' +
                '<a href="morpion.html" class="btn-play" data-testid="link-play-morpion">\u274C\u2B55 Jouer au Morpion</a>' +
                '</div>';
            actionsRow.innerHTML = '';
            return;
        }

        var totalMatches = matches.length;
        var modeLabels = { classic: 'Classique', duration: 'Dur\u00e9e', ultimate: 'Ultime' };
        var wins = {};
        for (var i = 0; i < matches.length; i++) {
            var m = matches[i];
            var winnerName = null;
            if (m.winner === 'X') winnerName = m.playerX;
            else if (m.winner === 'O') winnerName = m.playerO;
            if (winnerName) wins[winnerName] = (wins[winnerName] || 0) + 1;
        }
        var topWinner = '';
        var topWins = 0;
        for (var name in wins) {
            if (wins[name] > topWins) { topWins = wins[name]; topWinner = name; }
        }

        statsRow.innerHTML =
            '<div class="stat-box"><div class="stat-value" data-testid="text-total">' + totalMatches + '</div><div class="stat-label">Parties</div></div>' +
            (topWinner ? '<div class="stat-box"><div class="stat-value" data-testid="text-top-winner">' + topWinner + '</div><div class="stat-label">' + topWins + ' victoire' + (topWins > 1 ? 's' : '') + '</div></div>' : '');

        var html = '<table data-testid="table-scores"><thead><tr>' +
            '<th>#</th><th>Joueur X</th><th>VS</th><th>Joueur O</th><th>R\u00e9sultat</th><th>Mode</th><th>Date</th>' +
            '</tr></thead><tbody>';

        for (var i = 0; i < matches.length; i++) {
            var m = matches[i];
            var resultText = '';
            if (m.winner === 'X') resultText = '<span style="color:#c084fc;font-weight:700">' + m.playerX + ' \uD83C\uDFC6</span>';
            else if (m.winner === 'O') resultText = '<span style="color:#f472b6;font-weight:700">' + m.playerO + ' \uD83C\uDFC6</span>';
            else if (m.winner === 'Draw') resultText = '<span style="color:#999;font-weight:600">\uD83E\uDD1D Nul</span>';
            else resultText = '-';

            var modeText = modeLabels[m.mode] || m.mode || '-';

            html += '<tr data-testid="row-match-' + i + '">' +
                '<td>' + (i + 1) + '</td>' +
                '<td><span style="color:#c084fc;font-weight:600">\u274C ' + m.playerX + '</span></td>' +
                '<td style="text-align:center;font-weight:700;color:#6c63ff">VS</td>' +
                '<td><span style="color:#f472b6;font-weight:600">\u2B55 ' + m.playerO + '</span></td>' +
                '<td>' + resultText + '</td>' +
                '<td><span class="badge badge-chrono">' + modeText + '</span></td>' +
                '<td>' + formatDate(m.date) + '</td>' +
                '</tr>';
        }

        html += '</tbody></table>';
        content.innerHTML = html;

        actionsRow.innerHTML =
            '<a href="morpion.html" class="btn-play" data-testid="link-play-morpion">\u274C\u2B55 Jouer</a>';
    }

    function renderTable(scores, showGroup) {
        if (currentGame === 'snake') return renderSnakeTable(scores, showGroup);
        if (currentGame === 'ppg') return renderPPGTable(scores, showGroup);
        return renderSolitaireTable(scores, showGroup);
    }

    function showLoading() {
        document.getElementById('scores-content').innerHTML = '<div style="text-align:center;padding:40px;color:#888;">Chargement...</div>';
        document.getElementById('stats-row').innerHTML = '';
        document.getElementById('actions-row').innerHTML = '';
    }

    function fetchAndRender() {
        renderGameTabs();
        renderTabs();
        var titleEl = document.getElementById('view-title');
        var gameLabel = GAMES[currentGame].label;
        var gameParam = '?game=' + currentGame;
        if (currentGame === 'morpion') {
            if (currentView === 'personal') {
                titleEl.textContent = gameLabel + ' \u2014 Mes Parties \u2014 ' + currentUser;
                showLoading();
                fetch('/api/morpion/matches', { credentials: 'include' })
                    .then(function(r) { return r.ok ? r.json() : []; })
                    .then(function(matches) { renderMorpionTable(matches); })
                    .catch(function() { renderMorpionTable([]); });
            } else if (currentView.indexOf('group_') === 0) {
                var groupId = currentView.substring(6);
                var groupName = '';
                for (var i = 0; i < userGroups.length; i++) {
                    if (String(userGroups[i].id) === groupId) { groupName = userGroups[i].name; break; }
                }
                titleEl.textContent = gameLabel + ' \u2014 ' + groupName;
                showLoading();
                fetch('/api/morpion/matches?group=' + groupId, { credentials: 'include' })
                    .then(function(r) { return r.ok ? r.json() : []; })
                    .then(function(matches) { renderMorpionTable(matches); })
                    .catch(function() { renderMorpionTable([]); });
            } else {
                titleEl.textContent = gameLabel + ' \u2014 Classement G\u00e9n\u00e9ral';
                showLoading();
                fetch('/api/morpion/matches', { credentials: 'include' })
                    .then(function(r) { return r.ok ? r.json() : []; })
                    .then(function(matches) { renderMorpionTable(matches); })
                    .catch(function() { renderMorpionTable([]); });
            }
            return;
        }

        if (currentView === 'general') {
            titleEl.textContent = gameLabel + ' \u2014 Classement G\u00e9n\u00e9ral';
            showLoading();
            fetch('/api/scores/general' + gameParam)
                .then(function(r) { return r.ok ? r.json() : []; })
                .then(function(scores) { renderTable(scores, true); })
                .catch(function() { renderTable([], true); });
        } else if (currentView === 'personal') {
            titleEl.textContent = gameLabel + ' \u2014 Mes Scores \u2014 ' + currentUser;
            showLoading();
            fetch('/api/scores/personal' + gameParam, { credentials: 'include' })
                .then(function(r) { return r.ok ? r.json() : []; })
                .then(function(scores) { renderTable(scores, false); })
                .catch(function() { renderTable([], false); });
        } else if (currentView.indexOf('group_') === 0) {
            var groupId = currentView.substring(6);
            var groupName = '';
            for (var i = 0; i < userGroups.length; i++) {
                if (String(userGroups[i].id) === groupId) { groupName = userGroups[i].name; break; }
            }
            titleEl.textContent = gameLabel + ' \u2014 ' + groupName;
            showLoading();
            fetch('/api/scores/group/' + groupId + gameParam, { credentials: 'include' })
                .then(function(r) { return r.ok ? r.json() : []; })
                .then(function(scores) { renderTable(scores, false); })
                .catch(function() { renderTable([], false); });
        }
    }

    window.switchView = function(view) {
        currentView = view;
        fetchAndRender();
    };

    window.switchGame = function(game) {
        currentGame = game;
        if (game === 'morpion' && currentUser) {
            currentView = 'personal';
        } else {
            currentView = 'general';
        }
        fetchAndRender();
    };

    fetch('/api/auth/me', { credentials: 'include' })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
            if (data && data.username) {
                currentUser = data.username;
                return fetch('/api/groups', { credentials: 'include' })
                    .then(function(r) { return r.ok ? r.json() : []; })
                    .then(function(groups) { userGroups = groups; });
            }
        })
        .then(function() { fetchAndRender(); })
        .catch(function() { fetchAndRender(); });
})();
</script>
</body>
</html>
