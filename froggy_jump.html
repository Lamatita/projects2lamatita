<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Froggy Jump</title>
<style>
:root { --vert:#2d9e5a; --jaune:#ffb703; --violet:#6c63ff; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:"Segoe UI",sans-serif; background:#f0fff4; height:100vh; overflow:hidden; touch-action:none; }
.top-bar{ width:100%; padding:8px 20px; display:flex; align-items:center; justify-content:space-between; z-index:100; position:relative; }
.back-link{ background:transparent; border:2px solid var(--vert); color:var(--vert); font-weight:700; font-size:1em; padding:6px 16px; border-radius:8px; cursor:pointer; transition:.2s; text-decoration:none; }
.back-link:hover{ background:var(--vert); color:#fff; }
.page-title{ color:var(--vert); font-size:1.4em; font-weight:700; }
.top-controls{ display:flex; gap:8px; align-items:center; }
.ctrl-btn{ background:transparent; border:2px solid var(--vert); color:var(--vert); font-size:1em; padding:5px 12px; border-radius:8px; cursor:pointer; transition:.2s; font-weight:700; }
.ctrl-btn:hover{ background:var(--vert); color:#fff; }
.game-wrapper{ width:100%; height:calc(100vh - 45px); display:flex; justify-content:center; align-items:center; }
#gameCanvas{ border-radius:12px; max-width:100%; max-height:100%; position:relative; z-index:2; box-shadow:0 8px 32px rgba(0,0,0,.2); }
.falling{ position:fixed; top:-10%; animation:fall linear infinite; pointer-events:none; z-index:0; }
.confetti{ width:12px; height:12px; opacity:.8; }
.emoji-bg{ font-size:1.8rem; }
.c1{ background:var(--vert); } .c2{ background:var(--jaune); } .c3{ background:#ff6f91; } .c4{ background:#00c9a7; } .c5{ background:#845ec2; }
@keyframes fall{ 0%{ transform:translateY(0) rotate(0deg); } 100%{ transform:translateY(120vh) rotate(var(--rot)); } }
.modal-overlay{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); z-index:200; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
.modal-box{ background:#fff; border-radius:16px; padding:28px 36px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,.25); max-width:420px; width:90%; }
.modal-box h2{ color:var(--vert); font-size:1.5em; margin-bottom:6px; }
.modal-box p{ color:#555; margin-bottom:20px; font-size:.93em; }
.char-choices{ display:flex; gap:20px; justify-content:center; margin-bottom:18px; }
.char-btn{ background:#f0fff4; border:3px solid #ccc; border-radius:14px; padding:16px 22px; cursor:pointer; transition:.2s; display:flex; flex-direction:column; align-items:center; gap:8px; }
.char-btn:hover{ border-color:var(--vert); background:#e0ffec; transform:scale(1.04); }
.char-btn.selected{ border-color:var(--vert); background:#e0ffec; }
.char-name{ font-weight:700; color:var(--vert); }
.modal-start-btn{ background:var(--vert); color:#fff; border:none; border-radius:10px; padding:12px 36px; font-size:1.1em; font-weight:700; cursor:pointer; transition:.2s; }
.modal-start-btn:hover{ background:#1e7a43; }
.keys-modal{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); z-index:300; display:none; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
.keys-modal.visible{ display:flex; }
.keys-box{ background:#fff; border-radius:16px; padding:26px 34px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,.25); max-width:340px; width:90%; }
.keys-box h3{ color:var(--vert); margin-bottom:14px; font-size:1.2em; }
.key-row{ display:flex; align-items:center; gap:10px; margin:8px 0; justify-content:space-between; }
.key-row label{ color:#444; flex:1; text-align:left; }
.key-input{ border:2px solid #ccc; border-radius:8px; padding:6px 10px; font-size:1em; width:110px; text-align:center; cursor:pointer; background:#f9f9f9; font-weight:700; }
.key-input.listening{ border-color:var(--vert); background:#e0ffec; }
.keys-save-btn{ background:var(--vert); color:#fff; border:none; border-radius:9px; padding:10px 28px; font-size:1em; font-weight:700; cursor:pointer; margin-top:16px; }
.keys-save-btn:hover{ background:#1e7a43; }
body.fullscreen .top-bar{ display:none; }
body.fullscreen .game-wrapper{ height:100vh; }
</style>
</head>
<body>

<div class="falling confetti c1" style="left:3%;animation-duration:5s;--rot:720deg"></div>
<div class="falling emoji-bg"    style="left:8%;animation-duration:7.5s;--rot:-1080deg">🐸</div>
<div class="falling confetti c2" style="left:14%;animation-duration:6s;--rot:540deg"></div>
<div class="falling emoji-bg"    style="left:20%;animation-duration:8s;--rot:900deg">🦙</div>
<div class="falling confetti c3" style="left:27%;animation-duration:4.5s;--rot:-720deg"></div>
<div class="falling emoji-bg"    style="left:33%;animation-duration:6.5s;--rot:1260deg">🐸</div>
<div class="falling confetti c4" style="left:40%;animation-duration:5.8s;--rot:360deg"></div>
<div class="falling emoji-bg"    style="left:46%;animation-duration:7.2s;--rot:-1440deg">🦙</div>
<div class="falling confetti c5" style="left:53%;animation-duration:6.1s;--rot:900deg"></div>
<div class="falling emoji-bg"    style="left:59%;animation-duration:8.3s;--rot:-1080deg">🐸</div>
<div class="falling confetti c1" style="left:65%;animation-duration:5.3s;--rot:720deg"></div>
<div class="falling emoji-bg"    style="left:72%;animation-duration:7.9s;--rot:1620deg">🦙</div>
<div class="falling confetti c2" style="left:78%;animation-duration:6.7s;--rot:-900deg"></div>
<div class="falling emoji-bg"    style="left:85%;animation-duration:7.1s;--rot:540deg">🐸</div>
<div class="falling confetti c3" style="left:92%;animation-duration:5.6s;--rot:-720deg"></div>

<div class="top-bar">
  <button class="back-link" onclick="history.back()">← Retour</button>
  <h1 class="page-title">🐸 Froggy Jump</h1>
  <div class="top-controls">
    <button class="ctrl-btn" onclick="openKeysModal()">⌨️ Touches</button>
    <button class="ctrl-btn" id="btnPause" onclick="togglePause()">⏸</button>
    <button class="ctrl-btn" onclick="toggleFullscreen()">⛶</button>
  </div>
</div>
<div class="game-wrapper"><canvas id="gameCanvas"></canvas></div>

<div class="modal-overlay" id="charModal">
  <div class="modal-box">
    <h2>Choisis ton personnage</h2>
    <p>Qui va grimper jusqu'au paradis ?</p>
    <div class="char-choices">
      <div class="char-btn selected" id="btnFrog" onclick="selectChar('frog')">
        <canvas id="previewFrog" width="90" height="90"></canvas>
        <span class="char-name">🐸 Grenouille</span>
      </div>
      <div class="char-btn" id="btnLama" onclick="selectChar('lama')">
        <canvas id="previewLama" width="90" height="90"></canvas>
        <span class="char-name">🦙 Lama</span>
      </div>
    </div>
    <button class="modal-start-btn" onclick="startGame()">Jouer !</button>
  </div>
</div>

<div class="keys-modal" id="keysModal">
  <div class="keys-box">
    <h3>⌨️ Configurer les touches</h3>
    <div class="key-row">
      <label>Gauche :</label>
      <input class="key-input" id="keyLeftInput" readonly value="ArrowLeft" onclick="listenKey('keyLeftInput')">
    </div>
    <div class="key-row">
      <label>Droite :</label>
      <input class="key-input" id="keyRightInput" readonly value="ArrowRight" onclick="listenKey('keyRightInput')">
    </div>
    <button class="keys-save-btn" onclick="closeKeysModal()">Fermer</button>
  </div>
</div>

<script>
// ── Canvas ──────────────────────────────────────────────────────────
var canvas = document.getElementById('gameCanvas');
var ctx    = canvas.getContext('2d');
var W = 400, H = 600;
canvas.width = W; canvas.height = H;

// Polyfill roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = typeof r==='number'?r:( Array.isArray(r)?r[0]:0 );
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}

// ── Variables globales ───────────────────────────────────────────────
var selectedChar = 'frog';
var keyLeft  = 'ArrowLeft';
var keyRight = 'ArrowRight';
var listeningInput = null;
var etat = 'wait';  // wait | playing | gameover
var paused = false;
var score = 0, meilleur = 0;
var camY = 0;
var platforms = [], items = [], particles = [], clouds = [], stars = [];
var player = {};
var keys = {};
var tiltX = 0;
var isMobile = /Mobi|Android/i.test(navigator.userAgent);
var sourisX = -1, sourisY = -1;
var zones = {};
var GRAVITY = 0.38, JUMP_FORCE = -12, SPRING_F = -19, MOVE_SPD = 4.5;
var CHAR_R = 16, PLAT_H = 12;
var TITRE_COL = '#ffd23a';
// Transition de niveau
var lastLevelIdx = 0;
var levelTransition = null; // {name, timer, alpha}

// Polyfill findIndex
if(!Array.prototype.findIndex){
  Array.prototype.findIndex=function(fn){for(var i=0;i<this.length;i++)if(fn(this[i],i))return i;return -1;};
}

// ── Niveaux ──────────────────────────────────────────────────────────
var LEVELS = [
  { name:'Souterrain',   icon:'🪨', min:0,   max:49,   bg:['#3d2b1f','#5a3e2b'] },
  { name:'Ciel',         icon:'☀️', min:50,  max:149,  bg:['#87ceeb','#c8eeff'] },
  { name:'Stratosphère', icon:'✈️', min:150, max:299,  bg:['#5b7fa6','#9bc5e0'] },
  { name:'Espace',       icon:'🚀', min:300, max:499,  bg:['#050510','#0a0a30'] },
  { name:'Paradis',      icon:'👼', min:500, max:9999, bg:['#fff8e1','#ffe4b5'] },
];
function getLevel(s){ return LEVELS.find(function(l){return s>=l.min&&s<=l.max;})||LEVELS[4]; }

// ── UI fonctions (globales, appelées depuis HTML) ────────────────────
function selectChar(c){
  selectedChar = c;
  document.getElementById('btnFrog').classList.toggle('selected', c==='frog');
  document.getElementById('btnLama').classList.toggle('selected', c==='lama');
}
function openKeysModal(){ document.getElementById('keysModal').classList.add('visible'); }
function closeKeysModal(){
  if(listeningInput){ document.getElementById(listeningInput).classList.remove('listening'); listeningInput=null; }
  document.getElementById('keysModal').classList.remove('visible');
}
function listenKey(id){
  if(listeningInput) document.getElementById(listeningInput).classList.remove('listening');
  listeningInput = id;
  document.getElementById(id).classList.add('listening');
  document.getElementById(id).value = '…';
}
function toggleFullscreen(){ document.body.classList.toggle('fullscreen'); }
function togglePause(){
  if(etat!=='playing') return;
  paused = !paused;
  document.getElementById('btnPause').textContent = paused?'▶':'⏸';
}
function startGame(){
  document.getElementById('charModal').style.display = 'none';
  initGame();
}
function showCharModal(){
  etat='wait';
  document.getElementById('charModal').style.display='flex';
}

// ── Clavier ──────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e){
  if(listeningInput){
    e.preventDefault();
    var label = e.key===' '?'Space':e.key;
    document.getElementById(listeningInput).value = label;
    if(listeningInput==='keyLeftInput')  keyLeft  = e.key;
    if(listeningInput==='keyRightInput') keyRight = e.key;
    document.getElementById(listeningInput).classList.remove('listening');
    listeningInput = null;
    return;
  }
  if(e.key===keyLeft)  { e.preventDefault(); keys.left=true; }
  if(e.key===keyRight) { e.preventDefault(); keys.right=true; }
  if(e.key==='Escape'){
    if(etat==='playing') togglePause();
    else if(etat==='gameover') showCharModal();
  }
  if((e.key===' '||e.key==='r'||e.key==='R') && etat==='gameover') initGame();
});
document.addEventListener('keyup', function(e){
  if(e.key===keyLeft)  keys.left=false;
  if(e.key===keyRight) keys.right=false;
});

// ── Gyroscope ────────────────────────────────────────────────────────
if(isMobile && window.DeviceOrientationEvent){
  var req = DeviceOrientationEvent.requestPermission;
  if(typeof req==='function'){
    req().then(function(p){ if(p==='granted') addTilt(); });
  } else { addTilt(); }
}
function addTilt(){
  window.addEventListener('deviceorientation', function(e){
    tiltX = Math.max(-1, Math.min(1, (e.gamma||0)/30));
  });
}

// ── Génération plateformes ───────────────────────────────────────────
function platTypes(s){
  if(s<50)  return ['rock'];
  if(s<150) return ['earth','earth','earth','cloud','cloud'];
  if(s<300) return ['cloud','cloud','airplane'];
  if(s<500) return ['asteroid','asteroid','rocket'];
  return ['cloud'];
}
function makePlat(y, s){
  var types = platTypes(s);
  var type  = types[Math.floor(Math.random()*types.length)];
  var w = 60 + Math.floor(Math.random()*35);
  if(type==='cloud') w -= 10;
  var x = 10 + Math.random()*(W-w-20);
  var p = {x:x, y:y, w:w, h:PLAT_H, type:type, used:false, vx:0, dir:1};
  if(type==='airplane') p.vx = 1.2+Math.random()*0.6;
  if(type==='rocket')   p.vx = 2.2+Math.random()*0.8;
  var rnd = Math.random();
  if(s>=50  && rnd<0.09) items.push({x:x+w/2, y:y-20, type:'spring',    platRef:p, active:true});
  else if(s>=50  && rnd<0.16) items.push({x:x+w/2, y:y-22, type:'umbrella',  platRef:p, active:true});
  else if(s>=300 && rnd<0.16) items.push({x:x+w/2, y:y-22, type:'parachute', platRef:p, active:true});
  return p;
}
function generatePlatforms(){
  platforms=[]; items=[];
  platforms.push({x:W/2-50, y:H-70, w:100, h:PLAT_H, type:'earth', used:false, vx:0, dir:1});
  var lastY = H-70;
  for(var i=0;i<14;i++){
    lastY -= 80+Math.random()*50;
    platforms.push(makePlat(lastY, 0));
  }
}
function topY(){ return Math.min.apply(null, platforms.map(function(p){return p.y;})); }
function extendPlatforms(){
  while(topY() > camY - H){
    var t = topY();
    var newY = t-(80+Math.random()*50);
    // score = hauteur montée / facteur. camY est négatif quand on monte, newY aussi.
    var ws = Math.floor((H - newY) / 80);
    platforms.push(makePlat(newY, ws));
  }
  platforms = platforms.filter(function(p){return p.y-camY<H+100;});
  items     = items.filter(function(it){return it.active && it.y-camY<H+100;});
}

// ── Nuages & étoiles ─────────────────────────────────────────────────
function initClouds(){
  clouds=[];
  for(var i=0;i<8;i++) clouds.push({x:Math.random()*W, y:i*(H/7)-30, vx:(0.2+Math.random()*0.3)*(Math.random()<0.5?1:-1), s:0.6+Math.random()*0.4});
}
function initStars(){
  stars=[];
  for(var i=0;i<90;i++) stars.push({x:Math.random()*W, y:Math.random()*H*4, r:0.5+Math.random()*1.5, b:Math.random()});
}

// ── Particules ───────────────────────────────────────────────────────
function spawnParticles(x,y,col){
  for(var i=0;i<6;i++) particles.push({x:x,y:y,vx:(Math.random()-.5)*4,vy:-Math.random()*3-1,life:1,color:col||'#90f090'});
}

// ── Joueur ───────────────────────────────────────────────────────────
function initPlayer(){
  var sp=platforms[0];
  player={x:sp.x+sp.w/2, y:sp.y-CHAR_R, vy:0, dir:'right', state:'idle', item:null, itemTimer:0};
}

// ── Init ─────────────────────────────────────────────────────────────
function initGame(){
  score=0; camY=0; paused=false; particles=[];
  lastLevelIdx=0; levelTransition=null;
  etat='playing';
  document.getElementById('btnPause').textContent='⏸';
  generatePlatforms(); initClouds(); initStars(); initPlayer();
}

// ── Dessin grenouille ────────────────────────────────────────────────
// pose: 'idle'=pliées, 'jump'=tendues, 'land'=pliées
function drawFrog(c,x,y,pose){
  c.save(); c.translate(x,y);
  var bent = pose!=='jump';
  // Corps
  c.fillStyle='#5dde6f'; c.beginPath(); c.ellipse(0,0,16,12,0,0,Math.PI*2); c.fill();
  c.strokeStyle='#2d9e40'; c.lineWidth=1.5; c.beginPath(); c.ellipse(0,0,14,10,0,0,Math.PI*2); c.stroke();
  c.fillStyle='#a8f5b0'; c.beginPath(); c.ellipse(0,3,9,7,0,0,Math.PI*2); c.fill();
  // Tête
  c.fillStyle='#5dde6f'; c.beginPath(); c.ellipse(0,-13,13,10,0,0,Math.PI*2); c.fill();
  // Yeux
  c.fillStyle='#c8ffd0'; c.beginPath(); c.arc(-6,-19,5,0,Math.PI*2); c.fill(); c.beginPath(); c.arc(6,-19,5,0,Math.PI*2); c.fill();
  c.fillStyle='#1a1a2e'; c.beginPath(); c.arc(-6,-19,3,0,Math.PI*2); c.fill(); c.beginPath(); c.arc(6,-19,3,0,Math.PI*2); c.fill();
  c.fillStyle='#fff'; c.beginPath(); c.arc(-5,-20,1.1,0,Math.PI*2); c.fill(); c.beginPath(); c.arc(7,-20,1.1,0,Math.PI*2); c.fill();
  // Bouche
  c.strokeStyle='#c94040'; c.lineWidth=1.8; c.beginPath(); c.arc(0,-10,7,0.15*Math.PI,0.85*Math.PI); c.stroke();
  // Narines
  c.fillStyle='#2d9e40'; c.beginPath(); c.arc(-3,-13,1.2,0,Math.PI*2); c.fill(); c.beginPath(); c.arc(3,-13,1.2,0,Math.PI*2); c.fill();
  // Pattes arrière
  c.strokeStyle='#2d9e40'; c.lineWidth=3;
  if(bent){
    c.beginPath(); c.moveTo(-12,6); c.lineTo(-18,12); c.lineTo(-14,18); c.stroke();
    c.beginPath(); c.moveTo(12,6);  c.lineTo(18,12);  c.lineTo(14,18);  c.stroke();
    c.fillStyle='#2d9e40';
    c.beginPath(); c.ellipse(-13,20,7,3,-0.3,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(13,20,7,3,0.3,0,Math.PI*2); c.fill();
  } else {
    c.beginPath(); c.moveTo(-10,8); c.lineTo(-22,16); c.lineTo(-26,24); c.stroke();
    c.beginPath(); c.moveTo(10,8);  c.lineTo(22,16);  c.lineTo(26,24);  c.stroke();
    c.fillStyle='#2d9e40';
    c.beginPath(); c.ellipse(-25,25,7,3,-0.6,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(25,25,7,3,0.6,0,Math.PI*2); c.fill();
  }
  // Pattes avant
  c.strokeStyle='#2d9e40'; c.lineWidth=2.5;
  c.beginPath(); c.moveTo(-12,-4); c.lineTo(-16,2); c.stroke();
  c.beginPath(); c.moveTo(12,-4);  c.lineTo(16,2);  c.stroke();
  c.restore();
}

// ── Dessin lama ──────────────────────────────────────────────────────
function drawLama(c,x,y,dir){
  c.save(); c.translate(x,y);
  if(dir==='left') c.scale(-1,1);
  c.strokeStyle='#DCBC8C'; c.lineWidth=3; c.beginPath(); c.arc(-32,-2,8,Math.PI*0.3,Math.PI*1.1); c.stroke();
  c.fillStyle='#DCBC8C'; [-28,-20,-10,-2].forEach(function(lx){ c.fillRect(lx,8,6,12); });
  c.fillStyle='#FFF0C8'; c.beginPath(); c.ellipse(-15,0,20,13,0,0,Math.PI*2); c.fill();
  c.strokeStyle='#DCBC8C'; c.lineWidth=1.5; c.beginPath(); c.ellipse(-15,0,18,11,0,0,Math.PI*2); c.stroke();
  c.fillStyle='#FFF0C8'; c.beginPath(); c.moveTo(-4,-5); c.lineTo(2,-5); c.lineTo(5,-18); c.lineTo(-2,-19); c.closePath(); c.fill();
  c.fillStyle='#FFF0C8'; c.beginPath(); c.ellipse(9,-15,12,9,0,0,Math.PI*2); c.fill();
  c.fillStyle='#DCBC8C'; c.beginPath(); c.ellipse(15,-11,8,5,0,0,Math.PI*2); c.fill();
  c.fillStyle='#FFA096'; c.beginPath(); c.arc(12,-9,2,0,Math.PI*2); c.fill(); c.beginPath(); c.arc(18,-9,2,0,Math.PI*2); c.fill();
  c.fillStyle='#1E1408'; c.beginPath(); c.arc(5,-18,3,0,Math.PI*2); c.fill();
  c.fillStyle='#fff'; c.beginPath(); c.arc(6,-19,1,0,Math.PI*2); c.fill();
  c.fillStyle='#FFF0C8';
  c.beginPath(); c.moveTo(2,-22); c.lineTo(0,-30); c.lineTo(7,-22); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(11,-22); c.lineTo(9,-30); c.lineTo(16,-22); c.closePath(); c.fill();
  c.restore();
}

// ── Items ────────────────────────────────────────────────────────────
function drawItemAt(c,x,y,type){
  c.save(); c.translate(x,y);
  if(type==='spring'){
    c.strokeStyle='#c8b020'; c.lineWidth=2.5;
    for(var i=0;i<4;i++){ var ay=i*4; c.beginPath(); c.moveTo(-5,ay); c.quadraticCurveTo(6,ay+2,-5,ay+4); c.stroke(); }
    c.fillStyle='#e0d040'; c.fillRect(-6,-2,12,4);
  } else if(type==='umbrella'){
    c.fillStyle='#e040fb'; c.beginPath(); c.arc(0,-4,12,Math.PI,0); c.fill();
    c.strokeStyle='#880099'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(0,-4); c.lineTo(0,10); c.stroke();
    c.beginPath(); c.arc(-8,-4,12,Math.PI*0.35,Math.PI*0.65); c.stroke();
    c.beginPath(); c.arc(8,-4,12,Math.PI*0.35,Math.PI*0.65); c.stroke();
  } else if(type==='parachute'){
    c.fillStyle='#ff8040'; c.beginPath(); c.arc(0,-4,14,Math.PI,0); c.fill();
    c.strokeStyle='#cc4000'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(-12,-4); c.lineTo(0,10); c.stroke();
    c.beginPath(); c.moveTo(12,-4);  c.lineTo(0,10); c.stroke();
    c.beginPath(); c.moveTo(0,-4);   c.lineTo(0,10); c.stroke();
  }
  c.restore();
}

// ── Plateformes ──────────────────────────────────────────────────────
function drawPlatform(p, off){
  var sy = p.y - off;
  if(sy>H+20||sy<-30) return;
  ctx.save(); ctx.translate(p.x,sy);
  var w=p.w;

  if(p.type==='rock'){
    ctx.fillStyle='#8a7060'; ctx.beginPath();
    ctx.moveTo(0,PLAT_H); ctx.lineTo(w*.1,PLAT_H*.3); ctx.lineTo(w*.3,0); ctx.lineTo(w*.65,0); ctx.lineTo(w*.9,PLAT_H*.2); ctx.lineTo(w,PLAT_H);
    ctx.closePath(); ctx.fill(); ctx.strokeStyle='#5a4030'; ctx.lineWidth=1.5; ctx.stroke();
  } else if(p.type==='earth'){
    ctx.fillStyle='#50b432'; ctx.fillRect(0,0,w,PLAT_H);
    ctx.fillStyle='#8B5A2B'; ctx.fillRect(0,PLAT_H*.5,w,PLAT_H*.5);
    ctx.strokeStyle='#2a8a18'; ctx.lineWidth=1;
    for(var gx=6;gx<w-4;gx+=10){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx-2,-5); ctx.stroke(); ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx+2,-4); ctx.stroke(); }
  } else if(p.type==='cloud'){
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.beginPath(); ctx.ellipse(w/2,PLAT_H/2,w/2,PLAT_H/2+4,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*.25,-2,10,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*.5,-4,13,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*.75,-2,10,0,Math.PI*2); ctx.fill();
  } else if(p.type==='asteroid'){
    ctx.fillStyle='#666'; ctx.beginPath();
    ctx.moveTo(0,PLAT_H*.5); ctx.lineTo(w*.15,0); ctx.lineTo(w*.45,-PLAT_H*.3); ctx.lineTo(w*.8,0); ctx.lineTo(w,PLAT_H*.4); ctx.lineTo(w*.7,PLAT_H*1.2); ctx.lineTo(w*.2,PLAT_H*1.1);
    ctx.closePath(); ctx.fill(); ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.arc(w*.3,PLAT_H*.6,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w*.7,PLAT_H*.3,3,0,Math.PI*2); ctx.fill();
  } else if(p.type==='airplane'){
    ctx.fillStyle='#d0e8ff'; ctx.fillRect(0,0,w,PLAT_H*.6);
    ctx.fillStyle='#b0d0ff';
    ctx.beginPath(); ctx.moveTo(w*.3,PLAT_H*.3); ctx.lineTo(w*.2,PLAT_H*1.4); ctx.lineTo(w*.5,PLAT_H*.5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(w*.3,PLAT_H*.3); ctx.lineTo(w*.2,-PLAT_H*.8); ctx.lineTo(w*.5,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#5ab0ff'; ctx.beginPath(); ctx.arc(w*.65,PLAT_H*.3,4,0,Math.PI*2); ctx.fill();
  } else if(p.type==='rocket'){
    ctx.fillStyle='#ff9060'; ctx.fillRect(0,0,w*.6,PLAT_H);
    ctx.fillStyle='#ff5020'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(w*.6,0); ctx.lineTo(w*.3,-12); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffd040'; ctx.beginPath(); ctx.ellipse(w*.3,PLAT_H+6,6,7,0,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ── Fond ─────────────────────────────────────────────────────────────
function drawBackground(off){
  var lvl = getLevel(score);
  var grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,lvl.bg[0]); grad.addColorStop(1,lvl.bg[1]);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  if(score>=300&&score<500){
    stars.forEach(function(s){
      var sy=((s.y-off*.25)%(H*4)+H*4)%(H*4)-H;
      var b=0.4+s.b*0.6*(0.8+0.2*Math.sin(Date.now()*.002+s.y));
      ctx.fillStyle='rgba(255,255,255,'+b+')';
      ctx.beginPath(); ctx.arc(s.x,sy,s.r,0,Math.PI*2); ctx.fill();
    });
    var py=((H*1.5-off*.1)%(H*5)+H*5)%(H*5)-H;
    ctx.fillStyle='rgba(140,90,200,0.35)'; ctx.beginPath(); ctx.arc(W*.82,py,32,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(180,130,240,0.3)'; ctx.lineWidth=8;
    ctx.beginPath(); ctx.ellipse(W*.82,py,55,18,-0.4,0,Math.PI*2); ctx.stroke();
  }
  if(score>=500){
    var t=Date.now()*.001;
    for(var i=0;i<5;i++){
      var ax=(i*80+20)%W, ay=((i*120-off*.15)%(H*3)+H*3)%(H*3)-H;
      ctx.fillStyle='rgba(255,210,60,0.25)'; ctx.beginPath(); ctx.arc(ax,ay,9,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,200,60,0.15)'; ctx.beginPath(); ctx.ellipse(ax,ay-17,16,7,Math.sin(t+i)*.2,0,Math.PI*2); ctx.fill();
    }
  }
  if(score<300){
    clouds.forEach(function(c){
      c.x+=c.vx; if(c.x>W+80)c.x=-80; if(c.x<-80)c.x=W+80;
      var sy=c.y-off; if(sy>H+60||sy<-60) return;
      ctx.fillStyle='rgba(255,255,255,0.75)';
      [[0,0,18],[18,0,22],[36,0,18],[9,-12,16],[27,-12,16]].forEach(function(d){
        ctx.beginPath(); ctx.arc(c.x+d[0]*c.s,sy+d[1]*c.s,d[2]*c.s,0,Math.PI*2); ctx.fill();
      });
    });
  }
  if(score<50){
    ctx.fillStyle='rgba(100,70,30,0.18)';
    for(var i=0;i<6;i++){
      var fx=(i*67+20)%W, fy=((i*90-off*.04)%H+H)%H;
      ctx.beginPath(); ctx.ellipse(fx,fy,12,6,0.5,0,Math.PI*2); ctx.fill();
    }
  }
}

// ── Update ───────────────────────────────────────────────────────────
function update(){
  var dx=0;
  if(isMobile){ dx=tiltX*MOVE_SPD; }
  else { if(keys.left)dx=-MOVE_SPD; if(keys.right)dx=MOVE_SPD; }
  if(dx!==0) player.dir=dx>0?'right':'left';
  player.x+=dx;
  if(player.x<-CHAR_R) player.x=W+CHAR_R;
  if(player.x>W+CHAR_R) player.x=-CHAR_R;

  var grav=GRAVITY;
  if(player.item==='umbrella'||player.item==='parachute') grav*=0.35;
  player.vy+=grav; player.y+=player.vy;
  player.state = player.vy<-1?'jump':'idle';

  if(player.item){ player.itemTimer--; if(player.itemTimer<=0) player.item=null; }

  if(player.vy>=0){
    for(var i=0;i<platforms.length;i++){
      var p=platforms[i]; if(p.used) continue;
      var pl=player.x-CHAR_R+4, pr=player.x+CHAR_R-4;
      var prevY=player.y-player.vy;
      if(pl<p.x+p.w && pr>p.x && player.y>=p.y && prevY<=p.y+p.h+2){
        var it=null;
        for(var j=0;j<items.length;j++){ if(items[j].platRef===p&&items[j].active){it=items[j];break;} }
        var force=JUMP_FORCE;
        if(it){
          player.item=it.type; player.itemTimer=it.type==='spring'?1:300; it.active=false;
          if(it.type==='spring') force=SPRING_F;
        } else if(player.item==='spring'){ force=SPRING_F; player.item=null; }
        player.vy=force; player.y=p.y; player.state='land';
        if(p.type==='cloud') p.used=true;
        if(p.type==='asteroid') player.x+=(player.x-(p.x+p.w/2))*0.2;
        spawnParticles(player.x, p.y, '#90f090');
        break;
      }
    }
  }

  platforms.forEach(function(p){
    if(p.vx!==0){ p.x+=p.vx*p.dir; if(p.x+p.w>W||p.x<0) p.dir*=-1; }
  });

  var screenY=player.y-camY;
  if(screenY<H*0.42){
    camY-=H*0.42-screenY;
    // score = distance montée depuis départ (player.y part de H-70-CHAR_R ≈ H)
    // On convertit la position absolue monde en score
    var ns=Math.floor((H - player.y) / 80);
    if(ns>score) score=ns;
    if(score>meilleur) meilleur=score;
  }
  extendPlatforms();
  if(player.y-camY>H+60) etat='gameover';

  // Détection changement de niveau
  var curLvlIdx = LEVELS.findIndex(function(l){return score>=l.min&&score<=l.max;});
  if(curLvlIdx<0) curLvlIdx=LEVELS.length-1;
  if(curLvlIdx !== lastLevelIdx && curLvlIdx > 0){
    levelTransition = { name: LEVELS[curLvlIdx].name, icon: LEVELS[curLvlIdx].icon, timer: 180, alpha: 0 };
    lastLevelIdx = curLvlIdx;
  }
  if(levelTransition){
    if(levelTransition.timer>120) levelTransition.alpha = (180-levelTransition.timer)/60;
    else if(levelTransition.timer<60) levelTransition.alpha = levelTransition.timer/60;
    else levelTransition.alpha = 1;
    levelTransition.timer--;
    if(levelTransition.timer<=0) levelTransition=null;
  }

  particles.forEach(function(p){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.05; });
  particles=particles.filter(function(p){return p.life>0;});
}

// ── Draw ─────────────────────────────────────────────────────────────
function draw(){
  var off=camY;
  drawBackground(off);
  platforms.forEach(function(p){ if(!p.used) drawPlatform(p,off); });
  items.forEach(function(it){ if(it.active) drawItemAt(ctx,it.x,it.y-off,it.type); });
  particles.forEach(function(p){
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y-off,3,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  });
  if(selectedChar==='frog') drawFrog(ctx,player.x,player.y-off,player.state);
  else drawLama(ctx,player.x,player.y-off,player.dir);
  if(player.item) drawItemAt(ctx,player.x,player.y-off-26,player.item);

  // HUD score
  ctx.fillStyle='#fff'; ctx.font='bold 32px "Consolas","Courier New",monospace';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=6;
  ctx.fillText(score,W/2,12); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='11px "Consolas","Courier New",monospace';
  ctx.textAlign='left'; ctx.fillText(getLevel(score).name,8,14);

  // Bouton sortie plein écran (affiché seulement si fullscreen actif)
  if(document.body.classList.contains('fullscreen')){
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(W-90,6,84,26);
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1;
    ctx.strokeRect(W-90,6,84,26);
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font='11px "Segoe UI",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⛶ Quitter FS',W-48,19);
    zones.exitFS={x:W-90,y:6,w:84,h:26};
  } else {
    zones.exitFS=null;
  }

  // Bannière transition niveau
  if(levelTransition && levelTransition.alpha>0){
    var tr=levelTransition;
    ctx.globalAlpha=tr.alpha;
    // Fond de la bannière
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(0, H/2-44, W, 88);
    // Ligne dorée haut et bas
    ctx.fillStyle='rgba(255,210,50,0.8)';
    ctx.fillRect(0,H/2-44,W,3);
    ctx.fillRect(0,H/2+41,W,3);
    // Texte
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 28px "Consolas","Courier New",monospace';
    ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=10;
    ctx.fillText(tr.icon+' '+tr.name, W/2, H/2-12);
    ctx.shadowBlur=0;
    ctx.font='13px "Consolas","Courier New",monospace';
    ctx.fillStyle='rgba(255,220,80,0.95)';
    ctx.fillText('Nouveau niveau atteint !', W/2, H/2+18);
    ctx.globalAlpha=1;
  }

  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawPaused(){
  draw();
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.font='bold 40px "Consolas","Courier New",monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('PAUSE',W/2,H/2-18);
  ctx.font='15px "Consolas","Courier New",monospace'; ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('[ESC] pour reprendre',W/2,H/2+22);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawGameOver(){
  draw();
  ctx.fillStyle='rgba(10,5,30,0.7)'; ctx.fillRect(0,0,W,H);
  var pw=300,ph=250,px=W/2-pw/2,py=H/2-ph/2-20;
  ctx.fillStyle='rgba(10,20,8,0.92)'; ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle='rgba(255,80,80,0.7)'; ctx.lineWidth=2.5; ctx.strokeRect(px,py,pw,ph);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold 36px "Consolas","Courier New",monospace'; ctx.fillStyle='#ff5a5a';
  ctx.fillText('GAME OVER',W/2,py+50);
  ctx.fillStyle='#fff'; ctx.font='bold 22px "Consolas","Courier New",monospace';
  ctx.fillText('Score : '+score,W/2,py+106);
  ctx.fillStyle=TITRE_COL; ctx.font='bold 16px "Consolas","Courier New",monospace';
  ctx.fillText('Meilleur : '+meilleur,W/2,py+142);
  var bw=118,bh=40,gap=12,bby=py+178;
  var bx1=W/2-bw-gap/2, bx2=W/2+gap/2;
  zones={};
  [['Rejouer',bx1,'rgba(45,158,90,0.9)','#80d840'],['Menu',bx2,'rgba(35,35,75,0.9)','#7070b8']].forEach(function(arr){
    var lbl=arr[0],bx=arr[1],col=arr[2],brd=arr[3];
    var hov=sourisX>=bx&&sourisX<=bx+bw&&sourisY>=bby&&sourisY<=bby+bh;
    ctx.fillStyle=hov?'rgba(70,180,60,0.97)':col; ctx.strokeStyle=brd; ctx.lineWidth=1.8;
    ctx.fillRect(bx,bby,bw,bh); ctx.strokeRect(bx,bby,bw,bh);
    ctx.fillStyle='#fff'; ctx.font='bold 16px "Consolas","Courier New",monospace';
    ctx.fillText(lbl,bx+bw/2,bby+bh/2);
    zones[lbl]={x:bx,y:bby,w:bw,h:bh};
  });
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='11px "Consolas","Courier New",monospace';
  ctx.fillText('[ESPACE] Rejouer  [ESC] Menu',W/2,py+ph+16);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// ── Boucle — requestAnimationFrame EN PREMIER, toujours ─────────────
function loop(){
  requestAnimationFrame(loop); // jamais interrompue
  if(etat==='wait') return;
  if(etat==='playing' && !paused) update();
  if(paused) drawPaused();
  else if(etat==='playing') draw();
  else if(etat==='gameover') drawGameOver();
}

// ── Interactions canvas ───────────────────────────────────────────────
canvas.addEventListener('mousemove', function(e){
  var r=canvas.getBoundingClientRect();
  sourisX=(e.clientX-r.left)*(W/r.width);
  sourisY=(e.clientY-r.top)*(H/r.height);
});
canvas.addEventListener('click', function(e){
  var r=canvas.getBoundingClientRect();
  var mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  // Bouton quitter plein écran (disponible tout le temps)
  if(zones.exitFS){
    var z=zones.exitFS;
    if(mx>=z.x&&mx<=z.x+z.w&&my>=z.y&&my<=z.y+z.h){ toggleFullscreen(); return; }
  }
  if(etat!=='gameover') return;
  if(zones['Rejouer']){var z=zones['Rejouer']; if(mx>=z.x&&mx<=z.x+z.w&&my>=z.y&&my<=z.y+z.h){initGame();return;}}
  if(zones['Menu']){var z=zones['Menu']; if(mx>=z.x&&mx<=z.x+z.w&&my>=z.y&&my<=z.y+z.h){showCharModal();return;}}
});

// ── Prévisualisations ────────────────────────────────────────────────
window.addEventListener('load', function(){
  var pf=document.getElementById('previewFrog');
  if(pf) drawFrog(pf.getContext('2d'),45,52,'idle');
  var pl=document.getElementById('previewLama');
  if(pl) drawLama(pl.getContext('2d'),48,56,'right');
  requestAnimationFrame(loop); // démarrage unique de la boucle
});
</script>
