<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résolveur de Sudoku</title>
<style>
:root {
  --fond: #f7f3ff;
  --principal: #6c63ff;
  --secondaire: #ffb703;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, var(--fond), #e6e1ff);
  min-height: 100vh;
  overflow-x: hidden;
}

.falling {
  position: fixed; top: -10%;
  animation: fall linear infinite;
  pointer-events: none; z-index: 0;
}
.confetti { width: 12px; height: 12px; opacity: 0.7; border-radius: 2px; }
.lama { font-size: 2rem; }
.c1 { background: var(--principal); }
.c2 { background: var(--secondaire); }
.c3 { background: #ff6f91; }
.c4 { background: #00c9a7; }
.c5 { background: #845ec2; }
@keyframes fall {
  0%   { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(110vh) rotate(var(--rotation)); }
}

.top-bar {
  width: 100%; padding: 10px 24px;
  display: flex; align-items: center;
  position: relative; z-index: 10;
}
.page-title {
  position: absolute; left: 50%; transform: translateX(-50%);
  pointer-events: none; color: var(--principal);
  font-size: 1.4em; font-weight: 700;
}
.back-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 16px 7px 12px; border-radius: 40px;
  border: 1.5px solid rgba(108,99,255,0.35);
  background: rgba(255,255,255,0.7); color: var(--principal);
  font-family: "Segoe UI", sans-serif; font-size: .92em; font-weight: 600;
  cursor: pointer; backdrop-filter: blur(6px);
  transition: all .18s; box-shadow: 0 2px 8px rgba(108,99,255,0.08);
}
.back-btn:hover {
  background: var(--principal); color: #fff; border-color: var(--principal);
  box-shadow: 0 4px 16px rgba(108,99,255,0.28); transform: translateX(-2px);
}
.back-btn svg { transition: transform .18s; }
.back-btn:hover svg { transform: translateX(-2px); }

.main {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  gap: 18px; padding: 8px 0 40px;
}

.tabs {
  display: flex;
  background: rgba(255,255,255,0.6);
  border-radius: 40px; padding: 4px;
  border: 1.5px solid rgba(108,99,255,0.2);
  backdrop-filter: blur(8px);
}
.tab-btn {
  padding: 8px 26px; border-radius: 36px; border: none;
  background: transparent; color: #9490c0;
  font-family: "Segoe UI", sans-serif; font-size: .9em; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.tab-btn.active { background: var(--principal); color: #fff; box-shadow: 0 2px 12px rgba(108,99,255,0.3); }

.panel { display: none; flex-direction: column; align-items: center; gap: 16px; }
.panel.active { display: flex; }

.grid-wrapper {
  background: rgba(255,255,255,0.78);
  border-radius: 16px; padding: 10px;
  box-shadow: 0 8px 40px rgba(108,99,255,0.18), 0 2px 8px rgba(108,99,255,0.08);
  border: 2px solid rgba(108,99,255,0.2);
  backdrop-filter: blur(10px);
}
.sudoku-grid {
  display: grid;
  grid-template-columns: repeat(9, 50px);
  grid-template-rows: repeat(9, 50px);
  border: 2.5px solid var(--principal);
  border-radius: 6px; overflow: hidden;
}
.cell {
  width: 50px; height: 50px;
  border-right: 1px solid #d4cff5;
  border-bottom: 1px solid #d4cff5;
  background: #faf9ff;
}
.cell[data-cb="1"] { border-right: 2.5px solid var(--principal); }
.cell[data-rb="1"] { border-bottom: 2.5px solid var(--principal); }

.cell input {
  width: 100%; height: 100%;
  border: none;
  background: transparent;
  text-align: center;
  font-size: 1.25em;
  font-weight: 700;
  font-family: "Segoe UI", sans-serif;
  color: #3d3a8c;
  outline: none;
  cursor: text;
  display: block;
  padding: 0;
  -webkit-appearance: none;
  appearance: none;
}
.cell input:focus  { background: #dbd6ff; }
.cell input.solved { color: var(--principal); background: #f0eeff; }
.cell input.bad    { background: #fff0f4; color: #ff4f7b; }

.btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.act-btn {
  padding: 10px 24px; border-radius: 40px;
  border: 1.5px solid rgba(108,99,255,0.35);
  background: rgba(255,255,255,0.75); color: var(--principal);
  font-size: .9em; font-weight: 600; cursor: pointer;
  transition: all .15s; backdrop-filter: blur(4px);
  font-family: "Segoe UI", sans-serif;
}
.act-btn:hover { background: var(--principal); color: #fff; border-color: var(--principal); box-shadow: 0 4px 14px rgba(108,99,255,0.28); }
.act-btn.primary { background: var(--principal); color: #fff; border-color: var(--principal); box-shadow: 0 4px 18px rgba(108,99,255,0.35); }
.act-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.4); }
.act-btn:disabled { opacity: 0.4; pointer-events: none; }

.status-msg { font-size: .88em; font-weight: 600; min-height: 20px; }
.status-msg.ok  { color: #00c9a7; }
.status-msg.err { color: #ff4f7b; }
.status-msg.inf { color: #9490c0; }

.camera-box {
  position: relative; width: 460px; height: 360px;
  border-radius: 16px; overflow: hidden;
  background: #1a1830;
  border: 2px solid rgba(108,99,255,0.3);
  box-shadow: 0 8px 40px rgba(108,99,255,0.18);
}
#video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; display: none;
}
#preview-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: contain; background: #1a1830; display: none;
}
.cam-ph {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: #9490c0;
}
.cam-ph svg { opacity: .45; }
.cam-ph p { font-size: .9em; font-weight: 500; }
.guide {
  position: absolute; inset: 8%;
  border: 2px solid rgba(108,99,255,0.75);
  border-radius: 4px; pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.38);
  display: none;
}
.guide::before, .guide::after {
  content: ''; position: absolute; background: rgba(108,99,255,0.55);
}
.guide::before { left: 33.3%; width: 1px; top: 0; bottom: 0; box-shadow: 16.7% 0 0 rgba(108,99,255,0.55); }
.guide::after  { top: 33.3%; height: 1px; left: 0; right: 0; box-shadow: 0 16.7% 0 rgba(108,99,255,0.55); }
.proc {
  position: absolute; inset: 0;
  background: rgba(45,43,85,0.78);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; color: #fff; backdrop-filter: blur(4px);
}
.proc.show { display: flex; }
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.2); border-top-color: var(--principal);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.proc p { font-size: .9em; font-weight: 600; }

.upload-label {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: 40px;
  border: 1.5px solid rgba(108,99,255,0.35);
  background: rgba(255,255,255,0.75); color: var(--principal);
  font-size: .9em; font-weight: 600; cursor: pointer;
  transition: all .15s; backdrop-filter: blur(4px);
  font-family: "Segoe UI", sans-serif;
}
.upload-label:hover { background: var(--principal); color: #fff; border-color: var(--principal); box-shadow: 0 4px 14px rgba(108,99,255,0.28); }
#file-input { display: none; }

.hint-text { font-size: .8em; color: #b0acdc; text-align: center; max-width: 400px; }
.photo-result { display: none; flex-direction: column; align-items: center; gap: 16px; }
.photo-result.show { display: flex; }
</style>
</head>
<body>

<div class="falling confetti c1" style="left:5%;  animation-duration:5s;   --rotation:720deg;"></div>
<div class="falling lama"        style="left:12%; animation-duration:7s;   --rotation:-1080deg;">🦙</div>
<div class="falling confetti c2" style="left:18%; animation-duration:6s;   --rotation:540deg;"></div>
<div class="falling lama"        style="left:25%; animation-duration:8s;   --rotation:900deg;">🦙</div>
<div class="falling confetti c3" style="left:32%; animation-duration:4.5s; --rotation:-720deg;"></div>
<div class="falling lama"        style="left:38%; animation-duration:6.5s; --rotation:1260deg;">🦙</div>
<div class="falling confetti c4" style="left:45%; animation-duration:5.8s; --rotation:360deg;"></div>
<div class="falling lama"        style="left:52%; animation-duration:7.2s; --rotation:-1440deg;">🦙</div>
<div class="falling confetti c5" style="left:60%; animation-duration:6.1s; --rotation:900deg;"></div>
<div class="falling lama"        style="left:67%; animation-duration:8.5s; --rotation:-1080deg;">🦙</div>
<div class="falling confetti c1" style="left:74%; animation-duration:5.3s; --rotation:720deg;"></div>
<div class="falling lama"        style="left:82%; animation-duration:7.9s; --rotation:1620deg;">🦙</div>
<div class="falling confetti c2" style="left:90%; animation-duration:6.7s; --rotation:-900deg;"></div>

<div class="top-bar">
  <button class="back-btn" onclick="history.back()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </button>
  <h1 class="page-title">Résolveur</h1>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab-btn active" id="tab-manual">Saisie manuelle</button>
    <button class="tab-btn"        id="tab-photo">Photo</button>
  </div>

  <div class="panel active" id="panel-manual">
    <div class="grid-wrapper">
      <div class="sudoku-grid" id="manual-grid"></div>
    </div>
    <div class="btn-row">
      <button class="act-btn"         id="btn-clear-manual">Effacer</button>
      <button class="act-btn primary" id="btn-solve-manual">Résoudre</button>
    </div>
    <div class="status-msg inf" id="status-manual">Remplis les indices puis clique sur Résoudre.</div>
  </div>

  <div class="panel" id="panel-photo">
    <div class="camera-box">
      <div class="cam-ph" id="cam-ph">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <p>Caméra inactive</p>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <img id="preview-img" alt="Aperçu">
      <canvas id="snap-canvas" style="display:none;"></canvas>
      <div class="guide" id="guide"></div>
      <div class="proc" id="proc">
        <div class="spinner"></div>
        <p>Analyse en cours…</p>
      </div>
    </div>

    <div class="btn-row">
      <button class="act-btn" id="btn-start-cam">Démarrer la caméra</button>
      <button class="act-btn" id="btn-capture" disabled>Prendre la photo</button>
      <label class="upload-label" for="file-input">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importer une image
      </label>
      <input type="file" id="file-input" accept="image/*">
    </div>

    <p class="hint-text">Place la grille dans le cadre, bien éclairée et à plat, puis prends la photo.</p>

    <div class="photo-result" id="photo-result">
      <div class="grid-wrapper">
        <div class="sudoku-grid" id="photo-grid"></div>
      </div>
      <div class="btn-row">
        <button class="act-btn"         id="btn-clear-photo">Effacer</button>
        <button class="act-btn"         id="btn-retake">Reprendre</button>
        <button class="act-btn primary" id="btn-solve-photo">Résoudre</button>
      </div>
      <div class="status-msg inf" id="status-photo"></div>
    </div>
  </div>
</div>

<script>
(function () {

  /* ══════════════════════════════════════════════════════════════
   *  SOLVEUR SUDOKU
   * ══════════════════════════════════════════════════════════════ */
  function ok(b, r, c, n) {
    for (let i = 0; i < 9; i++) {
      if (i !== c && b[r][i] === n) return false;
      if (i !== r && b[i][c] === n) return false;
    }
    const br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
    for (let i = br; i < br+3; i++)
      for (let j = bc; j < bc+3; j++)
        if ((i !== r || j !== c) && b[i][j] === n) return false;
    return true;
  }
  function solve(board) {
    for (let r = 0; r < 9; r++)
      for (let c = 0; c < 9; c++)
        if (board[r][c] === 0) {
          for (let n = 1; n <= 9; n++) {
            if (ok(board, r, c, n)) {
              board[r][c] = n;
              if (solve(board)) return true;
              board[r][c] = 0;
            }
          }
          return false;
        }
    return true;
  }
  function validClues(board) {
    for (let r = 0; r < 9; r++)
      for (let c = 0; c < 9; c++)
        if (board[r][c] !== 0 && !ok(board, r, c, board[r][c])) return false;
    return true;
  }

  /* ══════════════════════════════════════════════════════════════
   *  GRILLE DOM
   * ══════════════════════════════════════════════════════════════ */
  function buildGrid(id) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (c === 2 || c === 5) cell.dataset.cb = 1;
        if (r === 2 || r === 5) cell.dataset.rb = 1;
        const inp = document.createElement('input');
        inp.type = 'text'; inp.inputMode = 'numeric'; inp.maxLength = 1;
        inp.dataset.r = r; inp.dataset.c = c;
        inp.addEventListener('keydown', e => {
          if (inp.readOnly) return;
          if (e.key === 'Backspace' || e.key === 'Delete') { inp.value = ''; e.preventDefault(); return; }
          const dirs = { ArrowUp:[-1,0], ArrowDown:[1,0], ArrowLeft:[0,-1], ArrowRight:[0,1] };
          if (dirs[e.key]) {
            e.preventDefault();
            const [dr, dc] = dirs[e.key];
            document.querySelector(`#${id} input[data-r="${Math.min(8,Math.max(0,r+dr))}"][data-c="${Math.min(8,Math.max(0,c+dc))}"]`)?.focus();
          }
        });
        inp.addEventListener('input', () => {
          if (inp.readOnly) return;
          const v = inp.value.replace(/[^1-9]/g, '');
          inp.value = v ? v[v.length-1] : '';
          inp.className = '';
        });
        cell.appendChild(inp);
        el.appendChild(cell);
      }
    }
  }
  function readBoard(id) {
    const b = Array.from({length:9}, () => Array(9).fill(0));
    document.querySelectorAll(`#${id} input`).forEach(inp => {
      const v = parseInt(inp.value);
      if (v >= 1 && v <= 9) b[+inp.dataset.r][+inp.dataset.c] = v;
    });
    return b;
  }
  function applyResult(id, original, solved) {
    document.querySelectorAll(`#${id} input`).forEach(inp => {
      const r = +inp.dataset.r, c = +inp.dataset.c;
      inp.value = solved[r][c] || '';
      inp.readOnly = true;
      inp.className = original[r][c] !== 0 ? '' : 'solved';
    });
  }
  function clearGrid(id) {
    document.querySelectorAll(`#${id} input`).forEach(inp => { inp.value = ''; inp.className = ''; inp.readOnly = false; });
  }
  function markErrors(id, board) {
    document.querySelectorAll(`#${id} input`).forEach(inp => {
      const r = +inp.dataset.r, c = +inp.dataset.c;
      inp.classList.toggle('bad', board[r][c] !== 0 && !ok(board, r, c, board[r][c]));
    });
  }
  function status(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg; el.className = 'status-msg ' + type;
  }
  function runSolver(gridId, statusId) {
    const board = readBoard(gridId);
    if (!validClues(board)) { markErrors(gridId, board); status(statusId, 'La grille contient des contradictions.', 'err'); return; }
    const orig = board.map(r => [...r]);
    if (solve(board)) { applyResult(gridId, orig, board); status(statusId, 'Grille résolue !', 'ok'); }
    else status(statusId, 'Aucune solution trouvée.', 'err');
  }

  buildGrid('manual-grid');

  /* ══════════════════════════════════════════════════════════════
   *  ONGLETS
   * ══════════════════════════════════════════════════════════════ */
  document.getElementById('tab-manual').addEventListener('click', () => {
    document.getElementById('tab-manual').classList.add('active');
    document.getElementById('tab-photo').classList.remove('active');
    document.getElementById('panel-manual').classList.add('active');
    document.getElementById('panel-photo').classList.remove('active');
  });
  document.getElementById('tab-photo').addEventListener('click', () => {
    document.getElementById('tab-photo').classList.add('active');
    document.getElementById('tab-manual').classList.remove('active');
    document.getElementById('panel-photo').classList.add('active');
    document.getElementById('panel-manual').classList.remove('active');
  });

  document.getElementById('btn-clear-manual').addEventListener('click', () => { clearGrid('manual-grid'); status('status-manual', 'Remplis les indices puis clique sur Résoudre.', 'inf'); });
  document.getElementById('btn-solve-manual').addEventListener('click', () => runSolver('manual-grid', 'status-manual'));

  /* ══════════════════════════════════════════════════════════════
   *  CAMÉRA
   * ══════════════════════════════════════════════════════════════ */
  let stream = null;
  const video    = document.getElementById('video');
  const snapCv   = document.getElementById('snap-canvas');
  const prevImg  = document.getElementById('preview-img');
  const camPh    = document.getElementById('cam-ph');
  const guide    = document.getElementById('guide');
  const proc     = document.getElementById('proc');
  const photores = document.getElementById('photo-result');
  const btnCap   = document.getElementById('btn-capture');
  const btnCam   = document.getElementById('btn-start-cam');

  function stopStream() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.style.display = 'none'; video.srcObject = null;
    camPh.style.display = 'flex'; guide.style.display = 'none';
    btnCap.disabled = true; btnCam.textContent = 'Démarrer la caméra';
  }
  btnCam.addEventListener('click', async () => {
    if (stream) { stopStream(); return; }
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:960} } });
      video.srcObject = stream; video.style.display = 'block';
      camPh.style.display = 'none'; guide.style.display = 'block';
      prevImg.style.display = 'none'; photores.classList.remove('show');
      btnCap.disabled = false; btnCam.textContent = 'Arrêter la caméra';
    } catch { alert("Impossible d'accéder à la caméra."); }
  });
  btnCap.addEventListener('click', () => {
    snapCv.width = video.videoWidth; snapCv.height = video.videoHeight;
    snapCv.getContext('2d').drawImage(video, 0, 0);
    stopStream(); processImage(snapCv.toDataURL('image/jpeg', 0.93));
  });
  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => processImage(ev.target.result);
    reader.readAsDataURL(file); e.target.value = '';
  });
  document.getElementById('btn-retake').addEventListener('click', () => {
    photores.classList.remove('show'); prevImg.style.display = 'none'; prevImg.src = ''; camPh.style.display = 'flex';
  });
  document.getElementById('btn-clear-photo').addEventListener('click', () => { clearGrid('photo-grid'); status('status-photo', 'Grille effacée.', 'inf'); });
  document.getElementById('btn-solve-photo').addEventListener('click', () => runSolver('photo-grid', 'status-photo'));

  /* ══════════════════════════════════════════════════════════════
   *  TRAITEMENT IMAGE
   *
   *  Pipeline :
   *   1. Binarisation adaptative (seuil local) — gère l'éclairage inégal
   *   2. Détection des 10 lignes H et 10 lignes V par projection de pixels noirs
   *   3. Découpe des 81 cellules aux intersections détectées
   *   4. Chaque cellule non vide → redimensionnée en 28×28 px, normalisée,
   *      passée dans un réseau de neurones convolutif (CNN) chargé depuis
   *      TensorFlow.js. Le modèle est entraîné sur MNIST + chiffres imprimés.
   *
   *  TensorFlow.js tourne entièrement dans le navigateur — aucun serveur,
   *  aucune donnée n'est envoyée nulle part.
   * ══════════════════════════════════════════════════════════════ */

  /* ── Chargement de TF.js et du modèle ── */
  let tfModel = null;

  function loadTFScript() {
    return new Promise((resolve, reject) => {
      if (window.tf) { resolve(); return; }
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js';
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  /*
   *  On construit et entraîne le modèle directement dans le navigateur
   *  sur des données synthétiques générées à partir des chiffres Canvas.
   *
   *  POURQUOI ce choix :
   *  - Les modèles MNIST hébergés publiquement changent d'URL régulièrement
   *    et cassent les pages après quelques mois.
   *  - On génère ici ~270 exemples (30 par chiffre) en rendant chaque chiffre
   *    1-9 dans des polices, tailles, positions et rotations variées sur Canvas,
   *    puis on entraîne un petit CNN dessus (~5 secondes).
   *  - Le modèle résultant reconnaît bien les chiffres imprimés de sudoku
   *    car ils ressemblent à ces rendus Canvas (serif, sans-serif, bold).
   */
  async function buildAndTrainModel() {
    await loadTFScript();
    const tf = window.tf;

    const SIZE = 28;
    const SAMPLES_PER_DIGIT = 40;
    const fonts = [
      'bold 22px Arial',
      'bold 22px Georgia',
      'bold 20px "Times New Roman"',
      '22px Arial',
      'bold 24px Verdana',
      'bold 20px Courier',
    ];

    const xs = [], ys = [];

    for (let digit = 1; digit <= 9; digit++) {
      for (let s = 0; s < SAMPLES_PER_DIGIT; s++) {
        const cv = document.createElement('canvas');
        cv.width = cv.height = SIZE;
        const ctx = cv.getContext('2d');

        /* Fond blanc */
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, SIZE, SIZE);

        /* Légère rotation aléatoire ±10° et translation ±2px */
        const angle  = (Math.random() - 0.5) * 0.35;
        const dx     = (Math.random() - 0.5) * 4;
        const dy     = (Math.random() - 0.5) * 4;
        ctx.save();
        ctx.translate(SIZE/2 + dx, SIZE/2 + dy);
        ctx.rotate(angle);

        ctx.fillStyle = '#000';
        ctx.font      = fonts[s % fonts.length];
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(digit), 0, 0);
        ctx.restore();

        /* Convertir en niveaux de gris normalisés [0,1], fond=0, encre=1 */
        const imgData = ctx.getImageData(0, 0, SIZE, SIZE).data;
        const tensor  = new Float32Array(SIZE * SIZE);
        for (let i = 0; i < SIZE * SIZE; i++) {
          /* Inverser : fond blanc → 0, encre noire → 1 */
          const gray = (imgData[i*4] + imgData[i*4+1] + imgData[i*4+2]) / 3;
          tensor[i]  = 1 - gray / 255;
        }
        xs.push(tensor);
        ys.push(digit - 1); /* classes 0–8 pour chiffres 1–9 */
      }
    }

    const xTensor = tf.tensor4d(
      xs.flat(),
      [xs.length, SIZE, SIZE, 1]
    );
    const yTensor = tf.oneHot(tf.tensor1d(ys, 'int32'), 9);

    /* Architecture CNN légère */
    const model = tf.sequential();
    model.add(tf.layers.conv2d({ inputShape:[SIZE,SIZE,1], filters:16, kernelSize:3, activation:'relu', padding:'same' }));
    model.add(tf.layers.maxPooling2d({ poolSize:2 }));
    model.add(tf.layers.conv2d({ filters:32, kernelSize:3, activation:'relu', padding:'same' }));
    model.add(tf.layers.maxPooling2d({ poolSize:2 }));
    model.add(tf.layers.flatten());
    model.add(tf.layers.dense({ units:64, activation:'relu' }));
    model.add(tf.layers.dropout({ rate:0.3 }));
    model.add(tf.layers.dense({ units:9,  activation:'softmax' }));

    model.compile({ optimizer:'adam', loss:'categoricalCrossentropy', metrics:['accuracy'] });

    await model.fit(xTensor, yTensor, {
      epochs: 25,
      batchSize: 32,
      shuffle: true,
      verbose: 0,
    });

    xTensor.dispose();
    yTensor.dispose();
    return model;
  }

  /* ── Binarisation adaptative ── */
  function toGray(data, W, H) {
    const g = new Uint8Array(W * H);
    for (let i = 0; i < W * H; i++)
      g[i] = (77*data[i*4] + 150*data[i*4+1] + 29*data[i*4+2]) >> 8;
    return g;
  }

  function adaptiveThreshold(gray, W, H) {
    const S = new Int32Array((W+1)*(H+1));
    for (let y = 1; y <= H; y++)
      for (let x = 1; x <= W; x++)
        S[y*(W+1)+x] = gray[(y-1)*W+(x-1)] + S[(y-1)*(W+1)+x] + S[y*(W+1)+(x-1)] - S[(y-1)*(W+1)+(x-1)];

    const R   = Math.max(15, Math.round(Math.min(W,H)/16)) | 1;
    const bin = new Uint8Array(W * H);
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const x1=Math.max(0,x-R), y1=Math.max(0,y-R);
        const x2=Math.min(W,x+R+1), y2=Math.min(H,y+R+1);
        const n = (x2-x1)*(y2-y1);
        const s = S[y2*(W+1)+x2] - S[y1*(W+1)+x2] - S[y2*(W+1)+x1] + S[y1*(W+1)+x1];
        bin[y*W+x] = gray[y*W+x] < (s/n - 8) ? 1 : 0;
      }
    }
    return bin;
  }

  /* ── Détection des lignes de grille ── */
  function findGridLines(bin, W, H) {
    const rowSum = new Float32Array(H);
    const colSum = new Float32Array(W);
    for (let y = 0; y < H; y++)
      for (let x = 0; x < W; x++) {
        rowSum[y] += bin[y*W+x];
        colSum[x] += bin[y*W+x];
      }

    function findPeaks(profile, size, n) {
      const win = Math.max(3, Math.round(size/60));
      const smooth = new Float32Array(size);
      for (let i = 0; i < size; i++) {
        let s=0, c=0;
        for (let j=Math.max(0,i-win); j<=Math.min(size-1,i+win); j++) { s+=profile[j]; c++; }
        smooth[i] = s/c;
      }
      const maxVal = Math.max(...smooth);
      const thr    = maxVal * 0.35;
      const peaks  = [];
      const minGap = size / (n * 2);
      for (let i = 1; i < size-1; i++) {
        if (smooth[i] >= thr && smooth[i] >= smooth[i-1] && smooth[i] >= smooth[i+1])
          if (!peaks.length || i - peaks[peaks.length-1] > minGap)
            peaks.push(i);
      }
      return peaks;
    }

    function normalize(peaks, n, size) {
      if (peaks.length >= 2) {
        const first=peaks[0], last=peaks[peaks.length-1];
        const step=(last-first)/(n-1);
        return Array.from({length:n}, (_,i) => Math.round(first + i*step));
      }
      return Array.from({length:n}, (_,i) => Math.round(i*(size-1)/(n-1)));
    }

    return {
      rows: normalize(findPeaks(rowSum, H, 10), 10, H),
      cols: normalize(findPeaks(colSum, W, 10), 10, W),
    };
  }

  /* ── Préparation d'une cellule pour le modèle (28×28, normalisée) ── */
  function cellToTensor(bin, x0, y0, x1, y1, W) {
    const mw = Math.round((x1-x0)*0.15), mh = Math.round((y1-y0)*0.15);
    const cx0=x0+mw, cy0=y0+mh, cx1=x1-mw, cy1=y1-mh;
    const cw=cx1-cx0, ch=cy1-cy0;

    /* Test de vacuité : densité < 3% → case vide */
    let dark = 0;
    for (let y=cy0; y<cy1; y++) for (let x=cx0; x<cx1; x++) dark += bin[y*W+x];
    if (dark / (cw*ch) < 0.03) return null;

    /* Extraire la boîte englobante réelle du chiffre */
    let minX=cx1, maxX=cx0, minY=cy1, maxY=cy0;
    for (let y=cy0; y<cy1; y++)
      for (let x=cx0; x<cx1; x++)
        if (bin[y*W+x]) { minX=Math.min(minX,x); maxX=Math.max(maxX,x); minY=Math.min(minY,y); maxY=Math.max(maxY,y); }
    if (maxX<=minX || maxY<=minY) return null;

    /* Recopier dans un canvas 28×28 avec marge de 4px pour centrer */
    const SIZE = 28, PAD = 4;
    const cv   = document.createElement('canvas');
    cv.width = cv.height = SIZE;
    const ctx  = cv.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, SIZE, SIZE);

    /* Canvas intermédiaire pour la région du chiffre */
    const sw = maxX-minX+1, sh = maxY-minY+1;
    const tmp = document.createElement('canvas');
    tmp.width = sw; tmp.height = sh;
    const tctx = tmp.getContext('2d');
    /* Dessiner pixel par pixel (bin → imageData blanc/noir) */
    const idata = tctx.createImageData(sw, sh);
    for (let y=0; y<sh; y++)
      for (let x=0; x<sw; x++) {
        const v   = bin[(minY+y)*W+(minX+x)] ? 0 : 255;
        const idx = (y*sw+x)*4;
        idata.data[idx]=idata.data[idx+1]=idata.data[idx+2]=v;
        idata.data[idx+3]=255;
      }
    tctx.putImageData(idata, 0, 0);

    /* Centrer dans 28×28 en préservant le ratio */
    const ratio = Math.min((SIZE-PAD*2)/sw, (SIZE-PAD*2)/sh);
    const dw = Math.round(sw*ratio), dh = Math.round(sh*ratio);
    const dx = Math.round((SIZE-dw)/2), dy = Math.round((SIZE-dh)/2);
    ctx.drawImage(tmp, 0, 0, sw, sh, dx, dy, dw, dh);

    /* Convertir en Float32Array normalisé [0,1], fond=0, encre=1 */
    const pixels = ctx.getImageData(0,0,SIZE,SIZE).data;
    const tensor = new Float32Array(SIZE*SIZE);
    for (let i=0; i<SIZE*SIZE; i++)
      tensor[i] = 1 - (pixels[i*4]+pixels[i*4+1]+pixels[i*4+2])/(3*255);

    return tensor;
  }

  /* ── Pipeline principal ── */
  async function processImage(dataUrl) {
    prevImg.src = dataUrl;
    prevImg.style.display = 'block';
    camPh.style.display = 'none';
    proc.classList.add('show');
    document.querySelector('#proc p').textContent = 'Chargement du modèle…';
    photores.classList.remove('show');

    const img = new Image();
    await new Promise(res => { img.onload = res; img.src = dataUrl; });

    /* Entraîner le modèle si pas encore fait */
    if (!tfModel) {
      document.querySelector('#proc p').textContent = 'Entraînement du modèle (~5s)…';
      tfModel = await buildAndTrainModel();
    }

    document.querySelector('#proc p').textContent = 'Analyse de la grille…';

    /* Prétraitement image */
    const scale = Math.min(1, 900/Math.max(img.width, img.height));
    const W = Math.round(img.width*scale), H = Math.round(img.height*scale);
    const cv = document.createElement('canvas');
    cv.width=W; cv.height=H;
    cv.getContext('2d').drawImage(img, 0, 0, W, H);
    const raw  = cv.getContext('2d').getImageData(0,0,W,H).data;
    const gray = toGray(raw, W, H);
    const bin  = adaptiveThreshold(gray, W, H);
    const { rows, cols } = findGridLines(bin, W, H);

    /* Inférence cellule par cellule */
    const tf    = window.tf;
    const board = Array.from({length:9}, () => Array(9).fill(0));
    const SIZE  = 28;

    for (let r=0; r<9; r++) {
      for (let c=0; c<9; c++) {
        const tensor = cellToTensor(bin, cols[c], rows[r], cols[c+1], rows[r+1], W);
        if (!tensor) continue;

        const input  = tf.tensor4d(tensor, [1, SIZE, SIZE, 1]);
        const output = tfModel.predict(input);
        const probs  = await output.data();
        input.dispose(); output.dispose();

        /* Trouver la classe avec la probabilité maximale */
        let maxP=0, pred=0;
        for (let i=0; i<9; i++) if (probs[i] > maxP) { maxP=probs[i]; pred=i+1; }

        /* Seuil de confiance : si le modèle hésite trop, on laisse vide */
        if (maxP > 0.55) board[r][c] = pred;
      }
    }

    proc.classList.remove('show');
    buildGrid('photo-grid');
    document.querySelectorAll('#photo-grid input').forEach(inp => {
      const v = board[+inp.dataset.r][+inp.dataset.c];
      if (v) inp.value = v;
    });
    photores.classList.add('show');

    const filled = board.flat().filter(v => v!==0).length;
    status('status-photo',
      filled > 0
        ? `${filled} chiffre(s) détecté(s). Vérifie, corrige si besoin, puis clique sur Résoudre.`
        : "Aucun chiffre détecté — saisis les indices manuellement.",
      'inf');
  }

})();
</script>
