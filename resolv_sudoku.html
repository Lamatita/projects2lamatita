<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résolveur de Sudoku</title>
<style>
:root { --p: #6c63ff; --s: #ffb703; --bg: #f7f3ff; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Segoe UI",sans-serif; background:linear-gradient(135deg,var(--bg),#e6e1ff); min-height:100vh; overflow-x:hidden; }

.falling { position:fixed; top:-10%; animation:fall linear infinite; pointer-events:none; z-index:0; }
.confetti { width:12px; height:12px; opacity:.7; border-radius:2px; }
.lama { font-size:2rem; }
.c1{background:var(--p)}.c2{background:var(--s)}.c3{background:#ff6f91}.c4{background:#00c9a7}.c5{background:#845ec2}
@keyframes fall { to { transform:translateY(110vh) rotate(var(--r)); } }

.top-bar { width:100%; padding:10px 24px; display:flex; align-items:center; position:relative; z-index:10; }
.page-title { position:absolute; left:50%; transform:translateX(-50%); color:var(--p); font-size:1.4em; font-weight:700; pointer-events:none; }
.back-btn { display:flex; align-items:center; gap:7px; padding:7px 16px 7px 12px; border-radius:40px; border:1.5px solid rgba(108,99,255,.35); background:rgba(255,255,255,.7); color:var(--p); font-family:inherit; font-size:.92em; font-weight:600; cursor:pointer; transition:all .18s; }
.back-btn:hover { background:var(--p); color:#fff; transform:translateX(-2px); }

.main { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; gap:18px; padding:8px 0 40px; }

.tabs { display:flex; background:rgba(255,255,255,.6); border-radius:40px; padding:4px; border:1.5px solid rgba(108,99,255,.2); backdrop-filter:blur(8px); }
.tab { padding:8px 26px; border-radius:36px; border:none; background:transparent; color:#9490c0; font-family:inherit; font-size:.9em; font-weight:600; cursor:pointer; transition:all .2s; }
.tab.on { background:var(--p); color:#fff; box-shadow:0 2px 12px rgba(108,99,255,.3); }

.pane { display:none; flex-direction:column; align-items:center; gap:16px; }
.pane.on { display:flex; }

.grid-wrap { background:rgba(255,255,255,.78); border-radius:16px; padding:10px; box-shadow:0 8px 40px rgba(108,99,255,.18); border:2px solid rgba(108,99,255,.2); backdrop-filter:blur(10px); }
.sgrid { display:grid; grid-template-columns:repeat(9,50px); grid-template-rows:repeat(9,50px); border:2.5px solid var(--p); border-radius:6px; overflow:hidden; }
.cell { width:50px; height:50px; border-right:1px solid #d4cff5; border-bottom:1px solid #d4cff5; background:#faf9ff; }
.cell[data-cb] { border-right:2.5px solid var(--p); }
.cell[data-rb] { border-bottom:2.5px solid var(--p); }
.cell input { width:100%; height:100%; border:none; background:transparent; text-align:center; font-size:1.25em; font-weight:700; font-family:inherit; color:#3d3a8c; outline:none; display:block; padding:0; -webkit-appearance:none; }
.cell input:focus { background:#dbd6ff; }
.cell input.solved { color:var(--p); background:#f0eeff; }
.cell input.bad { background:#fff0f4; color:#ff4f7b; }

.row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.btn { padding:10px 24px; border-radius:40px; border:1.5px solid rgba(108,99,255,.35); background:rgba(255,255,255,.75); color:var(--p); font-size:.9em; font-weight:600; cursor:pointer; transition:all .15s; font-family:inherit; }
.btn:hover { background:var(--p); color:#fff; box-shadow:0 4px 14px rgba(108,99,255,.28); }
.btn.pri { background:var(--p); color:#fff; box-shadow:0 4px 18px rgba(108,99,255,.35); }
.btn.pri:hover { transform:translateY(-2px); }
.btn:disabled { opacity:.4; pointer-events:none; }

.msg { font-size:.88em; font-weight:600; min-height:20px; }
.msg.ok { color:#00c9a7; } .msg.er { color:#ff4f7b; } .msg.in { color:#9490c0; }

/* Camera */
.cambox { position:relative; width:460px; height:360px; border-radius:16px; overflow:hidden; background:#1a1830; border:2px solid rgba(108,99,255,.3); box-shadow:0 8px 40px rgba(108,99,255,.18); }
#vid { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
#previmg { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#1a1830; display:none; }
.camph { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:#9490c0; }
.camph svg { opacity:.45; }
.camph p { font-size:.9em; font-weight:500; }
.guide { position:absolute; inset:8%; border:2px solid rgba(108,99,255,.75); border-radius:4px; pointer-events:none; box-shadow:0 0 0 9999px rgba(0,0,0,.38); display:none; }
.spin-box { position:absolute; inset:0; background:rgba(45,43,85,.78); display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:#fff; }
.spin-box.on { display:flex; }
.spinner { width:36px; height:36px; border-radius:50%; border:3px solid rgba(255,255,255,.2); border-top-color:var(--p); animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.spin-box p { font-size:.9em; font-weight:600; }

.uplabel { display:flex; align-items:center; gap:8px; padding:10px 20px; border-radius:40px; border:1.5px solid rgba(108,99,255,.35); background:rgba(255,255,255,.75); color:var(--p); font-size:.9em; font-weight:600; cursor:pointer; transition:all .15s; font-family:inherit; }
.uplabel:hover { background:var(--p); color:#fff; }
#finput { display:none; }

.hint { font-size:.8em; color:#b0acdc; text-align:center; max-width:400px; }

/* Side by side */
.sidebyside { display:none; gap:24px; align-items:flex-start; flex-wrap:wrap; justify-content:center; }
.sidebyside.on { display:flex; }
.photolabel { font-size:.78em; font-weight:600; color:#9490c0; text-transform:uppercase; letter-spacing:.06em; }
.photothumb { width:250px; height:250px; border-radius:12px; overflow:hidden; border:2px solid rgba(108,99,255,.25); background:#1a1830; cursor:zoom-in; flex-shrink:0; }
.photothumb img { width:100%; height:100%; object-fit:contain; display:block; }
.photocol { display:flex; flex-direction:column; align-items:center; gap:12px; }

.lightbox { display:none; position:fixed; inset:0; z-index:100; background:rgba(10,8,30,.9); align-items:center; justify-content:center; cursor:zoom-out; }
.lightbox.on { display:flex; }
.lightbox img { max-width:92vw; max-height:92vh; border-radius:8px; }
</style>
</head>
<body>

<div class="falling confetti c1" style="left:5%;animation-duration:5s;--r:720deg"></div>
<div class="falling lama" style="left:12%;animation-duration:7s;--r:-1080deg">🦙</div>
<div class="falling confetti c2" style="left:18%;animation-duration:6s;--r:540deg"></div>
<div class="falling lama" style="left:25%;animation-duration:8s;--r:900deg">🦙</div>
<div class="falling confetti c3" style="left:32%;animation-duration:4.5s;--r:-720deg"></div>
<div class="falling lama" style="left:38%;animation-duration:6.5s;--r:1260deg">🦙</div>
<div class="falling confetti c4" style="left:45%;animation-duration:5.8s;--r:360deg"></div>
<div class="falling lama" style="left:52%;animation-duration:7.2s;--r:-1440deg">🦙</div>
<div class="falling confetti c5" style="left:60%;animation-duration:6.1s;--r:900deg"></div>
<div class="falling lama" style="left:67%;animation-duration:8.5s;--r:-1080deg">🦙</div>
<div class="falling confetti c1" style="left:74%;animation-duration:5.3s;--r:720deg"></div>
<div class="falling lama" style="left:82%;animation-duration:7.9s;--r:1620deg">🦙</div>
<div class="falling confetti c2" style="left:90%;animation-duration:6.7s;--r:-900deg"></div>

<div class="top-bar">
  <button class="back-link" onclick="history.back()">← Retour en arrière</button>
  <h1 class="page-title">Résolveur</h1>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab on" id="tab-m">Saisie manuelle</button>
    <button class="tab"    id="tab-p">Photo (pardonnez la qualité un peu foireuse de la version photo)</button>
  </div>

  <!-- Saisie manuelle -->
  <div class="pane on" id="pane-m">
    <div class="grid-wrap"><div class="sgrid" id="mgrid"></div></div>
    <div class="row">
      <button class="btn" id="btn-mc">Effacer</button>
      <button class="btn pri" id="btn-ms">Résoudre</button>

    <div class="msg in" id="msg-m">Remplis les indices puis clique sur Résoudre.</div>
  </div>

  <!-- Photo -->
  <div class="pane" id="pane-p">
    <div class="cambox">
      <div class="camph" id="camph">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <p>Caméra inactive</p>
      </div>
      <video id="vid" autoplay playsinline muted></video>
      <img id="previmg" alt="">
      <canvas id="snapcv" style="display:none"></canvas>
      <div class="guide" id="guide"></div>
      <div class="spin-box" id="spinbox"><div class="spinner"></div><p id="spinmsg">Analyse…</p></div>

    <div class="row">

        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importer
      </label>
      <input type="file" id="finput" accept="image/*">
    </div>

    <p class="hint">Place la grille dans le cadre, bien éclairée, puis prends la photo.</p>

    <div class="sidebyside" id="sbs">
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <span class="photolabel">Ta photo</span>

        <span class="hint" style="max-width:250px">Clique pour agrandir</span>
      </div>
      <div class="photocol">
        <span class="photolabel">Chiffres détectés</span>
        <div class="grid-wrap"><div class="sgrid" id="pgrid"></div></div>
        <div class="row">
          <button class="btn" id="btn-pc">Effacer</button>
          <button class="btn" id="btn-pr">Reprendre</button>
          <button class="btn pri" id="btn-ps">Résoudre</button>
        </div>
        <div class="msg in" id="msg-p"></div>
      </div>
    </div>
  </div>
</div>

<div class="lightbox" id="lbox"><img id="lboximg" alt=""></div>

<script>
(function(){

/* ── Solveur ── */
function ok(b,r,c,n){
  for(let i=0;i<9;i++){
    if(i!==c&&b[r][i]===n)return false;
    if(i!==r&&b[i][c]===n)return false;
  }
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
  for(let i=br;i<br+3;i++)for(let j=bc;j<bc+3;j++)if((i!==r||j!==c)&&b[i][j]===n)return false;
  return true;
}
function solve(b){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(b[r][c]===0){
    for(let n=1;n<=9;n++){if(ok(b,r,c,n)){b[r][c]=n;if(solve(b))return true;b[r][c]=0;}}
    return false;
  }
  return true;
}
function validClues(b){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(b[r][c]!==0&&!ok(b,r,c,b[r][c]))return false;
  return true;
}

/* ── Grille DOM ── */
function buildGrid(id){
  const el=document.getElementById(id);
  el.innerHTML='';
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    if(c===2||c===5)cell.setAttribute('data-cb','1');
    if(r===2||r===5)cell.setAttribute('data-rb','1');
    const inp=document.createElement('input');
    inp.type='text';inp.inputMode='numeric';inp.maxLength=1;
    inp.dataset.r=r;inp.dataset.c=c;
    inp.addEventListener('keydown',e=>{
      if(inp.readOnly)return;
      if(e.key==='Backspace'||e.key==='Delete'){inp.value='';e.preventDefault();return;}
      const dirs={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
      if(dirs[e.key]){
        e.preventDefault();
        const[dr,dc]=dirs[e.key];
        document.querySelector(`#${id} input[data-r="${Math.min(8,Math.max(0,r+dr))}"][data-c="${Math.min(8,Math.max(0,c+dc))}"]`)?.focus();
      }
    });
    inp.addEventListener('input',()=>{
      if(inp.readOnly)return;
      const v=inp.value.replace(/[^1-9]/g,'');
      inp.value=v?v[v.length-1]:'';inp.className='';
    });
    cell.appendChild(inp);el.appendChild(cell);
  }
}
function readBoard(id){
  const b=Array.from({length:9},()=>Array(9).fill(0));
  document.querySelectorAll(`#${id} input`).forEach(i=>{const v=parseInt(i.value);if(v>=1&&v<=9)b[+i.dataset.r][+i.dataset.c]=v;});
  return b;
}
function applyResult(id,orig,solved){
  document.querySelectorAll(`#${id} input`).forEach(i=>{
    const r=+i.dataset.r,c=+i.dataset.c;
    i.value=solved[r][c]||'';i.readOnly=true;
    i.className=orig[r][c]!==0?'':'solved';
  });
}
function clearGrid(id){
  document.querySelectorAll(`#${id} input`).forEach(i=>{i.value='';i.className='';i.readOnly=false;});
}
function markBad(id,b){
  document.querySelectorAll(`#${id} input`).forEach(i=>{
    const r=+i.dataset.r,c=+i.dataset.c;
    i.classList.toggle('bad',b[r][c]!==0&&!ok(b,r,c,b[r][c]));
  });
}
function setMsg(id,txt,type){const el=document.getElementById(id);el.textContent=txt;el.className='msg '+type;}

function runSolver(gid,mid){
  const b=readBoard(gid);
  if(!validClues(b)){markBad(gid,b);setMsg(mid,'Contradictions détectées — vérifie les indices.','er');return;}
  const orig=b.map(r=>[...r]);
  if(solve(b)){applyResult(gid,orig,b);setMsg(mid,'Grille résolue !','ok');}
  else setMsg(mid,'Aucune solution trouvée.','er');
}

/* ── Init ── */
buildGrid('mgrid');

/* ── Onglets ── */
document.getElementById('tab-m').addEventListener('click',()=>{
  document.getElementById('tab-m').classList.add('on');document.getElementById('tab-p').classList.remove('on');
  document.getElementById('pane-m').classList.add('on');document.getElementById('pane-p').classList.remove('on');
});
document.getElementById('tab-p').addEventListener('click',()=>{
  document.getElementById('tab-p').classList.add('on');document.getElementById('tab-m').classList.remove('on');
  document.getElementById('pane-p').classList.add('on');document.getElementById('pane-m').classList.remove('on');
});

/* ── Boutons manuels ── */
document.getElementById('btn-mc').addEventListener('click',()=>{clearGrid('mgrid');setMsg('msg-m','Remplis les indices puis clique sur Résoudre.','in');});
document.getElementById('btn-ms').addEventListener('click',()=>runSolver('mgrid','msg-m'));

/* ── Caméra ── */
let stream=null;
const vid=document.getElementById('vid');
const snapcv=document.getElementById('snapcv');
const previmg=document.getElementById('previmg');
const camph=document.getElementById('camph');
const guide=document.getElementById('guide');
const spinbox=document.getElementById('spinbox');
const sbs=document.getElementById('sbs');
const btnCam=document.getElementById('btn-cam');
const btnSnap=document.getElementById('btn-snap');
const thumbimg=document.getElementById('thumbimg');

function stopCam(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  vid.style.display='none';vid.srcObject=null;
  camph.style.display='flex';guide.style.display='none';
  btnSnap.disabled=true;btnCam.textContent='Démarrer la caméra';
}

btnCam.addEventListener('click',async()=>{
  if(stream){stopCam();return;}
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:960}}});
    vid.srcObject=stream;vid.style.display='block';
    camph.style.display='none';guide.style.display='block';
    previmg.style.display='none';sbs.classList.remove('on');
    btnSnap.disabled=false;btnCam.textContent='Arrêter la caméra';
  }catch{alert("Impossible d'accéder à la caméra.");}
});

btnSnap.addEventListener('click',()=>{
  snapcv.width=vid.videoWidth;snapcv.height=vid.videoHeight;
  snapcv.getContext('2d').drawImage(vid,0,0);
  stopCam();handleImage(snapcv.toDataURL('image/jpeg',.93));
});

document.getElementById('finput').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>handleImage(ev.target.result);
  reader.readAsDataURL(f);e.target.value='';
});

document.getElementById('btn-pr').addEventListener('click',()=>{
  sbs.classList.remove('on');previmg.style.display='none';previmg.src='';camph.style.display='flex';
});
document.getElementById('btn-pc').addEventListener('click',()=>{clearGrid('pgrid');setMsg('msg-p','Grille effacée.','in');});
document.getElementById('btn-ps').addEventListener('click',()=>runSolver('pgrid','msg-p'));

document.getElementById('thumb').addEventListener('click',()=>{
  document.getElementById('lboximg').src=thumbimg.src;
  document.getElementById('lbox').classList.add('on');
});
document.getElementById('lbox').addEventListener('click',()=>document.getElementById('lbox').classList.remove('on'));

/* ════════════════════════════════════════════════════════
   RECONNAISSANCE PAR TOPOLOGIE + PROFILS

   1. Détection auto screenshot vs photo → seuil adapté
   2. Détection lignes de grille par longest-run
   3. Pour chaque cellule :
      a. Normalisation 20×20
      b. Comptage des trous (flood fill du fond)
      c. Profils de projection 10 bandes H + 10 bandes V
      d. Centre de masse, densité, ratio
      e. Score composite → chiffre ou vide
*/

const NW = 20;

function toGray(data, W, H) {
  const g = new Uint8Array(W * H);
  for (let i = 0; i < W * H; i++)
    g[i] = (77*data[i*4] + 150*data[i*4+1] + 29*data[i*4+2]) >> 8;
  return g;
}

function binarizeAuto(g, W, H) {
  let dark = 0, light = 0;
  for (let i = 0; i < W*H; i++) {
    if (g[i] < 80) dark++;
    else if (g[i] > 180) light++;
  }
  const bin = new Uint8Array(W * H);
  if ((dark + light) / (W * H) > 0.75) {
    for (let i = 0; i < W*H; i++) bin[i] = g[i] < 128 ? 1 : 0;
  } else {
    const S = new Int32Array((W+1)*(H+1));
    for (let y = 1; y <= H; y++)
      for (let x = 1; x <= W; x++)
        S[y*(W+1)+x] = g[(y-1)*W+(x-1)] + S[(y-1)*(W+1)+x] + S[y*(W+1)+(x-1)] - S[(y-1)*(W+1)+(x-1)];
    const R = Math.max(8, Math.round(Math.min(W,H)/22)) | 1;
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      const x1=Math.max(0,x-R), y1=Math.max(0,y-R), x2=Math.min(W,x+R+1), y2=Math.min(H,y+R+1);
      const n = (x2-x1)*(y2-y1);
      const s = S[y2*(W+1)+x2]-S[y1*(W+1)+x2]-S[y2*(W+1)+x1]+S[y1*(W+1)+x1];
      bin[y*W+x] = g[y*W+x] < (s/n - 5) ? 1 : 0;
    }
  }
  return bin;
}

function detectLines(bin, W, H) {
  const rowRun = new Float32Array(H);
  const colRun = new Float32Array(W);
  for (let y = 0; y < H; y++) {
    let run = 0, best = 0;
    for (let x = 0; x < W; x++) {
      if (bin[y*W+x]) { run++; if (run > best) best = run; } else run = 0;
    }
    rowRun[y] = best;
  }
  for (let x = 0; x < W; x++) {
    let run = 0, best = 0;
    for (let y = 0; y < H; y++) {
      if (bin[y*W+x]) { run++; if (run > best) best = run; } else run = 0;
    }
    colRun[x] = best;
  }
  function extractPeaks(runs, size, n) {
    const thr = size * 0.25;
    const clusters = [];
    let inC = false, cStart = 0;
    for (let i = 0; i < size; i++) {
      if (runs[i] >= thr) { if (!inC) { inC = true; cStart = i; } }
      else { if (inC) { clusters.push(Math.round((cStart+i-1)/2)); inC = false; } }
    }
    if (inC) clusters.push(Math.round((cStart+size-1)/2));
    if (clusters.length === n) return clusters;
    if (clusters.length >= 2) {
      const first = clusters[0], last = clusters[clusters.length-1];
      const step = (last - first) / (n - 1);
      return Array.from({length:n}, (_, i) => Math.round(first + i*step));
    }
    return Array.from({length:n}, (_, i) => Math.round(i*(size-1)/(n-1)));
  }
  return { rows: extractPeaks(rowRun, H, 10), cols: extractPeaks(colRun, W, 10) };
}

function normalizePatch(bin, sx, sy, sw, sh, imgW, imgH) {
  const out = new Uint8Array(NW * NW);
  for (let ty = 0; ty < NW; ty++) for (let tx = 0; tx < NW; tx++) {
    const srcX = sx + (tx + .5) * sw / NW - .5;
    const srcY = sy + (ty + .5) * sh / NW - .5;
    const x0 = Math.floor(srcX), y0 = Math.floor(srcY);
    const fx = srcX - x0, fy = srcY - y0;
    const get = (x, y) => (x>=0&&x<imgW&&y>=0&&y<imgH) ? bin[y*imgW+x] : 0;
    const v = (1-fx)*(1-fy)*get(x0,y0) + fx*(1-fy)*get(x0+1,y0)
            + (1-fx)*fy*get(x0,y0+1) + fx*fy*get(x0+1,y0+1);
    out[ty*NW+tx] = v > 0.5 ? 1 : 0;
  }
  return out;
}

function countHoles(patch) {
  const visited = new Uint8Array(NW * NW);
  const queue = [];
  for (let x = 0; x < NW; x++) {
    if (!patch[x]) { visited[x]=1; queue.push(x); }
    const b=(NW-1)*NW+x; if(!patch[b]){visited[b]=1;queue.push(b);}
  }
  for (let y = 0; y < NW; y++) {
    if (!patch[y*NW]) { visited[y*NW]=1; queue.push(y*NW); }
    const r=y*NW+NW-1; if(!patch[r]){visited[r]=1;queue.push(r);}
  }
  let qi = 0;
  while (qi < queue.length) {
    const idx = queue[qi++];
    const y = Math.floor(idx/NW), x = idx%NW;
    for (const [dy,dx] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const ny=y+dy, nx=x+dx;
      if (ny<0||ny>=NW||nx<0||nx>=NW) continue;
      const ni=ny*NW+nx;
      if (!visited[ni]&&!patch[ni]) { visited[ni]=1; queue.push(ni); }
    }
  }
  let holes = 0;
  for (let i = 0; i < NW*NW; i++) {
    if (!patch[i] && !visited[i]) {
      holes++;
      const q2=[i]; visited[i]=1; let qi2=0;
      while (qi2<q2.length) {
        const idx2=q2[qi2++];
        const y2=Math.floor(idx2/NW), x2=idx2%NW;
        for (const [dy,dx] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          const ny=y2+dy,nx=x2+dx;
          if(ny<0||ny>=NW||nx<0||nx>=NW)continue;
          const ni=ny*NW+nx;
          if(!visited[ni]&&!patch[ni]){visited[ni]=1;q2.push(ni);}
        }
      }
    }
  }
  return holes;
}

function calcProfiles(patch) {
  const pv = new Float32Array(10);
  const ph = new Float32Array(10);
  const bw = NW / 10;
  for (let b = 0; b < 10; b++) {
    let sv=0,sh=0,nv=0,nh=0;
    const i0=Math.round(b*bw), i1=Math.round((b+1)*bw);
    for (let i=i0; i<i1; i++) {
      for (let j=0;j<NW;j++){sv+=patch[i*NW+j];nv++;}
      for (let j=0;j<NW;j++){sh+=patch[j*NW+i];nh++;}
    }
    pv[b]=nv?sv/nv:0; ph[b]=nh?sh/nh:0;
  }
  return {pv,ph};
}

function descriptors(patch) {
  let dark=0,sumX=0,sumY=0;
  for (let y=0;y<NW;y++) for (let x=0;x<NW;x++) {
    if(patch[y*NW+x]){dark++;sumX+=x;sumY+=y;}
  }
  return {
    density: dark/(NW*NW),
    cx: dark?sumX/dark/NW:0.5,
    cy: dark?sumY/dark/NW:0.5
  };
}

function d2(a,b){let s=0;for(let i=0;i<a.length;i++){const d=a[i]-b[i];s+=d*d;}return s;}

const PROTO = {
  1: {holes:0, pv:[.3,.5,.5,.5,.5,.5,.5,.5,.5,.4], ph:[.0,.0,.1,.6,.8,.7,.2,.0,.0,.0], cx:.55, cy:.5,  density:.15},
  2: {holes:0, pv:[.6,.7,.4,.2,.3,.5,.7,.8,.8,.7], ph:[.2,.4,.7,.8,.6,.4,.6,.8,.5,.2], cx:.5,  cy:.5,  density:.35},
  3: {holes:0, pv:[.5,.6,.3,.4,.4,.3,.3,.5,.6,.5], ph:[.1,.2,.5,.8,.7,.5,.7,.8,.5,.2], cx:.6,  cy:.5,  density:.28},
  4: {holes:0, pv:[.2,.4,.6,.8,.9,.6,.6,.6,.6,.3], ph:[.1,.2,.4,.6,.9,.9,.9,.6,.3,.1], cx:.55, cy:.45, density:.30},
  5: {holes:0, pv:[.7,.7,.4,.2,.5,.4,.2,.3,.7,.5], ph:[.7,.8,.6,.3,.2,.4,.7,.8,.6,.2], cx:.45, cy:.5,  density:.32},
  6: {holes:1, pv:[.3,.5,.7,.8,.8,.8,.8,.7,.7,.4], ph:[.2,.5,.8,.5,.3,.6,.9,.8,.6,.2], cx:.45, cy:.58, density:.40},
  7: {holes:0, pv:[.8,.3,.2,.3,.4,.5,.5,.4,.3,.1], ph:[.8,.9,.8,.6,.4,.4,.3,.3,.2,.1], cx:.58, cy:.38, density:.20},
  8: {holes:2, pv:[.5,.7,.6,.5,.5,.5,.6,.7,.6,.5], ph:[.3,.7,.8,.5,.4,.5,.8,.7,.4,.3], cx:.5,  cy:.5,  density:.42},
  9: {holes:1, pv:[.4,.7,.8,.8,.7,.5,.3,.4,.5,.4], ph:[.2,.5,.8,.7,.4,.3,.6,.8,.6,.2], cx:.52, cy:.42, density:.36},
};

function classifyCell(bin, x0, y0, x1, y1, imgW, imgH) {
  const mw=Math.round((x1-x0)*.14), mh=Math.round((y1-y0)*.14);
  const cx0=x0+mw, cy0=y0+mh, cx1=x1-mw, cy1=y1-mh;
  const cw=cx1-cx0, ch=cy1-cy0;
  if (cw<4||ch<4) return 0;

  let dark=0;
  for(let y=cy0;y<cy1;y++) for(let x=cx0;x<cx1;x++) dark+=bin[y*imgW+x];
  if (dark/(cw*ch)<0.02) return 0;

  let mnX=cx1,mxX=cx0,mnY=cy1,mxY=cy0;
  for(let y=cy0;y<cy1;y++) for(let x=cx0;x<cx1;x++) if(bin[y*imgW+x]){
    if(x<mnX)mnX=x; if(x>mxX)mxX=x;
    if(y<mnY)mnY=y; if(y>mxY)mxY=y;
  }
  if(mxX<=mnX||mxY<=mnY) return 0;

  const sw=mxX-mnX+1, sh=mxY-mnY+1;
  const ratio=sh/sw;

  const patch=normalizePatch(bin,mnX,mnY,sw,sh,imgW,imgH);
  const holes=countHoles(patch);
  const {pv,ph}=calcProfiles(patch);
  const {density,cx,cy}=descriptors(patch);

  let bestD=0, bestScore=Infinity;
  for(const [dStr,proto] of Object.entries(PROTO)){
    const d=+dStr;
    const holePenalty=Math.abs(holes-proto.holes)*3.0;
    const profileDist=d2(pv,proto.pv)*1.5+d2(ph,proto.ph)*1.5;
    const metaDist=Math.abs(density-proto.density)*2.0
                 +Math.abs(cx-proto.cx)*1.5
                 +Math.abs(cy-proto.cy)*1.5;
    let ratioPenalty=0;
    if(d===1&&ratio<1.8) ratioPenalty=2.0;
    if(d!==1&&ratio>2.5) ratioPenalty=1.5;
    const score=holePenalty+profileDist+metaDist+ratioPenalty;
    if(score<bestScore){bestScore=score;bestD=d;}
  }
  return bestScore<4.5?bestD:0;
}

function handleImage(dataUrl) {
  previmg.src=dataUrl; previmg.style.display='block';
  camph.style.display='none'; guide.style.display='none';
  thumbimg.src=dataUrl;
  spinbox.classList.add('on'); sbs.classList.remove('on');

  setTimeout(()=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.min(1,1200/Math.max(img.width,img.height));
      const W=Math.round(img.width*sc), H=Math.round(img.height*sc);
      const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
      cv.getContext('2d').drawImage(img,0,0,W,H);
      const raw=cv.getContext('2d').getImageData(0,0,W,H).data;
      const gray=toGray(raw,W,H);
      const bin=binarizeAuto(gray,W,H);
      const{rows,cols}=detectLines(bin,W,H);

      const board=Array.from({length:9},()=>Array(9).fill(0));
      for(let r=0;r<9;r++) for(let c=0;c<9;c++)
        board[r][c]=classifyCell(bin,cols[c],rows[r],cols[c+1],rows[r+1],W,H);

      spinbox.classList.remove('on');
      buildGrid('pgrid');
      document.querySelectorAll('#pgrid input').forEach(i=>{
        const v=board[+i.dataset.r][+i.dataset.c];
        if(v)i.value=v;
      });
      sbs.classList.add('on');
      const filled=board.flat().filter(v=>v!==0).length;
      setMsg('msg-p',
        filled>0
          ?`${filled} chiffre(s) détecté(s). Vérifie puis clique sur Résoudre.`
          :'Aucun chiffre détecté — saisis les indices manuellement.',
        'in');
    };
    img.src=dataUrl;
  },50);
}
})();
