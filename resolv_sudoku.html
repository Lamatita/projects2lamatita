<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résolveur de Sudoku</title>
<style>
:root {
  --fond: #f7f3ff;
  --principal: #6c63ff;
  --secondaire: #ffb703;
  --blanc: #ffffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, var(--fond), #e6e1ff);
  min-height: 100vh;
  overflow-x: hidden;
}

.falling {
  position: fixed; top: -10%;
  animation: fall linear infinite;
  pointer-events: none; z-index: 0;
}
.confetti { width: 12px; height: 12px; opacity: 0.7; border-radius: 2px; }
.lama { font-size: 2rem; }
.c1 { background: var(--principal); }
.c2 { background: var(--secondaire); }
.c3 { background: #ff6f91; }
.c4 { background: #00c9a7; }
.c5 { background: #845ec2; }
@keyframes fall {
  0%   { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(110vh) rotate(var(--rotation)); }
}

.top-bar {
  width: 100%; padding: 10px 24px;
  display: flex; align-items: center;
  position: relative; z-index: 10;
}
.page-title {
  position: absolute; left: 50%; transform: translateX(-50%);
  pointer-events: none; color: var(--principal);
  font-size: 1.4em; font-weight: 700;
}
.back-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 16px 7px 12px; border-radius: 40px;
  border: 1.5px solid rgba(108,99,255,0.35);
  background: rgba(255,255,255,0.7); color: var(--principal);
  font-family: "Segoe UI", sans-serif; font-size: .92em; font-weight: 600;
  cursor: pointer; backdrop-filter: blur(6px);
  transition: all .18s; box-shadow: 0 2px 8px rgba(108,99,255,0.08);
}
.back-btn:hover {
  background: var(--principal); color: #fff; border-color: var(--principal);
  box-shadow: 0 4px 16px rgba(108,99,255,0.28); transform: translateX(-2px);
}
.back-btn svg { flex-shrink: 0; transition: transform .18s; }
.back-btn:hover svg { transform: translateX(-2px); }

.main {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  gap: 18px; padding: 8px 0 40px;
}

.tabs {
  display: flex; gap: 0;
  background: rgba(255,255,255,0.6);
  border-radius: 40px; padding: 4px;
  border: 1.5px solid rgba(108,99,255,0.2);
  backdrop-filter: blur(8px);
}
.tab-btn {
  padding: 8px 26px; border-radius: 36px; border: none;
  background: transparent; color: #9490c0;
  font-family: "Segoe UI", sans-serif; font-size: .9em; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.tab-btn.active {
  background: var(--principal); color: #fff;
  box-shadow: 0 2px 12px rgba(108,99,255,0.3);
}

.panel { display: none; flex-direction: column; align-items: center; gap: 16px; }
.panel.active { display: flex; }

.grid-wrapper {
  background: rgba(255,255,255,0.78);
  border-radius: 16px; padding: 10px;
  box-shadow: 0 8px 40px rgba(108,99,255,0.18), 0 2px 8px rgba(108,99,255,0.08);
  border: 2px solid rgba(108,99,255,0.2);
  backdrop-filter: blur(10px);
}
.sudoku-grid {
  display: grid;
  grid-template-columns: repeat(9, 50px);
  grid-template-rows: repeat(9, 50px);
  border: 2.5px solid var(--principal);
  border-radius: 6px; overflow: hidden;
}
.cell {
  width: 50px; height: 50px;
  display: flex; align-items: center; justify-content: center;
  border-right: 1px solid #d4cff5;
  border-bottom: 1px solid #d4cff5;
  background: #faf9ff;
  position: relative;
}
.cell[data-cb="1"] { border-right: 2.5px solid var(--principal); }
.cell[data-rb="1"] { border-bottom: 2.5px solid var(--principal); }

.cell input {
  width: 100%; height: 100%;
  border: none; background: transparent;
  text-align: center; font-size: 1.2em; font-weight: 700;
  font-family: "Segoe UI", sans-serif; color: #3d3a8c;
  outline: none; cursor: pointer;
}
.cell input:focus { background: #dbd6ff; }
.cell input.given { color: #3d3a8c; }
.cell input.solved { color: var(--principal); }
.cell input.error-cell { background: #fff0f4; color: #ff4f7b; }

.btn-row {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
}
.act-btn {
  padding: 10px 24px; border-radius: 40px;
  border: 1.5px solid rgba(108,99,255,0.35);
  background: rgba(255,255,255,0.75); color: var(--principal);
  font-size: .9em; font-weight: 600; cursor: pointer;
  transition: all .15s; backdrop-filter: blur(4px);
  font-family: "Segoe UI", sans-serif;
}
.act-btn:hover {
  background: var(--principal); color: #fff; border-color: var(--principal);
  box-shadow: 0 4px 14px rgba(108,99,255,0.28);
}
.act-btn.primary {
  background: var(--principal); color: #fff; border-color: var(--principal);
  box-shadow: 0 4px 18px rgba(108,99,255,0.35);
}
.act-btn.primary:hover {
  transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.4);
}
.act-btn:disabled {
  opacity: 0.45; pointer-events: none;
}

.status-msg {
  font-size: .88em; font-weight: 600; min-height: 22px;
  transition: color .2s;
}
.status-msg.ok  { color: #00c9a7; }
.status-msg.err { color: #ff4f7b; }
.status-msg.inf { color: #9490c0; }

.photo-zone {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  width: 100%;
}

.camera-box {
  position: relative; width: 460px; height: 380px;
  border-radius: 16px; overflow: hidden;
  background: #1a1830;
  border: 2px solid rgba(108,99,255,0.3);
  box-shadow: 0 8px 40px rgba(108,99,255,0.18);
}
.camera-box video,
.camera-box canvas,
.camera-box img.preview-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover;
}
.camera-box canvas { display: none; }
.camera-box img.preview-img { display: none; object-fit: contain; background: #1a1830; }

.camera-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: #9490c0;
}
.camera-placeholder svg { opacity: .5; }
.camera-placeholder p { font-size: .9em; font-weight: 500; }

.grid-overlay {
  position: absolute; inset: 10%;
  border: 2px solid rgba(108,99,255,0.6);
  border-radius: 4px; pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
}
.grid-overlay::before, .grid-overlay::after {
  content: ''; position: absolute;
  background: rgba(108,99,255,0.5);
}
.grid-overlay::before {
  left: 33.3%; width: 1px; top: 0; bottom: 0;
  box-shadow: 16.65% 0 0 rgba(108,99,255,0.5);
}
.grid-overlay::after {
  top: 33.3%; height: 1px; left: 0; right: 0;
  box-shadow: 0 16.65% 0 rgba(108,99,255,0.5);
}

.upload-label {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 24px; border-radius: 40px;
  border: 1.5px solid rgba(108,99,255,0.35);
  background: rgba(255,255,255,0.75); color: var(--principal);
  font-size: .9em; font-weight: 600; cursor: pointer;
  transition: all .15s; backdrop-filter: blur(4px);
  font-family: "Segoe UI", sans-serif;
}
.upload-label:hover {
  background: var(--principal); color: #fff; border-color: var(--principal);
  box-shadow: 0 4px 14px rgba(108,99,255,0.28);
}
#file-input { display: none; }

.hint-text {
  font-size: .8em; color: #b0acdc; text-align: center; max-width: 380px;
}

.ocr-result-grid {
  display: none;
}

.processing-overlay {
  position: absolute; inset: 0;
  background: rgba(45,43,85,0.75);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 14px; color: white;
  backdrop-filter: blur(4px);
}
.processing-overlay.show { display: flex; }
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: var(--principal);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.processing-overlay p { font-size: .9em; font-weight: 600; }
</style>
</head>
<body>

<div class="falling confetti c1" style="left:5%;  animation-duration:5s;   --rotation:720deg;"></div>
<div class="falling lama"        style="left:12%; animation-duration:7s;   --rotation:-1080deg;">🦙</div>
<div class="falling confetti c2" style="left:18%; animation-duration:6s;   --rotation:540deg;"></div>
<div class="falling lama"        style="left:25%; animation-duration:8s;   --rotation:900deg;">🦙</div>
<div class="falling confetti c3" style="left:32%; animation-duration:4.5s; --rotation:-720deg;"></div>
<div class="falling lama"        style="left:38%; animation-duration:6.5s; --rotation:1260deg;">🦙</div>
<div class="falling confetti c4" style="left:45%; animation-duration:5.8s; --rotation:360deg;"></div>
<div class="falling lama"        style="left:52%; animation-duration:7.2s; --rotation:-1440deg;">🦙</div>
<div class="falling confetti c5" style="left:60%; animation-duration:6.1s; --rotation:900deg;"></div>
<div class="falling lama"        style="left:67%; animation-duration:8.5s; --rotation:-1080deg;">🦙</div>
<div class="falling confetti c1" style="left:74%; animation-duration:5.3s; --rotation:720deg;"></div>
<div class="falling lama"        style="left:82%; animation-duration:7.9s; --rotation:1620deg;">🦙</div>
<div class="falling confetti c2" style="left:90%; animation-duration:6.7s; --rotation:-900deg;"></div>

<div class="top-bar">
  <button class="back-btn" onclick="history.back()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </button>
  <h1 class="page-title">Résolveur</h1>
</div>

<div class="main">

  <div class="tabs">
    <button class="tab-btn active" id="tab-manual">Saisie manuelle</button>
    <button class="tab-btn" id="tab-photo">Photo</button>
  </div>

  <!-- ── Panneau saisie manuelle ── -->
  <div class="panel active" id="panel-manual">
    <div class="grid-wrapper">
      <div class="sudoku-grid" id="manual-grid"></div>
    </div>
    <div class="btn-row">
      <button class="act-btn" id="btn-clear-manual">Effacer</button>
      <button class="act-btn primary" id="btn-solve-manual">Résoudre</button>
    </div>
    <div class="status-msg inf" id="status-manual">Remplis les indices puis clique sur Résoudre.</div>
  </div>

  <!-- ── Panneau photo ── -->
  <div class="panel" id="panel-photo">
    <div class="photo-zone">
      <div class="camera-box" id="camera-box">
        <div class="camera-placeholder" id="cam-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <p>Caméra inactive</p>
        </div>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="snap-canvas"></canvas>
        <img class="preview-img" id="preview-img" alt="Aperçu">
        <div class="grid-overlay" id="grid-overlay" style="display:none;"></div>
        <div class="processing-overlay" id="processing-overlay">
          <div class="spinner"></div>
          <p>Analyse en cours…</p>
        </div>
      </div>

      <div class="btn-row">
        <button class="act-btn" id="btn-start-cam">Démarrer la caméra</button>
        <button class="act-btn" id="btn-capture" disabled>Prendre la photo</button>
        <label class="upload-label" for="file-input">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Importer une image
        </label>
        <input type="file" id="file-input" accept="image/*">
      </div>

      <p class="hint-text">Place la grille dans le cadre, bien éclairée et à plat, puis prends la photo.</p>

      <div class="ocr-result-grid" id="ocr-result-section">
        <div class="grid-wrapper">
          <div class="sudoku-grid" id="photo-grid"></div>
        </div>
        <div class="btn-row" style="margin-top:4px;">
          <button class="act-btn" id="btn-clear-photo">Effacer</button>
          <button class="act-btn" id="btn-retake">Reprendre</button>
          <button class="act-btn primary" id="btn-solve-photo">Résoudre</button>
        </div>
        <div class="status-msg inf" id="status-photo">Vérifie les chiffres détectés puis clique sur Résoudre.</div>
      </div>
    </div>
  </div>

</div>

<script>
(function() {

function isValid(b, r, c, n) {
  for (let i = 0; i < 9; i++) {
    if (b[r][i] === n && i !== c) return false;
    if (b[i][c] === n && i !== r) return false;
  }
  let br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
  for (let i = br; i < br + 3; i++)
    for (let j = bc; j < bc + 3; j++)
      if (b[i][j] === n && (i !== r || j !== c)) return false;
  return true;
}

function solveSudoku(board) {
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      if (board[r][c] === 0) {
        for (let n = 1; n <= 9; n++) {
          if (isValid(board, r, c, n)) {
            board[r][c] = n;
            if (solveSudoku(board)) return true;
            board[r][c] = 0;
          }
        }
        return false;
      }
    }
  }
  return true;
}

function validateClues(board) {
  for (let r = 0; r < 9; r++)
    for (let c = 0; c < 9; c++)
      if (board[r][c] !== 0 && !isValid(board, r, c, board[r][c])) return false;
  return true;
}

function readGrid(gridId) {
  const inputs = document.querySelectorAll(`#${gridId} input`);
  const board = Array.from({length:9}, () => Array(9).fill(0));
  inputs.forEach(inp => {
    const r = +inp.dataset.r, c = +inp.dataset.c;
    const v = parseInt(inp.value);
    if (v >= 1 && v <= 9) board[r][c] = v;
  });
  return board;
}

function writeGrid(gridId, original, solved) {
  const inputs = document.querySelectorAll(`#${gridId} input`);
  inputs.forEach(inp => {
    const r = +inp.dataset.r, c = +inp.dataset.c;
    inp.value = solved[r][c] || '';
    inp.className = original[r][c] !== 0 ? 'given' : 'solved';
    inp.readOnly = true;
  });
}

function buildGrid(containerId, readOnly = false) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  for (let r = 0; r < 9; r++) {
    for (let c = 0; c < 9; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (c === 2 || c === 5) cell.dataset.cb = 1;
      if (r === 2 || r === 5) cell.dataset.rb = 1;
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.inputMode = 'numeric';
      inp.maxLength = 1;
      inp.dataset.r = r;
      inp.dataset.c = c;
      if (readOnly) inp.readOnly = true;
      inp.addEventListener('keydown', e => {
        if (inp.readOnly) return;
        if (e.key === 'Backspace' || e.key === 'Delete') { inp.value = ''; e.preventDefault(); return; }
        const dirs = {ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
        if (dirs[e.key]) {
          e.preventDefault();
          const [dr, dc] = dirs[e.key];
          const nr = Math.min(8, Math.max(0, r + dr));
          const nc = Math.min(8, Math.max(0, c + dc));
          document.querySelector(`#${containerId} input[data-r="${nr}"][data-c="${nc}"]`)?.focus();
        }
      });
      inp.addEventListener('input', () => {
        if (inp.readOnly) return;
        const v = inp.value.replace(/[^1-9]/g, '');
        inp.value = v ? v[v.length - 1] : '';
        inp.className = inp.value ? 'given' : '';
      });
      cell.appendChild(inp);
      grid.appendChild(cell);
    }
  }
}

function clearGrid(gridId) {
  document.querySelectorAll(`#${gridId} input`).forEach(inp => {
    inp.value = ''; inp.className = ''; inp.readOnly = false;
  });
}

buildGrid('manual-grid');

document.getElementById('btn-clear-manual').addEventListener('click', () => {
  clearGrid('manual-grid');
  setStatus('status-manual', 'Remplis les indices puis clique sur Résoudre.', 'inf');
});

document.getElementById('btn-solve-manual').addEventListener('click', () => {
  const board = readGrid('manual-grid');
  if (!validateClues(board)) {
    setStatus('status-manual', 'La grille contient des contradictions. Vérifie les indices.', 'err');
    highlightErrors('manual-grid', board);
    return;
  }
  const original = board.map(r => [...r]);
  if (solveSudoku(board)) {
    writeGrid('manual-grid', original, board);
    setStatus('status-manual', 'Grille résolue !', 'ok');
  } else {
    setStatus('status-manual', 'Aucune solution trouvée pour cette grille.', 'err');
  }
});

function highlightErrors(gridId, board) {
  const inputs = document.querySelectorAll(`#${gridId} input`);
  inputs.forEach(inp => {
    const r = +inp.dataset.r, c = +inp.dataset.c;
    if (board[r][c] !== 0 && !isValid(board, r, c, board[r][c]))
      inp.classList.add('error-cell');
    else inp.classList.remove('error-cell');
  });
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status-msg ' + type;
}

const tabManual = document.getElementById('tab-manual');
const tabPhoto  = document.getElementById('tab-photo');
const panelManual = document.getElementById('panel-manual');
const panelPhoto  = document.getElementById('panel-photo');

tabManual.addEventListener('click', () => {
  tabManual.classList.add('active'); tabPhoto.classList.remove('active');
  panelManual.classList.add('active'); panelPhoto.classList.remove('active');
});
tabPhoto.addEventListener('click', () => {
  tabPhoto.classList.add('active'); tabManual.classList.remove('active');
  panelPhoto.classList.add('active'); panelManual.classList.remove('active');
});

let stream = null;
const video = document.getElementById('video');
const snapCanvas = document.getElementById('snap-canvas');
const previewImg = document.getElementById('preview-img');
const camPlaceholder = document.getElementById('cam-placeholder');
const gridOverlay = document.getElementById('grid-overlay');
const processingOverlay = document.getElementById('processing-overlay');
const ocrSection = document.getElementById('ocr-result-section');
const btnCapture = document.getElementById('btn-capture');
const btnStartCam = document.getElementById('btn-start-cam');

document.getElementById('btn-start-cam').addEventListener('click', async () => {
  if (stream) { stopCamera(); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: {ideal:1280}, height:{ideal:960} }
    });
    video.srcObject = stream;
    video.style.display = 'block';
    camPlaceholder.style.display = 'none';
    gridOverlay.style.display = 'block';
    btnCapture.disabled = false;
    btnStartCam.textContent = 'Arrêter la caméra';
    ocrSection.style.display = 'none';
    previewImg.style.display = 'none';
  } catch(e) {
    alert('Impossible d\'accéder à la caméra. Vérifie les permissions.');
  }
});

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.style.display = 'none';
  camPlaceholder.style.display = 'flex';
  gridOverlay.style.display = 'none';
  btnCapture.disabled = true;
  btnStartCam.textContent = 'Démarrer la caméra';
}

document.getElementById('btn-capture').addEventListener('click', () => {
  snapCanvas.width = video.videoWidth;
  snapCanvas.height = video.videoHeight;
  snapCanvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = snapCanvas.toDataURL('image/jpeg', 0.92);
  stopCamera();
  processImage(dataUrl);
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => processImage(ev.target.result);
  reader.readAsDataURL(file);
  e.target.value = '';
});

function processImage(dataUrl) {
  previewImg.src = dataUrl;
  previewImg.style.display = 'block';
  video.style.display = 'none';
  camPlaceholder.style.display = 'none';
  gridOverlay.style.display = 'none';
  processingOverlay.classList.add('sho
