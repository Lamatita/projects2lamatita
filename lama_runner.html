<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lama Runner</title>
<style>
:root {
    --fond: #f7f3ff;
    --principal: #6c63ff;
    --secondaire: #ffb703;
    --texte: #333;
    --blanc: #ffffff;
    --danger: #ff4f4f;
    --vert: #00c9a7;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, var(--fond), #e6e1ff);
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}

.top-bar {
    width: 100%;
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    position: relative;
}
.back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--principal);
    text-decoration: none;
    font-weight: 600;
    font-size: 1em;
    padding: 8px 18px;
    border: 2px solid var(--principal);
    border-radius: 30px;
    background: var(--blanc);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(108,99,255,0.12);
}
.back-link:hover {
    background: var(--principal);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(108,99,255,0.25);
}
.page-title {
    color: var(--principal);
    font-size: 1.8em;
    font-weight: 700;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 10px 20px 60px;
    position: relative;
    z-index: 2;
}

.game-card {
    background: var(--blanc);
    border-radius: 24px;
    box-shadow: 0 15px 40px rgba(108,99,255,0.15);
    padding: 24px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
}

.canvas-wrapper {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    touch-action: none;
    border: 2px solid #e0deff;
    background: #fafafe;
}
.canvas-wrapper:focus { outline: none; }

#btnFullscreen {
    display: none;
    margin: 0 auto 14px;
    background: var(--secondaire);
    color: white;
    border: none;
    border-radius: 30px;
    padding: 10px 24px;
    font-size: 1em;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 14px rgba(255,183,3,0.3);
    transition: transform 0.2s;
}
#btnFullscreen:hover { transform: scale(1.04); }

@media (max-width: 700px) {
    #btnFullscreen { display: block; }
}

body.landscape-mode {
    overflow: hidden;
}
body.landscape-mode .falling,
body.landscape-mode .top-bar,
body.landscape-mode .controls-hint,
body.landscape-mode .hud,
body.landscape-mode #btnFullscreen {
    display: none !important;
}
body.landscape-mode .container {
    padding: 0;
    max-width: 100%;
}
body.landscape-mode .game-card {
    border-radius: 0;
    padding: 0;
    margin: 0;
    box-shadow: none;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f7f3ff;
}
body.landscape-mode .canvas-wrapper {
    border-radius: 0;
    border: none;
    width: 100%;
}

#gameCanvas {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: pixelated;
}

.overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(247,243,255,0.88);
    backdrop-filter: blur(2px);
    border-radius: 16px;
    gap: 14px;
    transition: opacity 0.3s;
}
.overlay.hidden { display: none; }

.overlay-emoji { font-size: 3.5rem; }
.overlay-title {
    font-size: 1.8em;
    font-weight: 800;
    color: var(--principal);
}
.overlay-sub {
    font-size: 1em;
    color: #888;
    text-align: center;
    max-width: 280px;
    line-height: 1.5;
}
.overlay-score {
    font-size: 1.3em;
    font-weight: 700;
    color: var(--texte);
}
.overlay-score span { color: var(--principal); }

.btn-start {
    background: var(--principal);
    color: white;
    border: none;
    border-radius: 30px;
    padding: 12px 32px;
    font-size: 1.05em;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(108,99,255,0.3);
}
.btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(108,99,255,0.35);
}

.hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    flex-wrap: wrap;
    gap: 8px;
}
.hud-item {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--fond);
    border-radius: 10px;
    padding: 8px 16px;
    font-weight: 700;
    color: var(--texte);
    font-size: 0.95em;
}
.hud-item .label { color: #999; font-weight: 500; font-size: 0.85em; }

.controls-hint {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 14px;
}
.ctrl-badge {
    background: #f0ecff;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 0.78em;
    color: var(--principal);
    font-weight: 600;
    border: 1px solid #d0c9ff;
}

.falling {
    position: fixed; top: -10%;
    animation: fall linear infinite;
    pointer-events: none; z-index: 0;
}
.confetti { width: 12px; height: 12px; opacity: 0.7; }
.lama     { font-size: 1.8rem; }
.c1{background:var(--principal)}.c2{background:var(--secondaire)}.c3{background:#ff6f91}.c4{background:#00c9a7}.c5{background:#845ec2}
@keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(120vh) rotate(var(--rotation)); }
}

@media (max-width: 500px) {
    .top-bar { padding: 12px 16px; }
    .page-title { font-size: 1.3em; }
    .game-card, .score-card { padding: 16px; }
    .hud-item { font-size: 0.85em; }
}
</style>
</head>
<body>

<div class="falling confetti c1" style="left:4%;  animation-duration:5s;   --rotation:720deg;"></div>
<div class="falling lama"        style="left:11%; animation-duration:7.2s; --rotation:-1080deg;">🦙</div>
<div class="falling confetti c2" style="left:19%; animation-duration:6.1s; --rotation:540deg;"></div>
<div class="falling lama"        style="left:27%; animation-duration:8s;   --rotation:900deg;">🦙</div>
<div class="falling confetti c3" style="left:35%; animation-duration:4.8s; --rotation:-720deg;"></div>
<div class="falling lama"        style="left:43%; animation-duration:6.6s; --rotation:1260deg;">🦙</div>
<div class="falling confetti c4" style="left:52%; animation-duration:5.9s; --rotation:360deg;"></div>
<div class="falling lama"        style="left:61%; animation-duration:7.4s; --rotation:-1440deg;">🦙</div>
<div class="falling confetti c5" style="left:70%; animation-duration:6.3s; --rotation:900deg;"></div>
<div class="falling lama"        style="left:79%; animation-duration:8.8s; --rotation:-1080deg;">🦙</div>
<div class="falling confetti c1" style="left:88%; animation-duration:5.4s; --rotation:720deg;"></div>

<div class="top-bar">
    <button class="back-link" onclick="history.back()">← Retour en arrière</button>
    <h1 class="page-title">🦙 Lama Runner</h1>
    <div style="width:160px"></div>
</div>

<div class="container">

    
    <button id="btnFullscreen">🔄 Passer en plein écran</button>
    <div class="game-card">
        <div class="canvas-wrapper" id="canvasWrapper" tabindex="0">
            <canvas id="gameCanvas" width="860" height="220"></canvas>

            
            <div class="overlay" id="overlayStart">
                <div class="overlay-title">Lama Runner</div>
                <div class="overlay-sub">Appuie sur l'espace, Z, ↑ ou touche l'écran pour démarrer&nbsp;!</div>
                <button class="btn-start" id="btnStart">Jouer</button>
            </div>

            
            <div class="overlay hidden" id="overlayGameover">
                <div class="overlay-emoji">💀</div>
                <div class="overlay-title">Aïe&nbsp;!</div>
                <div class="overlay-score">
                    <span id="goDistance">0</span> m &nbsp;|&nbsp; <span id="goBirds">0</span> 🦅
                </div>
                <button class="btn-start" id="btnRestart">Rejouer</button>
            </div>
        </div>

        <div class="hud">
            <div class="hud-item">🏃 <span class="label">Distance</span>&nbsp;<strong id="hudDist">0</strong> m</div>
            <div class="hud-item">🦅 <span class="label">Oiseaux tués</span>&nbsp;<strong id="hudBirds">0</strong></div>
            <div class="hud-item">💦 <span class="label">Crachat</span>&nbsp;<strong id="hudSpit">●●●</strong></div>
        </div>

        <div class="controls-hint">
            <span class="ctrl-badge">↑ / Z / Espace = Sauter</span>
            <span class="ctrl-badge">↓ / S = Se baisser</span>
            <span class="ctrl-badge">X = Cracher 💦</span>
            <span class="ctrl-badge">📱 Swipe haut = sauter</span>
            <span class="ctrl-badge">📱 Swipe bas = se baisser</span>
            <span class="ctrl-badge">📱 Tap / Swipe droite = cracher</span>
        </div>
    </div>

</div>

<script>

(function(){

var canvas  = document.getElementById('gameCanvas');
var ctx     = canvas.getContext('2d');
var W = canvas.width;   
var H = canvas.height;  

var GROUND = H - 40;
var SCALE  = 1; 

var COL = {
    sky1: '#f7f3ff', sky2: '#e6e1ff',
    ground: '#c8c0f0',
    groundLine: '#b0a8e8',
    llama: '#c8974a',
    llamaDark: '#9e7035',
    llamaLight: '#e8c080',
    cactus: '#4a7c59',
    cactusDark: '#2d5e3a',
    bird: '#6c63ff',
    spit: '#7fd8c8',
    cloud: 'rgba(255,255,255,0.9)',
    hud: '#6c63ff',
};

var state = 'idle'; 
var score = { dist: 0, birds: 0 };
var speed, baseSpeed, spawnTimer, frameCount;
var obstacles = [], birds = [], clouds = [], spits = [];

var llama = {
    x: 90, y: GROUND,
    w: 44, h: 50,
    vy: 0,
    jumping: false,
    ducking: false,
    frame: 0, 
    frameTimer: 0
};

var SPIT_MAX = 3;
var spitCharges = SPIT_MAX;
var spitRechargeTimer = 0;
var SPIT_RECHARGE_FRAMES = 180; 

var GRAVITY = 0.55;
var JUMP_FORCE = -11.5;

function resetGame(){
    state = 'playing';
    score.dist  = 0;
    score.birds = 0;
    speed       = 8;
    baseSpeed   = 8;
    spawnTimer  = 60;
    frameCount  = 0;
    obstacles   = [];
    birds       = [];
    clouds      = [];
    spits       = [];
    spitCharges = SPIT_MAX;
    spitRechargeTimer = 0;
    llama.y       = GROUND;
    llama.vy      = 0;
    llama.jumping = false;
    llama.ducking = false;
    llama.frame   = 0;
    llama.frameTimer = 0;
    
    for(var i=0;i<3;i++) clouds.push({ x: 100+i*300, y: 20+Math.random()*40, w: 70+Math.random()*50, speed: 0.5+Math.random()*0.5 });
    updateHUD();
}

var keys = {};
var duckPressed = false;

function handleKeyDown(e){
    if(keys[e.code]) return;
    keys[e.code] = true;
    if(['Space','ArrowUp','KeyZ'].indexOf(e.code) !== -1){
        e.preventDefault();
        onJump();
    }
    if(['ArrowDown','KeyS'].indexOf(e.code) !== -1){
        e.preventDefault();
        duckPressed = true;
    }
    if(e.code === 'KeyX'){
        e.preventDefault();
        onSpit();
    }
}
function handleKeyUp(e){
    keys[e.code] = false;
    if(['ArrowDown','KeyS'].indexOf(e.code) !== -1) duckPressed = false;
}

var wrapper = document.getElementById('canvasWrapper');
wrapper.addEventListener('keydown', handleKeyDown);
wrapper.addEventListener('keyup',   handleKeyUp);
document.addEventListener('keydown', handleKeyDown);
document.addEventListener('keyup',   handleKeyUp);

var touchStartY = null;
var touchStartX = null;
var touchMoved  = false;
var justStarted = false;

wrapper.addEventListener('touchstart', function(e){
    e.preventDefault();
    var t = e.touches[0];
    touchStartY = t.clientY;
    touchStartX = t.clientX;
    touchMoved  = false;
    justStarted = false;
    if(state === 'idle' || state === 'dead'){ startOrRestart(); justStarted = true; return; }
}, {passive:false});

wrapper.addEventListener('touchmove', function(e){
    e.preventDefault();
    if(touchStartY === null) return;
    var t = e.touches[0];
    var dy = t.clientY - touchStartY;
    var dx = t.clientX - touchStartX;
    if(Math.abs(dy) > 10 || Math.abs(dx) > 10) touchMoved = true;
    
    if(dy > 20) duckPressed = true;
    else duckPressed = false;
}, {passive:false});

wrapper.addEventListener('touchend', function(e){
    e.preventDefault();
    if(touchStartY === null) return;
    var t = e.changedTouches[0];
    var dy = t.clientY - touchStartY;
    var dx = t.clientX - touchStartX;

    if(!justStarted){
        if(!touchMoved){
            onSpit();
        } else if(Math.abs(dx) > Math.abs(dy)){
            if(dx > 20) onSpit();
        } else {
            if(dy < -20) onJump();
        }
    }

    duckPressed = false;
    touchStartY = null;
    touchStartX = null;
    touchMoved  = false;
    justStarted = false;
}, {passive:false});

wrapper.addEventListener('click', function(){
    wrapper.focus();
    if(state === 'idle') startOrRestart();
});

document.getElementById('btnStart').addEventListener('click', startOrRestart);
document.getElementById('btnRestart').addEventListener('click', function(){
    hideOverlay('overlayGameover');
    startOrRestart();
});

function startOrRestart(){
    hideOverlay('overlayStart');
    hideOverlay('overlayGameover');
    wrapper.focus();
    resetGame();
}

function onJump(){
    if(state === 'idle' || state === 'dead'){ startOrRestart(); return; }
    if(!llama.jumping && !llama.ducking){
        llama.vy = JUMP_FORCE;
        llama.jumping = true;
    }
}

function onSpit(){
    if(state !== 'playing') return;
    if(spitCharges <= 0) return;
    spitCharges--;
    
    var mouthX = llama.x + 54;
    var mouthY = llama.y - 30;
    spits.push({ x: mouthX, y: mouthY, r: 7, vx: speed + 9, vy: 0, life: 100 });
    updateHUD();
}

function showOverlay(id){ document.getElementById(id).classList.remove('hidden'); }
function hideOverlay(id){ document.getElementById(id).classList.add('hidden'); }

function updateHUD(){
    document.getElementById('hudDist').textContent   = Math.floor(score.dist);
    document.getElementById('hudBirds').textContent  = score.birds;
    var spit = '';
    for(var i=0;i<SPIT_MAX;i++) spit += (i < spitCharges ? '●' : '○');
    document.getElementById('hudSpit').textContent = spit;
}

function spawnObstacle(){
    var type = Math.random() < 0.3 ? 'big' : 'small';
    var w = type === 'big' ? 22 : 16;
    var h = type === 'big' ? 50 : 36;
    var cluster = Math.floor(Math.random()*3)+1;
    for(var i=0;i<cluster;i++){
        obstacles.push({ x: W + 10 + i*28, y: GROUND - h, w: w, h: h, type: type });
    }
}

function spawnBird(){
    var yPos = GROUND - 55 - Math.random()*50;
    birds.push({ x: W + 20, y: yPos, w: 32, h: 28, dead: false, deadTimer: 0 });
}

function spawnCloud(){
    clouds.push({ x: W+80, y: 15+Math.random()*50, w: 60+Math.random()*60, speed: 0.4+Math.random()*0.6 });
}

function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh){
    return ax < bx+bw && ax+aw > bx &&
           ay < by+bh && ay+ah > by;
}

var sprites = {};

function makeEmojiSprite(emoji, size, cb) {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '">' +
              '<text y="' + Math.round(size * 0.9) + '" font-size="' + (size - 2) + 'px" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,serif">' +
              emoji + '</text></svg>';
    var img = new Image();
    img.onload = cb;
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    return img;
}

var spritesReady = 0;
function onSpriteReady(){ spritesReady++; }

sprites.llamaStand = makeEmojiSprite('🦙', 54, onSpriteReady);
sprites.llamaDuck  = makeEmojiSprite('🦙', 38, onSpriteReady);
sprites.eagle      = makeEmojiSprite('🦅', 36, onSpriteReady);
sprites.eagleDead  = makeEmojiSprite('🦅', 30, onSpriteReady);

function drawLlama(x, y, pose){
    ctx.save();
    if(pose === 'duck'){
        var sw = 36, sh = 36;
        
        ctx.translate(x + sw, y - sh);
        ctx.scale(-1, 1);
        ctx.drawImage(sprites.llamaDuck, 0, 0, sw, sh);
    } else {
        var sw = 54, sh = 54;
        ctx.translate(x + sw, y - sh);
        ctx.scale(-1, 1);
        ctx.drawImage(sprites.llamaStand, 0, 0, sw, sh);
    }
    ctx.restore();
}

function drawCactus(obs){
    ctx.save();
    var x=obs.x, y=obs.y, w=obs.w, h=obs.h;
    ctx.fillStyle = COL.cactus;
    
    ctx.beginPath(); ctx.roundRect(x+w/2-5, y, 10, h, 4); ctx.fill();
    
    var armH = Math.floor(h*0.35);
    ctx.fillStyle = COL.cactusDark;
    ctx.beginPath(); ctx.roundRect(x, y+armH, w/2-3, 8, 4); ctx.fill();
    ctx.beginPath(); ctx.roundRect(x, y+armH, 8, h*0.25, 4); ctx.fill();
    ctx.fillStyle = COL.cactus;
    ctx.beginPath(); ctx.roundRect(x+w/2+3, y+armH+4, w/2-3, 8, 4); ctx.fill();
    ctx.beginPath(); ctx.roundRect(x+w-8, y+armH+4, 8, h*0.22, 4); ctx.fill();
    
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    [[x+w/2, y+8],[x+w/2, y+20],[x+4, y+armH-2],[x+w-4, y+armH+2]].forEach(function(p){
        ctx.beginPath(); ctx.moveTo(p[0]-4,p[1]); ctx.lineTo(p[0]+4,p[1]); ctx.stroke();
    });
    ctx.restore();
}

function drawBird(b){
    ctx.save();
    if(b.dead){
        ctx.globalAlpha = 0.55;
        ctx.translate(b.x + 17, b.y + 17);
        ctx.rotate(0.7);
        ctx.drawImage(sprites.eagleDead, -15, -15, 30, 30);
    } else {
        ctx.drawImage(sprites.eagle, b.x, b.y, 36, 36);
    }
    ctx.restore();
}

function drawSpit(s){
    ctx.save();
    ctx.fillStyle = COL.spit;
    ctx.globalAlpha = Math.min(1, s.life/20);
    ctx.beginPath(); ctx.ellipse(s.x, s.y, s.r*1.8, s.r*0.9, 0, 0, Math.PI*2); ctx.fill();
    
    ctx.fillStyle = '#b0f0e8';
    ctx.beginPath(); ctx.ellipse(s.x - s.r*2, s.y, s.r*0.8, s.r*0.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawCloud(c){
    ctx.save();
    ctx.fillStyle = COL.cloud;
    ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w*0.5, c.w*0.22, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x-c.w*0.18, c.y+3, c.w*0.25, c.w*0.18, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*0.18, c.y+3, c.w*0.28, c.w*0.18, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawGround(){
    var grd = ctx.createLinearGradient(0, GROUND, 0, H);
    grd.addColorStop(0, '#c8c0f0');
    grd.addColorStop(1, '#b0a8e8');
    ctx.fillStyle = grd;
    ctx.fillRect(0, GROUND, W, H - GROUND);
    ctx.strokeStyle = '#a09cdc';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();
}

function drawBackground(){
    var grd = ctx.createLinearGradient(0, 0, 0, GROUND);
    grd.addColorStop(0, COL.sky1);
    grd.addColorStop(1, COL.sky2);
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, GROUND);
}

var lastTime = 0;
var animId;
function loop(ts){
    var dt = Math.min((ts - lastTime)/16.67, 3);
    lastTime = ts;

    ctx.clearRect(0, 0, W, H);
    drawBackground();

    
    clouds.forEach(function(c){ c.x -= c.speed; });
    clouds = clouds.filter(function(c){ return c.x > -150; });
    if(Math.random() < 0.004) spawnCloud();
    clouds.forEach(drawCloud);

    drawGround();

    if(state === 'playing'){
        frameCount++;
        score.dist += speed * 0.04;

        
        speed = baseSpeed + score.dist * 0.003;
        if(speed > 18) speed = 18;

        
        if(spitCharges < SPIT_MAX){
            spitRechargeTimer++;
            if(spitRechargeTimer >= SPIT_RECHARGE_FRAMES){ spitCharges++; spitRechargeTimer=0; }
        }

        
        spawnTimer--;
        if(spawnTimer <= 0){
            var minGap = Math.max(35, 80 - Math.floor(score.dist/100)*3);
            spawnTimer = minGap + Math.random()*60;
            if(Math.random() < 0.35 && score.dist > 80) spawnBird();
            else spawnObstacle();
        }

        
        if(duckPressed){
            if(llama.jumping){
                
                llama.y = GROUND;
                llama.vy = 0;
                llama.jumping = false;
            }
            llama.ducking = true;
        } else {
            llama.ducking = false;
        }

        if(llama.jumping){
            llama.vy += GRAVITY;
            llama.y  += llama.vy;
            if(llama.y >= GROUND){ llama.y = GROUND; llama.vy=0; llama.jumping=false; }
        }

        
        if(!llama.ducking && !llama.jumping){
            llama.frameTimer++;
            if(llama.frameTimer > 8){ llama.frameTimer=0; llama.frame = llama.frame===1?2:1; }
        } else if(llama.jumping){ llama.frame=1; }

        
        obstacles.forEach(function(o){ o.x -= speed; });
        obstacles = obstacles.filter(function(o){ return o.x > -60; });

        
        birds.forEach(function(b){
            if(!b.dead){
                b.x -= speed * 1.1;
            } else {
                b.vy = (b.vy || 0) + 0.4;  
                b.x -= speed * 0.2;
                b.y += b.vy;
                b.deadTimer++;
            }
        });
        birds = birds.filter(function(b){ return b.x > -80 && b.deadTimer < 80; });

        
        spits.forEach(function(s){
            s.x += s.vx;
            s.y += s.vy;
            s.life--;
        });
        spits = spits.filter(function(s){ return s.life > 0 && s.x < W+30; });

        
        spits.forEach(function(s){
            birds.forEach(function(b){
                if(b.dead) return;
                
                if(rectOverlap(s.x - s.r, s.y - s.r, s.r*2, s.r*2,
                               b.x, b.y, b.w, b.h)){
                    b.dead = true;
                    b.vy = 0;
                    score.birds++;
                    s.life = 0;
                }
            });
        });

        
        
        var lx, ly, lw, lh;
        if(llama.ducking){
            lw=36; lh=36; lx=llama.x+4; ly=llama.y-lh;
        } else {
            lw=54; lh=54; lx=llama.x+4; ly=llama.y-lh;
        }
        var dead = false;
        obstacles.forEach(function(o){
            if(rectOverlap(lx+6, ly+10, lw-12, lh-10, o.x, o.y, o.w, o.h)) dead=true;
        });
        birds.filter(function(b){ return !b.dead; }).forEach(function(b){
            if(rectOverlap(lx+6, ly+10, lw-12, lh-10, b.x+2, b.y+2, b.w-4, b.h-4)) dead=true;
        });
        if(dead) gameOver();

        updateHUD();
    }

    
    spits.forEach(drawSpit);

    
    obstacles.forEach(drawCactus);

    
    birds.forEach(drawBird);

    
    var pose = llama.ducking ? 'duck' : (llama.frame===2 ? 'run2' : 'run1');
    drawLlama(llama.x, llama.y, pose);

    
    if(state === 'idle'){
        drawLlama(llama.x, llama.y, 'run1');
    }

    animId = requestAnimationFrame(loop);
}

function gameOver(){
    state = 'dead';
    document.getElementById('goDistance').textContent = Math.floor(score.dist);
    document.getElementById('goBirds').textContent    = score.birds;
    showOverlay('overlayGameover');
}

var isLandscape = false;
document.getElementById('btnFullscreen').addEventListener('click', function(){
    if(!isLandscape){
        
        var el = document.documentElement;
        if(el.requestFullscreen) el.requestFullscreen();
        else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        if(screen.orientation && screen.orientation.lock){
            screen.orientation.lock('landscape').catch(function(){});
        }
        document.body.classList.add('landscape-mode');
        document.getElementById('btnFullscreen').textContent = '✕ Quitter le plein écran';
        isLandscape = true;
    } else {
        if(document.exitFullscreen) document.exitFullscreen();
        else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
        if(screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
        document.body.classList.remove('landscape-mode');
        document.getElementById('btnFullscreen').textContent = '🔄 Passer en plein écran';
        isLandscape = false;
    }
    
    setTimeout(function(){ wrapper.focus(); }, 200);
});

document.addEventListener('fullscreenchange', function(){
    if(!document.fullscreenElement && isLandscape){
        document.body.classList.remove('landscape-mode');
        document.getElementById('btnFullscreen').textContent = '🔄 Passer en plein écran';
        isLandscape = false;
    }
});

animId = requestAnimationFrame(loop);

})();
</script>
</body>
</html>
